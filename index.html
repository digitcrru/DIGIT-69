    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }

        .step-active .step-icon { background-color: #5a54f9; color: white; border-color: #5a54f9; }
        .step-active .step-line { background-color: #5a54f9; }
        .step-inactive .step-icon { background-color: white; color: #cbd5e1; border-color: #e2e8f0; }
        .step-inactive .step-line { background-color: #e2e8f0; }
    </style>
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#5a54f9', primary_hover: '#4b45d9', secondary: '#10b981', admin: '#0f172a', admin_hover: '#1e293b' } } }

    </script>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Navigation (Top Bar) -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-100" id="main-nav">

                    <i class="ph-fill ph-student text-primary text-2xl sm:text-3xl mr-2" id="brand-icon"></i>
                    <span class="font-bold text-lg sm:text-xl text-slate-800 tracking-tight" id="brand-text">DIGIT.<span class="text-primary">CRRU</span></span>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:flex space-x-1 items-center flex-grow justify-center" id="desktop-menu"></div>

                <!-- Role Switcher -->
                <div class="flex items-center">
                    <div class="bg-slate-100/80 p-1 rounded-xl mr-0 md:mr-4 hidden sm:inline-flex">
                        <button onclick="switchRole('student')" id="btn-role-student" class="px-5 py-1.5 text-sm font-bold rounded-lg bg-white text-primary shadow-sm transition-all duration-200">นักศึกษา</button>
                        <button onclick="switchRole('admin')" id="btn-role-admin" class="px-5 py-1.5 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-700 transition-all duration-200">แอดมิน</button>
                    </div>
                    <!-- Mobile Hamburger -->
                    <button onclick="toggleMobileMenu()" class="sm:hidden text-slate-500 hover:text-primary focus:outline-none p-2 rounded-lg bg-slate-50 border border-slate-200 ml-2">
                        <i class="ph ph-user-switch text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu (Role Switcher for Small Screens) -->
        <div id="mobile-menu" class="hidden sm:hidden bg-white border-t border-slate-100 px-4 py-4 shadow-lg absolute w-full z-40">
            <p class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider text-center">สลับบทบาท (Role)</p>
            <div class="flex bg-slate-100/80 p-1 rounded-xl">
                 <button onclick="switchRole('student'); toggleMobileMenu();" id="btn-role-student-mob" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white text-primary shadow-sm transition-all duration-200">นักศึกษา</button>
                 <button onclick="switchRole('admin'); toggleMobileMenu();" id="btn-role-admin-mob" class="flex-1 py-2 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-700 transition-all duration-200">แอดมิน</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 pb-8 w-full" id="app-content"></main>

    <!-- Footer Area -->
    <footer class="mt-auto py-6 sm:py-8 text-center text-slate-500 text-xs sm:text-sm px-4 border-t border-slate-200 bg-white pb-24 md:pb-6 print:hidden">
        <p class="font-bold text-slate-600">ฝ่ายกิจการนักศึกษา คณะเทคโนโลยีดิจิทัล มหาวิทยาลัยราชภัฏเชียงราย</p>
        <p class="mt-1 text-slate-400">ระบบจัดการกิจกรรมนักศึกษา (DIGIT.CRRU)</p>
    </footer>

    <!-- Mobile Tab Bar (Bottom Navigation) -->
    <nav id="mobile-tab-bar" class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center z-40 pt-1 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] print:hidden" style="padding-bottom: env(safe-area-inset-bottom);"></nav>

    <!-- ================= MODALS ================= -->

    <!-- Admin Login Modal -->
    <div id="adminLoginModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] flex items-center justify-center p-4 transition-opacity fade-in">
        <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-sm w-full shadow-2xl transform transition-all relative">
            <button onclick="closeAdminLoginModal()" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors"><i class="ph ph-x text-2xl"></i></button>
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-slate-100 text-admin rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="ph-fill ph-shield-check text-4xl"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800">เข้าสู่ระบบ Admin</h3>
                <p class="text-xs sm:text-sm text-slate-500 mt-1">กรุณากรอกชื่อผู้ใช้งานและรหัสผ่าน</p>
            </div>
            <form onsubmit="handleAdminLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs sm:text-sm font-bold text-slate-700 mb-1.5">ชื่อผู้ใช้งาน (Username)</label>
                    <input type="text" id="admin-username" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-admin/20 focus:border-admin outline-none font-medium text-sm bg-slate-50" autocomplete="off">
                </div>
                <div>
                    <label class="block text-xs sm:text-sm font-bold text-slate-700 mb-1.5">รหัสผ่าน (Password)</label>
                    <input type="password" id="admin-password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-admin/20 focus:border-admin outline-none font-medium text-sm bg-slate-50">
                </div>
                <p id="admin-login-error" class="text-xs font-bold text-red-500 hidden text-center bg-red-50 p-2 rounded-lg border border-red-100">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง</p>
                <button type="submit" class="w-full py-3.5 mt-2 rounded-xl font-bold text-white bg-admin hover:bg-admin_hover transition-colors flex items-center justify-center gap-2 shadow-lg text-sm">
                    เข้าสู่ระบบ <i class="ph ph-sign-in text-lg"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Modal for Slip Viewing -->
    <div id="slipModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-2xl p-6 max-w-lg w-full shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-slate-800">ตรวจสอบสลิปโอนเงิน</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition-colors"><i class="ph ph-x text-2xl"></i></button>
            </div>
            <div class="bg-slate-100 rounded-xl h-64 sm:h-80 flex items-center justify-center mb-4 border border-slate-200 overflow-hidden relative">
                <img id="modal-slip-image" src="" alt="Slip" class="h-full object-contain">
            </div>
            <div class="flex gap-3 justify-end">
                <button onclick="closeModal()" class="px-4 py-2 rounded-xl text-slate-600 bg-slate-100 hover:bg-slate-200 font-medium transition-colors text-sm sm:text-base">ปิดหน้าต่าง</button>
                <button onclick="verifyOrderFromModal()" class="px-4 py-2 rounded-xl text-white bg-green-500 hover:bg-green-600 font-medium flex items-center gap-2 transition-colors shadow-lg shadow-green-500/30 text-sm sm:text-base">
                    <i class="ph ph-check-circle"></i> ยืนยันความถูกต้อง
                </button>
            </div>
        </div>
    </div>

    <!-- Modal for Edit Event -->
    <div id="editEventModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-lg w-full shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-800"><i class="ph-fill ph-pencil-simple text-primary"></i> แก้ไขข้อมูลกิจกรรม</h3>
                <button onclick="closeEditEventModal()" class="text-slate-400 hover:text-red-500 transition-colors"><i class="ph ph-x text-2xl"></i></button>
            </div>
            <form id="editEventForm" onsubmit="submitEditEvent(event)" class="space-y-4 sm:space-y-5">
                <input type="hidden" id="edit-event-id">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">ชื่อกิจกรรม</label>
                    <input type="text" id="edit-event-title" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none font-medium text-sm">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">วันที่จัด</label>
                    <input type="text" id="edit-event-date" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none font-medium text-sm">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">สถานที่</label>
                    <input type="text" id="edit-event-location" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none font-medium text-sm">
                </div>
                <button type="submit" class="w-full py-4 mt-2 rounded-xl font-bold text-white bg-primary hover:bg-primary_hover transition-colors flex items-center justify-center gap-2 shadow-lg shadow-primary/30">
                    <i class="ph ph-floppy-disk text-xl"></i> บันทึกการแก้ไข
                </button>
            </form>
        </div>
    </div>

    <!-- Home Announcement Popup -->
    <div id="homePopupModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-[32px] overflow-hidden max-w-md w-full shadow-2xl scale-in relative">
            <button onclick="closeHomePopup()" class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center bg-black/20 hover:bg-black/40 text-white rounded-full transition-colors z-20 backdrop-blur-md shadow-sm">
                <i class="ph ph-x text-xl font-bold"></i>
            </button>
            <div class="h-48 sm:h-64 w-full bg-slate-100 relative group">
                <img id="popup-banner-img" src="" alt="Banner" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" onerror="this.src='https://placehold.co/800x400?text=Announcement'">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/40 to-transparent"></div>
                <div class="absolute bottom-6 left-6 right-6">
                    <span class="inline-block px-3 py-1 bg-red-500 text-white text-[10px] font-bold uppercase tracking-widest rounded-lg mb-3 shadow-md border border-red-400/50">ประกาศสำคัญ</span>
                    <h2 id="popup-title" class="text-xl sm:text-3xl font-bold text-white leading-tight drop-shadow-md"></h2>
                </div>
            </div>
            <div class="p-6 sm:p-8 bg-white">
                <p id="popup-desc" class="text-slate-600 text-sm leading-relaxed mb-8 font-medium whitespace-pre-line"></p>
                <button onclick="closeHomePopup()" class="w-full px-6 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">ปิดประกาศ</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-20 md:bottom-5 right-4 md:right-5 z-[130] flex flex-col gap-2 w-auto max-w-[90%] pointer-events-none"></div>

    <!-- ================= SCRIPTS ================= -->
    <script>
        // ==========================================
        // URL ของ GOOGLE APPS SCRIPT
        // ==========================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6wkWGyyWSJBMQ90nd6DFqh8JKOWlJ_aWsxzNNSbSstIwX8UDVL47Nn6jtm0P0l3ViWw/exec';
        
        let currentRole = 'student'; 
        let currentView = 'events';
        let currentModalOrderId = null;
        let globalActivities = [];
        let currentCheckoutOrder = null;
        
        const appCache = {
            activities: [], checkIns: [], orders: [], evaluations: [], students: {} 
        };
        
        // 📌 บังคับตั้งค่าเริ่มต้นเป็น "ปิด (false)" เสมอ เพื่อป้องกันการกดปุ่มเข้าก่อนโหลดข้อมูล
        let isShirtShopOpen = localStorage.getItem('CRRU_ShopOpen') === 'true'; 
        
        let popupSettings = JSON.parse(localStorage.getItem('CRRU_PopupSettings')) || {
            enabled: true, 
            title: 'แจ้งเตือนนักศึกษาใหม่\nรหัส 69 ทุกคน!', 
            description: 'ขอให้นักศึกษาชั้นปีที่ 1 (รหัส 69) ทุกคน เข้าไปทำการ "สั่งจองชุดเสื้อคณะ (แพ็คเกจคู่)" ให้เรียบร้อย ภายในวันที่กำหนด เพื่อใช้ในการทำกิจกรรมรับน้องและประดับรุ่นครับ', 
            imageUrl: 'https://images.unsplash.com/photo-1523580494112-071d16940a1c?auto=format&fit=crop&q=80&w=800'
        };

        let promptPaySettings = JSON.parse(localStorage.getItem('CRRU_PromptPaySettings')) || {
            accountName: 'ฝ่ายกิจการนักศึกษา',
            accountNumber: '012-3-45678-9',
            bankName: 'ธ.กรุงไทย (สาขามร.ชร.)'
        };

        function formatThaiDate(dateString, includeTime = false) {
            if (!dateString || String(dateString).trim() === '-' || String(dateString).trim() === '') return dateString;
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return dateString; 
            const thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            let formatted = `${date.getDate()} ${thaiMonths[date.getMonth()]} ${date.getFullYear() + 543}`;
            if (includeTime) formatted += ` ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')} น.`;
            return formatted;
        }

        const NAV_STUDENT = [
            { id: 'events', label: 'กิจกรรม', tabLabel: 'กิจกรรม', icon: 'ph-megaphone' },
            { id: 'history', label: 'ประวัติของฉัน', tabLabel: 'ประวัติ', icon: 'ph-clock-counter-clockwise' }
        ];

        const NAV_ADMIN = [
            { id: 'admin-dash', label: 'ภาพรวม', tabLabel: 'ภาพรวม', icon: 'ph-chart-pie-slice' },
            { id: 'admin-orders', label: 'จัดการจองเสื้อ', tabLabel: 'จองเสื้อ', icon: 'ph-t-shirt' },
            { id: 'admin-events', label: 'จัดการกิจกรรม', tabLabel: 'กิจกรรม', icon: 'ph-calendar-plus' },
            { id: 'admin-spss', label: 'รายงานผล (SPSS)', tabLabel: 'SPSS', icon: 'ph-chart-bar' },
            { id: 'admin-settings', label: 'ตั้งค่าระบบ', tabLabel: 'ตั้งค่า', icon: 'ph-gear' } 
        ];

        const STATUS_MAP = {
            1: { text: 'รอตรวจสอบ', color: 'bg-amber-100 text-amber-700 border-amber-200', icon: 'ph-hourglass-high' },
            2: { text: 'ชำระเงินแล้ว', color: 'bg-blue-100 text-blue-700 border-blue-200', icon: 'ph-check-circle' },
            3: { text: 'กำลังผลิต', color: 'bg-purple-100 text-purple-700 border-purple-200', icon: 'ph-scissors' },
            4: { text: 'พร้อมรับ', color: 'bg-green-100 text-green-700 border-green-200', icon: 'ph-package' }
        };

        document.addEventListener('DOMContentLoaded', () => {
            proceedSwitchRole('student');
            
            // 📌 ดึง Settings จากเซิร์ฟเวอร์แบบเบื้องหลังทันทีที่เปิดเว็บ ป้องกัน Mobile Cache
            fetchSettingsData().then(() => {
                if (!sessionStorage.getItem('homePopupShown') && currentRole === 'student') {
                    openHomePopup();
                    sessionStorage.setItem('homePopupShown', 'true');
                }
            });

            fetchActivitiesData();
            fetchAllCheckInsData();
            fetchOrdersData();
            fetchEvaluationsData();
        });

        // 📌 ฟังก์ชันดึงสถานะการตั้งค่าแบบสกัด Mobile Cache
        async function fetchSettingsData() {
            try {
                // บังคับไม่ให้จำแคช (Cache-Busting)
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getSettings&_nocache=${new Date().getTime()}`, { cache: 'no-store' });
                const result = await res.json();
                if (result.success && result.data) {
                    isShirtShopOpen = (result.data.isShirtShopOpen === true || String(result.data.isShirtShopOpen).toLowerCase() === 'true');
                    
                    if(result.data.popupSettings) popupSettings = result.data.popupSettings;
                    if(result.data.promptPaySettings) promptPaySettings = result.data.promptPaySettings;
                    
                    localStorage.setItem('CRRU_ShopOpen', isShirtShopOpen ? 'true' : 'false');
                    localStorage.setItem('CRRU_PopupSettings', JSON.stringify(popupSettings));
                    localStorage.setItem('CRRU_PromptPaySettings', JSON.stringify(promptPaySettings));
                    
                    // Update Nav based on setting
                    if(isShirtShopOpen) {
                        if(!NAV_STUDENT.find(n => n.id === 'shirt')) {
                            NAV_STUDENT.push({ id: 'shirt', label: 'สั่งจองเสื้อ', tabLabel: 'สั่งจอง', icon: 'ph-t-shirt' });
                            NAV_STUDENT.push({ id: 'tracking', label: 'ติดตามสถานะ', tabLabel: 'ติดตาม', icon: 'ph-truck' });
                            if(currentRole === 'student') renderNav();
                        }
                    } else {
                        const sIdx = NAV_STUDENT.findIndex(n => n.id === 'shirt');
                        if(sIdx > -1) NAV_STUDENT.splice(sIdx, 2);
                        if(currentRole === 'student') renderNav();
                    }
                }
            } catch(e) {}
        }

        function switchRole(role) {
            if (role === 'admin' && !sessionStorage.getItem('isAdminAuthenticated')) {
                showAdminLoginModal();
                return;
            }
            proceedSwitchRole(role);
        }

        function proceedSwitchRole(role) {
            currentRole = role;
            const btnStudent = document.getElementById('btn-role-student'); const btnAdmin = document.getElementById('btn-role-admin');
            const btnStudentMob = document.getElementById('btn-role-student-mob'); const btnAdminMob = document.getElementById('btn-role-admin-mob');
            const brandIcon = document.getElementById('brand-icon'); const brandText = document.getElementById('brand-text');

            const aC = 'px-5 py-1.5 text-sm font-bold rounded-lg bg-white text-primary shadow-sm transition-all duration-200';
            const iC = 'px-5 py-1.5 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-700 transition-all duration-200';
            const aCMob = 'flex-1 py-2 text-sm font-bold rounded-lg bg-white text-primary shadow-sm transition-all duration-200';
            const iCMob = 'flex-1 py-2 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-700 transition-all duration-200';

            if (role === 'student') {
                if(btnStudent) btnStudent.className = aC; if(btnAdmin) btnAdmin.className = iC;
                if(btnStudentMob) btnStudentMob.className = aCMob; if(btnAdminMob) btnAdminMob.className = iCMob;
                brandIcon.className = 'ph-fill ph-student text-primary text-2xl sm:text-3xl mr-2 transition-colors';
                brandText.innerHTML = 'DIGIT.<span class="text-primary">CRRU</span>';
                navigate('events');
            } else {
                if(btnAdmin) btnAdmin.className = aC; if(btnStudent) btnStudent.className = iC;
                if(btnAdminMob) btnAdminMob.className = aCMob; if(btnStudentMob) btnStudentMob.className = iCMob;
                brandIcon.className = 'ph-fill ph-shield-check text-admin text-2xl sm:text-3xl mr-2 transition-colors';
                brandText.innerHTML = 'Admin<span class="text-admin font-normal">Panel</span>';
                navigate('admin-dash');
            }
        }

        function showAdminLoginModal() { document.getElementById('admin-username').value = ''; document.getElementById('admin-password').value = ''; document.getElementById('admin-login-error').classList.add('hidden'); document.getElementById('adminLoginModal').classList.remove('hidden'); }
        function closeAdminLoginModal() { document.getElementById('adminLoginModal').classList.add('hidden'); }
        function handleAdminLogin(e) { 
            e.preventDefault(); 
            const user = document.getElementById('admin-username').value.trim(); 
            const pass = document.getElementById('admin-password').value.trim(); 
            if (user === 'Admin' && pass === '9999') { 
                sessionStorage.setItem('isAdminAuthenticated', 'true'); 
                closeAdminLoginModal(); 
                showToast('เข้าสู่ระบบ Admin สำเร็จ', 'success'); 
                proceedSwitchRole('admin'); 
            } else { 
                document.getElementById('admin-login-error').classList.remove('hidden'); 
            } 
        }

        function renderNav() {
            const items = currentRole === 'student' ? NAV_STUDENT : NAV_ADMIN;

        // ==========================================
        // FAST API FETCHERS
        // ==========================================
        async function fetchActivitiesData() {
            const fetchPromise = fetch(`${GOOGLE_SCRIPT_URL}?action=getActivities&t=${new Date().getTime()}`)
                .then(res => res.json())
                .then(async actResult => {
                    const chkRes = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCheckIns&t=${new Date().getTime()}`);
                    const chkResult = await chkRes.json();
                    
                    const checkInCounts = {};
                    if (chkResult.success && chkResult.data) {
                        chkResult.data.forEach(row => {
                            if(row && row.length > 1) {
                                const eventName = String(row[1]).trim();
                                if (eventName) checkInCounts[eventName] = (checkInCounts[eventName] || 0) + 1;
                            }
                        });
                        appCache.checkIns = chkResult.data;
                    }

                    if (actResult.success && actResult.data) {
                        actResult.data.forEach(item => { 
                            item.date = formatThaiDate(item.date); 
                            item.timestamp = formatThaiDate(item.timestamp, true); 
                            item.joined = checkInCounts[item.title.trim()] || 0;
                        });
                        appCache.activities = actResult.data;
                    }
                    return appCache.activities;
                }).catch(() => null);

            if (appCache.activities && appCache.activities.length > 0) return appCache.activities;
            const data = await fetchPromise;
            return data || MOCK_EVENTS; 
        }

        async function fetchAllCheckInsData() { 
            const fetchPromise = fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCheckIns&t=${new Date().getTime()}`).then(res => res.json()).then(r => { if(r.success) appCache.checkIns = r.data; return appCache.checkIns; }).catch(()=>[]);
            if (appCache.checkIns && appCache.checkIns.length > 0) return appCache.checkIns;
            return await fetchPromise || [];
        }

            if (appCache.orders && appCache.orders.length > 0) return appCache.orders;
            return await fetchPromise || [];

        async function fetchStudentData() {
            const searchId = document.getElementById('search-student-id').value.trim(); const feedback = document.getElementById('search-feedback');
            if(!searchId) { feedback.textContent = 'กรุณากรอกรหัสก่อนค้นหา'; feedback.classList.remove('hidden'); return; }
            if (appCache.students[searchId]) { fillStudentForm(appCache.students[searchId], searchId); return; }
            const btn = document.getElementById('btn-fetch-student'); const originalBtnHtml = btn.innerHTML; btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>...'; btn.disabled = true; feedback.classList.add('hidden');
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=search&id=${encodeURIComponent(searchId)}&_nocache=${new Date().getTime()}`); const result = await res.json();
                if (result.success && result.data) { appCache.students[searchId] = result.data; fillStudentForm(result.data, searchId); } else { feedback.textContent = 'ไม่พบข้อมูล กรุณาลองใหม่'; feedback.classList.remove('hidden'); }
            } catch (error) { feedback.textContent = 'เชื่อมต่อล้มเหลว'; feedback.classList.remove('hidden'); showManualForm(searchId); } finally { btn.innerHTML = originalBtnHtml; btn.disabled = false; }
        }

        function fillStudentForm(data, searchId) {
            document.getElementById('reg-student-id').value = data.studentId || searchId; document.getElementById('reg-citizen-id').value = data.citizenId || data.year || '';
            document.getElementById('reg-hidden-student-id').value = data.studentId || ''; document.getElementById('reg-hidden-citizen-id').value = data.citizenId || data.year || '';
            document.getElementById('reg-name').value = data.name || ''; document.getElementById('reg-faculty').value = data.faculty || '';
            ['reg-name', 'reg-faculty', 'reg-student-id', 'reg-citizen-id'].forEach(id => { const f = document.getElementById(id); if (f.value) { f.readOnly = true; f.classList.replace('bg-white/70', 'bg-slate-50'); f.classList.add('text-slate-500', 'shadow-inner'); } });
            document.getElementById('step-search').classList.add('hidden'); document.getElementById('step-form').classList.remove('hidden'); showToast('ดึงข้อมูลสำเร็จ', 'success');
        }

        function showManualForm(prefillId = '') {
            const searchInput = document.getElementById('search-student-id').value.trim() || prefillId;
            
            // ปลดล็อคฟิลด์ต่างๆ ให้สามารถแก้ไข/กรอกข้อมูลเองได้
            ['reg-name', 'reg-faculty', 'reg-student-id', 'reg-citizen-id'].forEach(id => { const f = document.getElementById(id); if (f) { f.readOnly = false; f.classList.replace('bg-slate-50', 'bg-white/70'); f.classList.remove('text-slate-500', 'shadow-inner'); } });

            document.getElementById('step-search').classList.add('hidden'); document.getElementById('step-form').classList.remove('hidden'); document.getElementById('step-form').firstElementChild.classList.add('hidden'); 
        }

        async function handleRegistrationSubmit(e, eventId) {
            e.preventDefault();
            const sid = document.getElementById('reg-student-id').value.trim(); 
            const cid = document.getElementById('reg-citizen-id').value.trim();
            const eventObj = appCache.activities.find(ev => String(ev.id) === String(eventId));
            const eventName = eventObj?.title || 'กิจกรรม';
            const errorMsgEl = document.getElementById('reg-error-message');
            
            if (errorMsgEl) errorMsgEl.classList.add('hidden'); // รีเซ็ตข้อความแจ้งเตือนสีแดง

            // 1. เช็คจากแคชในเครื่อง (ดักจับการกดรัวๆ เบื้องต้น)
            const hasRegisteredLocally = appCache.checkIns.some(row => {
                const rowEvent = String(row[1]).trim();
                const rowSid = String(row[2]).trim();
                const rowCid = String(row[3]).trim();
                return rowEvent === eventName && ((sid && rowSid === sid) || (cid && rowCid === cid));
            });

            if (hasRegisteredLocally) {
                if (errorMsgEl) {
                    errorMsgEl.innerHTML = '<i class="ph-fill ph-warning-circle text-lg inline-block align-middle mr-1"></i> ระบบตรวจพบว่าคุณลงทะเบียนกิจกรรมนี้ไปแล้ว!';
                    errorMsgEl.classList.remove('hidden');
                }
                showToast('พบข้อมูลการลงทะเบียนซ้ำซ้อน!', 'error');
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> กำลังตรวจสอบ...';
            submitBtn.disabled = true;

            try {
                // 2. เช็คจากเซิร์ฟเวอร์แบบ Real-time เพื่อความแม่นยำ 100% ป้องกันทำรายการพร้อมกันหลายเครื่อง
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCheckIns&_nocache=${new Date().getTime()}`);
                const result = await res.json();
                
                if (result.success && result.data) {
                    appCache.checkIns = result.data; // อัปเดต Cache ของระบบ
                    const isActuallyRegistered = result.data.some(row => {
                        const rowEvent = String(row[1]).trim();
                        const rowSid = String(row[2]).trim();
                        const rowCid = String(row[3]).trim();
                        return rowEvent === eventName && ((sid && rowSid === sid) || (cid && rowCid === cid));
                    });

                    if (isActuallyRegistered) {
                        if (errorMsgEl) {
                            errorMsgEl.innerHTML = '<i class="ph-fill ph-warning-circle text-lg inline-block align-middle mr-1"></i> ระบบตรวจพบว่าคุณลงทะเบียนกิจกรรมนี้ไปแล้ว!';
                            errorMsgEl.classList.remove('hidden');
                        }
                        showToast('ระบบฐานข้อมูลกลางพบข้อมูลซ้ำซ้อน!', 'error');
                        submitBtn.innerHTML = originalBtnText;
                        submitBtn.disabled = false;
                        return;
                    }
                }
            } catch (err) {
                console.log("Offline mode: skipping server check");
            }

            // 3. เมื่อผ่านการตรวจสอบทั้งหมด จึงทำการบันทึกข้อมูล
            const payload = { 
                action: 'checkIn', 
                eventId: eventId, 
                eventName: eventName, 
                studentId: document.getElementById('reg-hidden-student-id').value || sid, 
                citizenId: document.getElementById('reg-hidden-citizen-id').value || cid, 
                name: document.getElementById('reg-name').value, 
                faculty: document.getElementById('reg-faculty').value, 
                timestamp: new Date().toLocaleString('th-TH') 
            };
            
            // แอบใส่ข้อมูลลงแคชชั่วคราว เพื่อกันการกดปุ่มย้อนกลับแล้วส่งข้อมูลซ้ำ
            appCache.checkIns.push([payload.timestamp, payload.eventName, payload.studentId, payload.citizenId, payload.name, payload.faculty, 3]);

            if (eventObj) eventObj.joined = (parseInt(eventObj.joined) || 0) + 1;
            
            submitBtn.innerHTML = '<i class="ph-fill ph-check-circle text-xl"></i> สำเร็จ!';

        async function fetchHistoryData() {
            const searchId = document.getElementById('search-history-id').value.trim(); if(!searchId) { showToast('กรุณากรอกข้อมูล', 'error'); return; }
            const btn = document.getElementById('btn-fetch-history'); const txt = btn.innerHTML; btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>...'; btn.disabled = true;
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&id=${encodeURIComponent(searchId)}&_nocache=${new Date().getTime()}`); const result = await res.json();
                if (result.success && result.data && result.data.length > 0) {
                    result.data.forEach(item => item.date = formatThaiDate(item.date));
                    sessionStorage.setItem('historySearchTerm', searchId); sessionStorage.setItem('historyData', JSON.stringify({ history: result.data })); showToast('ค้นหาสำเร็จ', 'success');
                } else { sessionStorage.setItem('historySearchTerm', searchId); sessionStorage.setItem('historyData', JSON.stringify({ history: [] })); showToast('ไม่พบประวัติ', 'warning'); }
            } catch (error) { sessionStorage.setItem('historySearchTerm', searchId); sessionStorage.setItem('historyData', JSON.stringify({ history: [] })); showToast('Offline Mode', 'warning'); } 
            finally { btn.innerHTML = txt; btn.disabled = false; renderHistory(document.getElementById('app-content')); }
        }

        window.generateSPSSReport = function(eventName) {
            const contentDiv = document.getElementById('spss-report-content');
            if (!eventName) { contentDiv.classList.add('hidden'); return; }

            const evals = appCache.evaluations.filter(e => String(e[3]).trim() === eventName);
            if (evals.length === 0) { contentDiv.innerHTML = '<div class="text-center py-10 bg-white rounded-3xl border border-slate-100 text-slate-500">ไม่มีข้อมูลแบบประเมินสำหรับกิจกรรมนี้</div>'; contentDiv.classList.remove('hidden'); return; }

            // 1. ประมวลผลเพศ (หาจากคำนำหน้าชื่อใน CheckIns)
            let mCount = 0; let fCount = 0;
            evals.forEach(ev => {
                const sid = String(ev[1]).trim();
                const chk = appCache.checkIns.find(c => String(c[2]).trim() === sid);
                if (chk && chk[4]) {
                    const name = String(chk[4]).trim();
                    if (name.startsWith('นาย')) mCount++;
                    else if (name.startsWith('นาง') || name.startsWith('น.ส.') || name.startsWith('นางสาว')) fCount++;
                }
            });
            const totalGender = mCount + fCount || 1; 
            const mPct = ((mCount / totalGender) * 100).toFixed(2); const fPct = ((fCount / totalGender) * 100).toFixed(2);
            
            let majorityGender = 'ชาย'; let majorityCount = mCount; let majorityPct = mPct;
            let minorityGender = 'หญิง'; let minorityCount = fCount; let minorityPct = fPct;
            if (fCount > mCount) { majorityGender = 'หญิง'; majorityCount = fCount; majorityPct = fPct; minorityGender = 'ชาย'; minorityCount = mCount; minorityPct = mPct; }

            const surveyMap = {
                'q1_1': 'การประชาสัมพันธ์โครงการ ฯ', 'q1_2': 'ความเหมาะสมของสถานที่', 'q1_3': 'ความเหมาะสมของระยะเวลา', 'q1_4': 'การจัดลำดับขั้นตอนของกิจกรรม',
                'q2_1': 'เอกสาร', 'q2_2': 'โสตทัศนูปกรณ์', 'q2_3': 'เจ้าหน้าที่สนับสนุน', 'q2_4': 'อาหาร, เครื่องดื่มและสถานที่',
                'q3_1': 'ท่านได้รับความรู้ แนวคิด ทักษะและประสบการณ์ใหม่ ๆ จากโครงการ', 'q3_2': 'ท่านสามารถนำสิ่งที่ได้รับจากโครงการ/กิจกรรมนี้ไปใช้ในการปฏิบัติงาน', 'q3_3': 'สิ่งที่ท่านได้รับจากโครงการ/กิจกรรมครั้งนี้ตรงตามความคาดหวังของท่านหรือไม่', 'q3_4': 'โครงการ/กิจกรรมนี้เอื้ออำนวยต่อการเรียนรู้และพัฒนาความสามารถของท่าน', 'q3_5': 'ประโยชน์ที่ท่านได้รับจากโครงการ/กิจกรรม'
            };

            const qMeans = []; let totalScoreSum = 0; let validEvalCount = 0;
            let allValidScores = []; // เก็บตะแนนทั้งหมดเพื่อหา S.D. รวม
            for (let col = 4; col <= 16; col++) {
                let sum = 0; let count = 0;
                let scores = [];
                evals.forEach(ev => { 
                    const val = parseInt(ev[col]); 
                    if (!isNaN(val)) { 
                        sum += val; count++; 
                        scores.push(val);
                        allValidScores.push(val);
                    } 
                });
                const mean = count > 0 ? (sum / count) : 0;
                
                // คำนวณ S.D. รายข้อ
                let sumSq = 0;
                scores.forEach(v => sumSq += Math.pow(v - mean, 2));
                const sd = count > 1 ? Math.sqrt(sumSq / (count - 1)) : 0;
                
                const qKey = Object.keys(surveyMap)[col - 4];
                qMeans.push({ qText: surveyMap[qKey], mean: mean.toFixed(2), sd: sd.toFixed(2) });
                totalScoreSum += mean; if(mean > 0) validEvalCount++;
            }
            
            // คำนวณ x̄ และ S.D. รวม
            const overallCount = allValidScores.length;
            const overallSum = allValidScores.reduce((a,b)=>a+b, 0);
            const overallMeanNum = overallCount > 0 ? (overallSum / overallCount) : 0;
            let overallSumSq = 0;
            allValidScores.forEach(v => overallSumSq += Math.pow(v - overallMeanNum, 2));
            const overallSdNum = overallCount > 1 ? Math.sqrt(overallSumSq / (overallCount - 1)) : 0;

            const overallMean = overallMeanNum.toFixed(2);
            const overallSd = overallSdNum.toFixed(2);

            const sortedMeans = [...qMeans].sort((a,b) => b.mean - a.mean);
            const top1 = sortedMeans[0] || {qText: '-', mean: '0.00'};
            const top2 = sortedMeans[1] || {qText: '-', mean: '0.00'};

            };

                            <div class="flex justify-between border-b sm:border-0 border-slate-100 pb-2 sm:pb-0"><span>ค่าเฉลี่ยระหว่าง 4.51 - 5.00</span><span class="font-bold">หมายถึง มีความพึงพอใจมากที่สุด</span></div>
                            <div class="flex justify-between border-b sm:border-0 border-slate-100 pb-2 sm:pb-0"><span>ค่าเฉลี่ยระหว่าง 3.51 - 4.50</span><span class="font-bold">หมายถึง มีความพึงพอใจมาก</span></div>
                            <div class="flex justify-between border-b sm:border-0 border-slate-100 pb-2 sm:pb-0"><span>ค่าเฉลี่ยระหว่าง 2.51 - 3.50</span><span class="font-bold">หมายถึง มีความพึงพอใจปานกลาง</span></div>
                            <div class="flex justify-between border-b sm:border-0 border-slate-100 pb-2 sm:pb-0"><span>ค่าเฉลี่ยระหว่าง 1.51 - 2.50</span><span class="font-bold">หมายถึง มีความพึงพอใจน้อย</span></div>
                            <div class="flex justify-between"><span>ค่าเฉลี่ยระหว่าง 1.00 - 1.50</span><span class="font-bold">หมายถึง มีความพึงพอใจน้อยที่สุด</span></div>
                        </div>
                    </div>

                    <div class="mb-8 print:break-inside-avoid">
                        <h3 class="font-bold text-lg text-slate-800 border-l-4 border-primary pl-3 mb-4">ตารางที่ 1 ข้อมูลผู้ตอบแบบสอบถาม</h3>
                        
                        <div class="overflow-x-auto border border-slate-200 rounded-xl mb-4 print:border-none">

                                </thead>
                                <tbody class="text-sm text-slate-700 bg-white">
                                    <tr class="border-b border-slate-100 hover:bg-slate-50 print:border-b-gray-300">
                                        <td class="p-3 font-medium pl-6">ชาย</td>

                        </p>
                        
                        <div class="overflow-x-auto border border-slate-200 rounded-xl print:border-none">

                                </thead>
                                <tbody class="text-sm text-slate-700 bg-white">
            `;
            
            qMeans.forEach((q, index) => {

            if (comments.length > 0) {

            showToast('กำลังซิงค์ข้อมูลกับเซิร์ฟเวอร์...', 'warning');
            
            fetch(GOOGLE_SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: 'saveSettings', 
                    isShirtShopOpen: isShirtShopOpen,

                        <div class="flex flex-col sm:flex-row justify-end gap-3 pt-2 sm:pt-4">
                            <button type="button" onclick="previewCurrentPopup()" class="w-full sm:w-auto px-6 py-3.5 sm:py-4 rounded-xl font-bold text-slate-700 bg-slate-100 hover:bg-slate-200 transition-colors text-sm sm:text-base flex items-center justify-center gap-2"><i class="ph ph-eye text-lg"></i> ดูตัวอย่าง</button>
                            <button type="submit" class="w-full sm:w-auto px-6 sm:px-10 py-3.5 sm:py-4 rounded-xl font-bold text-white bg-admin hover:bg-admin_hover transition-colors shadow-lg text-sm sm:text-base flex items-center justify-center gap-2"><i class="ph ph-floppy-disk text-lg sm:text-xl"></i> บันทึกการตั้งค่าทั้งหมด</button>
                        </div>
                    </form>
                </div>`;
        }

        function previewCurrentPopup() {
            document.getElementById('popup-banner-img').src = document.getElementById('setting-popup-image').value; 
            document.getElementById('popup-title').innerHTML = document.getElementById('setting-popup-title').value.replace(/\n/g, '<br>'); 
            document.getElementById('popup-desc').innerText = document.getElementById('setting-popup-desc').value;
            document.getElementById('homePopupModal').classList.remove('hidden'); 
        }

        function submitSettings(e) {
            e.preventDefault(); const btn = e.target.querySelector('button[type="submit"]'); const txt = btn.innerHTML; btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> บันทึก...'; btn.disabled = true;
            
            popupSettings.enabled = document.getElementById('setting-popup-toggle').checked; 
            popupSettings.title = document.getElementById('setting-popup-title').value; 
            popupSettings.description = document.getElementById('setting-popup-desc').value; 
            popupSettings.imageUrl = document.getElementById('setting-popup-image').value;

            promptPaySettings.accountName = document.getElementById('setting-pp-name').value;
            promptPaySettings.accountNumber = document.getElementById('setting-pp-number').value;
            promptPaySettings.bankName = document.getElementById('setting-pp-bank').value;

            localStorage.setItem('CRRU_PopupSettings', JSON.stringify(popupSettings));
            localStorage.setItem('CRRU_PromptPaySettings', JSON.stringify(promptPaySettings));
            sessionStorage.removeItem('homePopupShown');

            fetch(GOOGLE_SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: 'saveSettings', 
                    isShirtShopOpen: isShirtShopOpen, 
                    popupSettings: popupSettings,
                    promptPaySettings: promptPaySettings
                }) 
            }).then(() => {
                showToast('บันทึกการตั้งค่าเรียบร้อยแล้ว', 'success'); 
                btn.innerHTML = txt; btn.disabled = false; 
            }).catch(() => {
                showToast('บันทึกสำเร็จ (Offline Mode)', 'warning');
                btn.innerHTML = txt; btn.disabled = false; 
            });
        }

        function openHomePopup() { 
            if (!popupSettings.enabled) return;
            document.getElementById('popup-banner-img').src = popupSettings.imageUrl; 
            document.getElementById('popup-title').innerHTML = popupSettings.title.replace(/\n/g, '<br>'); 
            document.getElementById('popup-desc').innerText = popupSettings.description;
            document.getElementById('homePopupModal').classList.remove('hidden'); 
        }
        
        function closeHomePopup() { document.getElementById('homePopupModal').classList.add('hidden'); }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-white border-l-4 border-green-500' : type === 'error' ? 'bg-white border-l-4 border-red-500' : 'bg-white border-l-4 border-amber-500';
            const icon = type === 'success' ? '<i class="ph-fill ph-check-circle text-green-500 text-xl sm:text-2xl"></i>' : type === 'error' ? '<i class="ph-fill ph-x-circle text-red-500 text-xl sm:text-2xl"></i>' : '<i class="ph-fill ph-warning-circle text-amber-500 text-xl sm:text-2xl"></i>';
            toast.className = `${bgColor} text-slate-700 p-3 sm:p-4 rounded-xl shadow-lg flex items-center gap-2 sm:gap-3 transform transition-all duration-300 translate-x-full border border-slate-100 pointer-events-auto`;
            toast.innerHTML = `${icon} <span class="font-bold text-xs sm:text-sm leading-tight">${message}</span>`;
            container.appendChild(toast); requestAnimationFrame(() => toast.classList.remove('translate-x-full'));
            setTimeout(() => { toast.classList.add('translate-x-full'); setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>
</html>
