            }

            return null; // Fallback
        }

        // --- Sub-component: Admin Dashboard ---
        function AdminDashboard({ data, reloadData }) {
            const [activeTab, setActiveTab] = useState('overview');
            const [selectedActivityForSpss, setSelectedActivityForSpss] = useState('');
            const [selectedSummaryAct, setSelectedSummaryAct] = useState(''); // เพิ่ม State สำหรับจัดการตัวกรองยอดเช็คชื่อ
            const [currentPage, setCurrentPage] = useState(1); // เพิ่ม State สำหรับจัดการหน้า Pagination
            
            // Effect: รีเซ็ตหน้ากลับไปที่ 1 เมื่อเปลี่ยนกิจกรรมที่เลือกดู
            useEffect(() => {
                setCurrentPage(1);
            }, [selectedSummaryAct]);

            // Toggle System Master Switch
            const [systemOpen, setSystemOpen] = useState(localStorage.getItem('system_status') !== 'maintenance');
            const toggleSystem = () => {
                const newState = !systemOpen;
                setSystemOpen(newState);
                localStorage.setItem('system_status', newState ? 'open' : 'maintenance');
                Swal.fire({
                    toast: true, position: 'top-end', showConfirmButton: false, timer: 1500,
                    icon: 'success', title: `ตั้งค่าระบบเป็น ${newState ? 'เปิด' : 'ปิด'} เรียบร้อย`
                });
            };

            const handleCreateActivity = async (e) => {
                e.preventDefault();
                const payload = {
                    name: e.target.name.value,
                    date: e.target.date.value,
                    location: e.target.location.value
                };
                Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try {
                    await runGAS('createActivity', payload);
                    Swal.fire('สำเร็จ', 'สร้างกิจกรรมใหม่แล้ว', 'success');
                    e.target.reset();
                    reloadData(); // refresh data
                } catch(err) {
                    Swal.fire('Error', err.message, 'error');
                }
            };

            const toggleActivityStatus = async (id, currentStatus) => {
                Swal.fire({ title: 'กำลังอัปเดต...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try {
                    await runGAS('toggleActivityStatus', id, currentStatus);
                    Swal.close();
                    reloadData();
                } catch(err) {
                    Swal.fire('Error', err.message, 'error');
                }
            };

            // SPSS logic
            const renderSpssTable = () => {
                if(!selectedActivityForSpss) return <tr><td colSpan="6" className="text-center py-12 text-gray-500 font-medium">กรุณาเลือกกิจกรรมเพื่อดูรายงาน</td></tr>;
                
                const evals = data.evaluations.filter(e => String(e.ActivityID) === String(selectedActivityForSpss));
                const N = evals.length;
                if(N === 0) return <tr><td colSpan="6" className="text-center py-12 text-gray-500 font-medium bg-gray-50 border-dashed border-2 border-gray-200">ยังไม่มีผู้ประเมินกิจกรรมนี้</td></tr>;

                let totalSumMean = 0;

                const getMeaning = (mean) => {
                    if(mean >= 4.5) return 'มากที่สุด';
                    if(mean >= 3.5) return 'มาก';
                    if(mean >= 2.5) return 'ปานกลาง';
                    if(mean >= 1.5) return 'น้อย';
                    return 'น้อยที่สุด';
                };

                const rows = [];
                let overallIdx = 1;
                // Reuse existing global surveyData variable defined above
                surveyData.forEach(cat => {
                    cat.questions.forEach(q => {
                        const headerKeys = ['Q1_1', 'Q1_2', 'Q1_3', 'Q1_4', 'Q2_1', 'Q2_2', 'Q2_3', 'Q2_4', 'Q3_1', 'Q3_2', 'Q3_3', 'Q3_4', 'Q3_5'];
                        const hKey = headerKeys[overallIdx - 1];
                        
                        const scores = evals.map(e => Number(e[hKey]) || 0).filter(s => s > 0);
                        const n = scores.length;
                        let mean = 0, sd = 0;
                        if(n > 0) {
                            mean = scores.reduce((a,b)=>a+b, 0) / n;
                            if(n > 1) {
                                const variance = scores.reduce((a,b)=>a+Math.pow(b-mean, 2), 0) / (n - 1);
                                sd = Math.sqrt(variance);
                            }
                            totalSumMean += mean;
                        }

                        rows.push(
                            <tr key={q.id} className="hover:bg-gray-50 transition-colors">
                                <td className="border-b border-gray-100 px-4 py-3 text-center text-gray-500 font-medium">{overallIdx}</td>
                                <td className="border-b border-gray-100 px-4 py-3 text-gray-800">{q.text.split(' ').slice(1).join(' ')}</td>
                                <td className="border-b border-gray-100 px-4 py-3 text-center text-gray-600">{n}</td>
                                <td className="border-b border-gray-100 px-4 py-3 text-center text-brand-600 font-bold">{mean.toFixed(2)}</td>
                                <td className="border-b border-gray-100 px-4 py-3 text-center text-gray-500 font-medium">{sd.toFixed(2)}</td>
                                <td className="border-b border-gray-100 px-4 py-3 text-center text-gray-700 font-bold">
                                    <span className={`px-2 py-1 rounded text-xs ${mean >= 3.5 ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>
                                        {getMeaning(mean)}
                                    </span>
                                </td>
                            </tr>
                        );
                        overallIdx++;
                    });
                });

                const grandMean = totalSumMean / 13;
                rows.push(
                    <tr key="total" className="bg-gradient-to-r from-brand-50 to-rose-50 border-t-2 border-brand-200">
                        <td colSpan="3" className="px-5 py-4 text-right font-bold text-gray-800">ค่าเฉลี่ยรวมภาพรวม</td>
                        <td className="px-5 py-4 text-center text-brand-700 font-bold text-lg">{grandMean.toFixed(2)}</td>
                        <td className="px-5 py-4 text-center text-gray-500 font-bold">-</td>
                        <td className="px-5 py-4 text-center text-brand-700 font-bold">{getMeaning(grandMean)}</td>
                    </tr>
                );
                return rows;
            };

            const exportWord = () => {
                if(!selectedActivityForSpss) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกกิจกรรม', 'warning');
                const htmlContent = document.getElementById('spss-export-area').innerHTML;
                const header = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head><meta charset='utf-8'><style> body { font-family: 'TH Sarabun PSK', sans-serif; font-size: 16pt; } table { width: 100%; border-collapse: collapse; } th, td { border: 1px solid black; padding: 5px; } th { background-color: #f2f2f2; } </style></head>
                    <body>${htmlContent}</body></html>
                `;
                const blob = new Blob(['\ufeff', header], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `SPSS_Report_${selectedActivityForSpss}.doc`;
                link.click();
            };

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col md:flex-row font-sans relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-72 bg-gradient-to-b from-brand-500/10 to-transparent z-0"></div>
                    
                    {/* Sidebar */}
                    <aside className="w-full md:w-72 bg-gray-900 text-white flex-shrink-0 flex flex-col shadow-2xl z-20">
                        <div className="p-8 border-b border-gray-800/50 flex items-center gap-4">
                            <div className="w-12 h-12 bg-gradient-to-br from-brand-500 to-rose-500 rounded-2xl flex items-center justify-center shadow-lg">
                                <i className="fa-solid fa-shield-halved text-white text-xl"></i>
                            </div>
                            <div>
                                <h2 className="text-2xl font-bold tracking-tight">Admin Panel</h2>
                                <p className="text-xs text-brand-400 font-medium tracking-wider uppercase mt-0.5">Activity Control</p>
                            </div>
                        </div>
                        <nav className="flex-1 p-5 space-y-2 overflow-y-auto no-scrollbar">
                            <p className="text-[10px] text-gray-500 font-bold mb-4 px-3 uppercase tracking-widest">Main Menu</p>
                            {['overview', 'activities', 'summary', 'spss'].map(tab => {
                                const labels = { overview: 'ภาพรวมระบบ', activities: 'จัดการกิจกรรม', summary: 'ยอดเช็คชื่อ (Real-time)', spss: 'รายงาน SPSS & สถิติ' };
                                const icons = { overview: 'fa-chart-pie', activities: 'fa-list-check', summary: 'fa-users-viewfinder', spss: 'fa-file-word text-blue-400' };
                                return (
                                    <button key={tab} onClick={() => setActiveTab(tab)}
                                        className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-medium text-sm ${activeTab === tab ? 'bg-gradient-to-r from-brand-500/20 to-transparent text-white border-l-4 border-brand-500 shadow-inner' : 'text-gray-400 hover:bg-gray-800/50 hover:text-white border-l-4 border-transparent'}`}>
                                        <i className={`fa-solid ${icons[tab]} w-5 text-lg ${activeTab === tab ? 'text-brand-400' : ''}`}></i> {labels[tab]}
                                    </button>
                                );
                            })}
                            
                            <div className="mt-8 pt-6 border-t border-gray-800/50">
                                <p className="text-[10px] text-gray-500 font-bold mb-4 px-3 uppercase tracking-widest">System Settings</p>
                                <div className="px-1">
                                    <button onClick={toggleSystem} className={`w-full flex items-center justify-between px-5 py-4 rounded-2xl border transition-all ${systemOpen ? 'border-green-500/30 bg-green-500/10 text-green-400 hover:bg-green-500/20' : 'border-red-500/30 bg-red-500/10 text-red-400 hover:bg-red-500/20'}`}>
                                        <span className="flex items-center gap-3 font-medium text-sm"><i className={`fa-solid ${systemOpen ? 'fa-toggle-on text-xl' : 'fa-toggle-off text-xl'}`}></i> สถานะระบบ</span>
                                        <span className="text-[10px] font-bold px-2 py-1 bg-gray-900 rounded-md shadow-inner">{systemOpen ? 'ONLINE' : 'OFFLINE'}</span>
                                    </button>
                                </div>
                            </div>
                        </nav>
                        <div className="p-5 border-t border-gray-800/50">
                            <button onClick={() => window.location.reload()} className="w-full flex items-center justify-center gap-2 text-sm text-gray-400 hover:text-white py-4 rounded-2xl hover:bg-gray-800/50 transition-all font-medium border border-transparent hover:border-gray-700 mb-4">
                                <i className="fa-solid fa-right-from-bracket"></i> กลับหน้าเว็บไซต์
                            </button>
                            <div className="text-center border-t border-gray-800/50 pt-4">
                                <p className="text-[10px] text-gray-500 uppercase tracking-widest">Developed by</p>
                                <p className="text-xs font-bold text-brand-500 mt-1 tracking-wider">JENNAEONG</p>
                            </div>
                        </div>
                    </aside>

                    {/* Content */}
                    <main className="flex-1 p-4 md:p-10 overflow-y-auto relative z-10">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
                            <div>
                                <h2 className="text-3xl font-bold text-gray-800 tracking-tight">
                                    {activeTab === 'overview' && 'ภาพรวมระบบ (Overview)'}
                                    {activeTab === 'activities' && 'การจัดการกิจกรรม (Activity)'}
                                    {activeTab === 'summary' && 'ยอดเช็คชื่อ (Real-time)'}
                                    {activeTab === 'spss' && 'รายงานผลการประเมิน (SPSS)'}
                                </h2>
                                <p className="text-gray-500 mt-2 font-medium text-sm">แผงควบคุมและจัดการข้อมูลสำหรับผู้ดูแลระบบ</p>
                            </div>
                            <button onClick={() => reloadData()} className="bg-white hover:bg-gray-50 text-gray-700 px-6 py-3 rounded-2xl text-sm font-bold shadow-sm border border-gray-200 transition-all active:scale-95 flex items-center gap-2 hover:border-brand-300 hover:text-brand-600">
                                <i className="fa-solid fa-rotate-right"></i> รีเฟรชข้อมูล
                            </button>
                        </div>

                        <div>
                            {/* Overview Tab */}
                            {activeTab === 'overview' && (
                                <div className="space-y-8">
                                    {/* Top Summary Cards */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-6 transform hover:-translate-y-1 transition duration-300 relative overflow-hidden group">
                                            <div className="absolute -right-4 -top-4 w-24 h-24 bg-blue-50 rounded-full group-hover:scale-150 transition-transform duration-500 z-0"></div>
                                            <div className="relative z-10 w-16 h-16 bg-gradient-to-br from-blue-100 to-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner border border-blue-100"><i className="fa-solid fa-calendar-check"></i></div>
                                            <div className="relative z-10"><p className="text-gray-500 text-sm font-medium mb-1">กิจกรรมทั้งหมด</p><p className="text-4xl font-bold text-gray-800 tracking-tight">{data.activities.length}</p></div>
                                        </div>
                                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-6 transform hover:-translate-y-1 transition duration-300 relative overflow-hidden group">
                                            <div className="absolute -right-4 -top-4 w-24 h-24 bg-brand-50 rounded-full group-hover:scale-150 transition-transform duration-500 z-0"></div>
                                            <div className="relative z-10 w-16 h-16 bg-gradient-to-br from-brand-100 to-rose-50 text-brand-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner border border-brand-100"><i className="fa-solid fa-users"></i></div>
                                            <div className="relative z-10"><p className="text-gray-500 text-sm font-medium mb-1">ยอดเช็คชื่อรวม</p><p className="text-4xl font-bold text-gray-800 tracking-tight">{data.checkins.length}</p></div>
                                        </div>
                                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-6 transform hover:-translate-y-1 transition duration-300 relative overflow-hidden group">
                                            <div className="absolute -right-4 -top-4 w-24 h-24 bg-green-50 rounded-full group-hover:scale-150 transition-transform duration-500 z-0"></div>
                                            <div className="relative z-10 w-16 h-16 bg-gradient-to-br from-green-100 to-emerald-50 text-green-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner border border-green-100"><i className="fa-solid fa-star"></i></div>
                                            <div className="relative z-10"><p className="text-gray-500 text-sm font-medium mb-1">แบบประเมินรวม</p><p className="text-4xl font-bold text-gray-800 tracking-tight">{data.evaluations.length}</p></div>
                                        </div>
                                    </div>

                                    {/* Breakdown by Activity */}
                                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100">
                                        <div className="flex items-center gap-4 mb-8 border-b border-gray-100 pb-5">
                                            <div className="w-10 h-10 bg-brand-50 border border-brand-100 text-brand-600 rounded-xl flex items-center justify-center shadow-inner"><i className="fa-solid fa-chart-bar"></i></div>
                                            <h3 className="font-bold text-gray-800 text-xl tracking-tight">สรุปยอดผู้เข้าร่วมแยกตามกิจกรรม</h3>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                            {data.activities.length === 0 ? (
                                                <div className="col-span-full text-center py-10 text-gray-400 font-medium bg-gray-50 rounded-2xl border border-dashed border-gray-200">ไม่มีข้อมูลกิจกรรม</div>
                                            ) : (
                                                data.activities.map(act => {
                                                    const count = data.checkins.filter(c => String(c.ActivityID) === String(act.ActivityID)).length;
                                                    return (
                                                        <div key={act.ActivityID} className="p-5 border border-gray-100 rounded-2xl flex items-center justify-between hover:shadow-xl hover:shadow-brand-500/5 transition-all transform hover:-translate-y-1 bg-white group cursor-default">
                                                            <div className="pr-4">
                                                                <h4 className="font-bold text-gray-800 text-lg leading-tight mb-2 group-hover:text-brand-600 transition-colors">{act.Name}</h4>
                                                                <div className="flex items-center gap-3 text-sm text-gray-500 font-medium">
                                                                    <span className="flex items-center gap-1"><i className="fa-regular fa-calendar text-gray-400"></i> {act.Date}</span>
                                                                    <span className={`px-2.5 py-0.5 rounded-md text-[10px] font-bold border ${act.Status === 'open' ? 'bg-green-50 text-green-600 border-green-200' : 'bg-gray-100 text-gray-500 border-gray-200'}`}>
                                                                        {act.Status === 'open' ? 'กำลังเปิดรับ' : 'ปิดแล้ว'}
                                                                    </span>
                                                                </div>
                                                            </div>
                                                            <div className="flex-shrink-0 flex flex-col items-center justify-center w-16 h-16 bg-gradient-to-br from-brand-50 to-rose-50 border border-brand-100 rounded-xl shadow-inner group-hover:from-brand-500 group-hover:to-rose-500 transition-colors">
                                                                <span className="text-2xl font-black text-brand-600 group-hover:text-white leading-none">{count}</span>
                                                                <span className="text-[10px] text-brand-400 group-hover:text-brand-200 font-bold mt-1">คน</span>
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Activities Tab */}
                            {activeTab === 'activities' && (
                                <div className="grid lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-1 bg-white p-8 rounded-3xl shadow-sm border border-gray-100 h-fit">
                                        <div className="flex items-center gap-4 mb-8 border-b border-gray-100 pb-5">
                                            <div className="w-10 h-10 bg-brand-50 border border-brand-100 text-brand-600 rounded-xl flex items-center justify-center shadow-inner"><i className="fa-solid fa-plus"></i></div>
                                            <h3 className="font-bold text-gray-800 text-xl tracking-tight">สร้างกิจกรรมใหม่</h3>
                                        </div>
                                        <form onSubmit={handleCreateActivity} className="space-y-6">
                                            <div><label className="text-sm font-bold text-gray-700 block mb-2">ชื่อกิจกรรม</label><input name="name" required className="w-full border border-gray-200 bg-gray-50 rounded-2xl px-5 py-4 outline-none focus:border-brand-400 focus:ring-4 focus:ring-brand-500/20 transition-all font-medium text-gray-800" placeholder="ระบุชื่อกิจกรรม" /></div>
                                            <div><label className="text-sm font-bold text-gray-700 block mb-2">วันที่</label><input type="date" name="date" required className="w-full border border-gray-200 bg-gray-50 rounded-2xl px-5 py-4 outline-none focus:border-brand-400 focus:ring-4 focus:ring-brand-500/20 transition-all text-gray-600 font-medium" /></div>
                                            <div><label className="text-sm font-bold text-gray-700 block mb-2">สถานที่</label><input name="location" required className="w-full border border-gray-200 bg-gray-50 rounded-2xl px-5 py-4 outline-none focus:border-brand-400 focus:ring-4 focus:ring-brand-500/20 transition-all font-medium text-gray-800" placeholder="ระบุสถานที่จัด" /></div>
                                            <button className="w-full bg-gradient-to-r from-brand-500 to-rose-500 hover:from-brand-600 hover:to-rose-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-brand-500/30 transition-all transform active:scale-95 mt-4 text-lg">บันทึกข้อมูล</button>
                                        </form>
                                    </div>
                                    <div className="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm whitespace-nowrap">
                                                <thead className="bg-gray-50 text-gray-500 border-b border-gray-100 font-bold uppercase tracking-wider text-xs">
                                                    <tr><th className="px-6 py-5">ชื่อกิจกรรม</th><th className="px-6 py-5">วันที่ / สถานที่</th><th className="px-6 py-5 text-center">สถานะ</th><th className="px-6 py-5 text-center">เปิด/ปิด</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-50">
                                                    {data.activities.map(act => (
                                                        <tr key={act.ActivityID} className="hover:bg-gray-50 transition-colors">
                                                            <td className="px-6 py-5 font-bold text-gray-800 text-base">{act.Name}</td>
                                                            <td className="px-6 py-5 text-gray-500 font-medium">
                                                                <div className="flex items-center gap-2"><div className="w-6 h-6 bg-gray-100 rounded-full flex items-center justify-center"><i className="fa-regular fa-calendar text-brand-500 text-[10px]"></i></div> {act.Date}</div>
                                                                <div className="flex items-center gap-2 mt-2 text-xs"><div className="w-6 h-6 bg-gray-100 rounded-full flex items-center justify-center"><i className="fa-solid fa-location-dot text-gray-400 text-[10px]"></i></div> {act.Location}</div>
                                                            </td>
                                                            <td className="px-6 py-5 text-center">
                                                                <span className={`px-3 py-1.5 rounded-md text-xs font-bold border ${act.Status === 'open' ? 'bg-green-50 text-green-600 border-green-200' : 'bg-red-50 text-red-600 border-red-200'}`}>
                                                                    {act.Status === 'open' ? 'เปิดรับ' : 'ปิดแล้ว'}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-5 text-center">
                                                                <button onClick={() => toggleActivityStatus(act.ActivityID, act.Status)} className="text-3xl hover:scale-110 transition-transform focus:outline-none drop-shadow-sm">
                                                                    <i className={`fa-solid ${act.Status === 'open' ? 'fa-toggle-on text-green-500' : 'fa-toggle-off text-gray-300'}`}></i>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* SPSS Tab */}
                            {activeTab === 'spss' && (
                                <div className="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-gray-100">
                                    <div className="flex flex-col md:flex-row gap-4 mb-8 items-end border-b border-gray-100 pb-8">
                                        <div className="flex-1 w-full">
                                            <label className="block text-sm font-bold text-gray-700 mb-3"><i className="fa-solid fa-filter text-brand-500 mr-2"></i>เลือกกิจกรรมที่ต้องการดูรายงาน</label>
                                            <div className="relative">
                                                <select className="w-full border border-gray-200 rounded-2xl px-5 py-4 outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-500/20 bg-gray-50 text-gray-800 font-bold appearance-none cursor-pointer"
                                                    value={selectedActivityForSpss} onChange={(e) => setSelectedActivityForSpss(e.target.value)}>
                                                    <option value="" className="text-gray-400">-- กรุณาเลือกกิจกรรม --</option>
                                                    {data.activities.map(a => <option key={a.ActivityID} value={a.ActivityID}>{a.Name}</option>)}
                                                </select>
                                                <i className="fa-solid fa-chevron-down absolute right-5 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                                            </div>
                                        </div>
                                        <button onClick={exportWord} className="w-full md:w-auto bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold py-4 px-8 rounded-2xl shadow-lg shadow-blue-500/30 transition-all transform hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-3">
                                            <i className="fa-solid fa-file-word text-xl"></i> Export Word
                                        </button>
                                    </div>

                                    <div className="overflow-x-auto rounded-2xl border border-gray-200" id="spss-export-area">
                                        {selectedActivityForSpss && (
                                            <div style={{display:'none'}} className="print-header mb-4 text-center">
                                                <h3 style={{fontSize:'18pt', fontWeight:'bold'}}>รายงานผลการประเมินความพึงพอใจ</h3>
                                                <p>{data.activities.find(a=>String(a.ActivityID)===String(selectedActivityForSpss))?.Name}</p>
                                            </div>
                                        )}
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-gray-50 text-gray-600 font-bold border-b border-gray-200">
                                                <tr>
                                                    <th className="p-4 text-center w-12 border-r border-gray-200">ข้อ</th>
                                                    <th className="p-4 border-r border-gray-200">รายการประเมิน</th>
                                                    <th className="p-4 text-center w-16 border-r border-gray-200">N</th>
                                                    <th className="p-4 text-center w-20 border-r border-gray-200">x̄</th>
                                                    <th className="p-4 text-center w-20 border-r border-gray-200">S.D.</th>
                                                    <th className="p-4 text-center w-32">ระดับ</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {renderSpssTable()}
                                            </tbody>
                                        </table>
                                    </div>
                                    
                                    {/* Suggestions */}
                                    {selectedActivityForSpss && (
                                        <div className="mt-10 p-8 bg-brand-50/40 rounded-2xl border border-brand-100">
                                            <h4 className="font-bold text-gray-800 mb-5 text-lg flex items-center gap-3"><div className="w-8 h-8 bg-brand-100 rounded-lg flex items-center justify-center"><i className="fa-regular fa-comments text-brand-600"></i></div> ข้อเสนอแนะเพิ่มเติม</h4>
                                            <ul className="list-disc pl-6 space-y-3 text-gray-700 font-medium text-sm">
                                                {data.evaluations.filter(e => String(e.ActivityID)===String(selectedActivityForSpss) && e.Suggestion && e.Suggestion.trim()!=='').length > 0 
                                                    ? data.evaluations.filter(e => String(e.ActivityID)===String(selectedActivityForSpss) && e.Suggestion && e.Suggestion.trim()!=='').map((e,i) => (
                                                        <li key={i} className="pl-2 leading-relaxed bg-white p-3 rounded-xl border border-brand-50 shadow-sm list-none flex gap-3 items-start"><i className="fa-solid fa-quote-left text-brand-300 mt-1"></i> {e.Suggestion}</li>
                                                    ))
                                                    : <li className="text-gray-400 list-none -ml-6 font-normal bg-white p-4 rounded-xl border border-dashed border-gray-200 text-center">ไม่มีข้อเสนอแนะ</li>
                                                }
                                            </ul>
                                        </div>
                                    )}
                                </div>
                            )}
                            
                            {/* Summary Tab */}
                            {activeTab === 'summary' && (
                                 <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100">
                                    <div className="flex flex-col md:flex-row gap-4 justify-between items-start md:items-center mb-8 border-b border-gray-100 pb-6">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 bg-blue-50 border border-blue-100 text-blue-600 rounded-xl flex items-center justify-center shadow-inner"><i className="fa-solid fa-list-ol"></i></div>
                                            <h3 className="text-xl font-bold text-gray-800 tracking-tight">ยอดเช็คชื่อ (Activity Summary)</h3>
                                        </div>
                                        <div className="w-full md:w-1/3 relative">
                                            <select
                                                className="w-full border border-gray-200 rounded-2xl px-5 py-3.5 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 bg-gray-50 text-gray-800 font-bold appearance-none cursor-pointer transition-all shadow-inner"
                                                value={selectedSummaryAct}
                                                onChange={(e) => setSelectedSummaryAct(e.target.value)}
                                            >
                                                <option value="">-- ดูกิจกรรมทั้งหมด --</option>
                                                {data.activities.map(a => <option key={a.ActivityID} value={a.ActivityID}>{a.Name}</option>)}
                                            </select>
                                            <i className="fa-solid fa-chevron-down absolute right-5 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                                        </div>
                                    </div>

                                    {/* Calculate filtered data */}
                                    {(() => {
                                        const filteredCheckins = selectedSummaryAct
                                            ? data.checkins.filter(c => String(c.ActivityID) === String(selectedSummaryAct))
                                            : data.checkins;

                                        // Calculate Major breakdown
                                        const majorCounts = {};
                                        filteredCheckins.forEach(c => {
                                            majorCounts[c.Major] = (majorCounts[c.Major] || 0) + 1;
                                        });
                                        const sortedMajors = Object.entries(majorCounts).sort((a, b) => b[1] - a[1]);

                                        // Pagination Logic (15 items per page)
                                        const ITEMS_PER_PAGE = 15;
                                        const reversedCheckins = [...filteredCheckins].reverse(); // เรียงจากใหม่สุดไปเก่าสุด
                                        const totalPages = Math.ceil(reversedCheckins.length / ITEMS_PER_PAGE) || 1;
                                        const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
                                        const paginatedCheckins = reversedCheckins.slice(startIndex, startIndex + ITEMS_PER_PAGE);

                                        return (
                                            <div>
                                                {/* Summary Cards */}
                                                <div className="mb-10">
                                                    <h4 className="font-bold text-gray-700 mb-5 flex items-center gap-2"><i className="fa-solid fa-chart-simple text-blue-500"></i> สรุปยอดผู้เข้าร่วม: <span className="text-blue-600 text-2xl ml-1">{filteredCheckins.length}</span> คน</h4>
                                                    {sortedMajors.length > 0 ? (
                                                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                                                            {sortedMajors.map(([major, count]) => (
                                                                <div key={major} className="bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100 p-5 rounded-2xl flex flex-col items-center justify-center text-center shadow-sm hover:shadow-md transition-shadow">
                                                                    <span className="text-sm font-bold text-gray-500 mb-2 leading-tight">{major || 'ไม่ระบุ'}</span>
                                                                    <span className="text-3xl font-black text-blue-600 drop-shadow-sm">{count}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    ) : (
                                                        <div className="text-center p-8 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 text-gray-400 font-medium">ไม่มีข้อมูลผู้เข้าร่วมในกิจกรรมนี้</div>
                                                    )}
                                                </div>

                                                {/* Table */}
                                                <h4 className="font-bold text-gray-700 mb-4 flex items-center gap-2"><i className="fa-solid fa-table-list text-gray-400"></i> รายชื่อผู้เข้าร่วม</h4>
                                                <div className="overflow-x-auto rounded-2xl border border-gray-100 shadow-sm mb-4">
                                                    <table className="w-full text-sm text-left whitespace-nowrap">
                                                        <thead className="bg-gray-50 border-b border-gray-200 text-gray-500 font-bold uppercase tracking-wider text-xs">
                                                            <tr><th className="px-6 py-5">ลำดับ</th><th className="px-6 py-5">วัน/เวลา</th><th className="px-6 py-5">รหัส / ชื่อ-สกุล</th><th className="px-6 py-5">สาขาวิชา</th><th className="px-6 py-5">กิจกรรม</th></tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-gray-50">
                                                            {paginatedCheckins.map((c, i) => (
                                                                <tr key={i} className="hover:bg-blue-50/30 transition-colors">
                                                                    <td className="px-6 py-4 text-gray-400 font-bold text-center w-12">{startIndex + i + 1}</td>
                                                                    <td className="px-6 py-4 text-gray-500 font-medium">
                                                                        <div className="flex items-center gap-2"><div className="w-6 h-6 bg-gray-100 rounded-full flex items-center justify-center"><i className="fa-regular fa-clock text-blue-400 text-[10px]"></i></div> <span className="font-bold text-gray-700">{new Date(c.Timestamp).toLocaleString('th-TH').split(' ')[1]}</span></div>
                                                                        <div className="text-xs text-gray-400 mt-1 ml-8">{new Date(c.Timestamp).toLocaleDateString('th-TH')}</div>
                                                                    </td>
                                                                    <td className="px-6 py-4 font-bold text-gray-800 text-base">{c.StudentID}<br/><span className="text-sm font-medium text-gray-500">{c.Name}</span></td>
                                                                    <td className="px-6 py-4"><span className="px-3 py-1 bg-blue-50 text-blue-600 rounded-md font-bold text-xs border border-blue-100">{c.Major}</span></td>
                                                                    <td className="px-6 py-4 text-gray-600 font-medium whitespace-normal min-w-[200px]">{c.ActivityName}</td>
                                                                </tr>
                                                            ))}
                                                            {reversedCheckins.length === 0 && <tr><td colSpan="5" className="text-center p-12 text-gray-400 font-medium">ยังไม่มีข้อมูลการเช็คชื่อ</td></tr>}
                                                        </tbody>
                                                    </table>
                                                </div>

                                                {/* Pagination Controls */}
                                                {reversedCheckins.length > 0 && (
                                                    <div className="flex flex-col sm:flex-row justify-between items-center gap-4 px-2 mt-4">
                                                        <span className="text-sm text-gray-500 font-medium bg-gray-50 px-4 py-2 rounded-xl border border-gray-100">
                                                            แสดงรายการที่ <span className="font-bold text-gray-800">{startIndex + 1}</span> ถึง <span className="font-bold text-gray-800">{Math.min(startIndex + ITEMS_PER_PAGE, reversedCheckins.length)}</span> จากทั้งหมด <span className="font-bold text-blue-600">{reversedCheckins.length}</span> รายการ
                                                        </span>
                                                        <div className="flex items-center gap-2">
                                                            <button 
                                                                onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                                                disabled={currentPage === 1}
                                                                className="px-4 py-2 rounded-xl border border-gray-200 bg-white text-gray-600 disabled:opacity-50 hover:bg-gray-50 font-medium text-sm transition-all active:scale-95 shadow-sm flex items-center gap-2"
                                                            >
                                                                <i className="fa-solid fa-chevron-left"></i> ย้อนกลับ
                                                            </button>
                                                            <span className="text-sm font-bold text-blue-700 bg-blue-50 px-4 py-2 rounded-xl border border-blue-200 shadow-inner">
                                                                หน้า {currentPage} / {totalPages}
                                                            </span>
                                                            <button 
                                                                onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                                                disabled={currentPage === totalPages}
                                                                className="px-4 py-2 rounded-xl border border-gray-200 bg-white text-gray-600 disabled:opacity-50 hover:bg-gray-50 font-medium text-sm transition-all active:scale-95 shadow-sm flex items-center gap-2"
                                                            >
                                                                ถัดไป <i className="fa-solid fa-chevron-right"></i>
                                                            </button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })()}
                                 </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        // --- Render App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
