<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIGIT.CRRU - ระบบกิจกรรมและจองเสื้อ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: {
                        orange: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c', 800: '#9a3412', 900: '#7c2d12' },
                        charcoal: { 50: '#f9f9f9', 100: '#f3f4f6', 800: '#374151', 900: '#111827' }
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #fffcf9 0%, #ffedd5 100%);
            background-attachment: fixed;
            color: #111827;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 80px; 
            transition: color 0.3s ease;
        }
        @media (min-width: 768px) { body { padding-bottom: 0; } }

        .luxury-card { background-color: #ffffff; border: 1px solid rgba(255, 237, 213, 0.6); box-shadow: 0 10px 40px -10px rgba(249, 115, 22, 0.08), 0 1px 3px rgba(0,0,0,0.02); border-radius: 1.5rem; transition: all 0.4s ease; }
        .luxury-input { background-color: #fdfdfd; border: 1px solid #fce7d2; border-radius: 1rem; padding: 1rem 1.25rem; color: #111827; transition: all 0.3s ease; }
        .luxury-input:focus { border-color: #f97316; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.15); outline: none; }
        .btn-primary { background-color: #111827; color: #ffffff; border: 1px solid #111827; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #374151; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .btn-gradient { background: linear-gradient(135deg, #fb923c 0%, #ea580c 100%); color: #ffffff; transition: all 0.3s ease; border: none; }
        .btn-gradient:hover { box-shadow: 0 8px 20px rgba(234, 88, 12, 0.3); filter: brightness(1.05); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        html.dark body { background: linear-gradient(135deg, #1c1512 0%, #120c0a 100%); color: #e5e5e5; }
        html.dark .bg-white { background-color: #1e1e1e !important; }
        html.dark .text-charcoal-900 { color: #f5f5f5 !important; }
        html.dark .text-gray-800 { color: #e5e5e5 !important; }
        html.dark .text-gray-500 { color: #a3a3a3 !important; }
        html.dark .text-gray-400 { color: #737373 !important; }
        html.dark .border-gray-100, html.dark .border-gray-200, html.dark .border-gray-300 { border-color: #333 !important; }
        html.dark .bg-gray-50, html.dark .bg-charcoal-50 { background-color: #262626 !important; }
        html.dark .bg-charcoal-900 { background-color: #0a0a0a !important; }
        html.dark .luxury-card { background-color: #1e1e1e; border-color: #333; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        html.dark .luxury-input { background-color: #121212; border-color: #333; color: #f5f5f5; }
        html.dark .luxury-input:focus { border-color: #f97316; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.2); }
        html.dark .btn-primary { background-color: #f5f5f5; color: #121212; border-color: #f5f5f5; }
        html.dark table thead { background-color: #262626 !important; color: #d4d4d8 !important; }
        html.dark tr, html.dark td, html.dark th { border-color: #333 !important; }
        html.dark tr:hover { background-color: #262626 !important; }
        html.dark select { background-color: #121212 !important; color: #fff !important; }
    </style>
</head>
<body class="selection:bg-orange-500 selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_CONFIG = {
            USE_FAST_CSV: true,
            SHEET_ID: "1KLJNWUUIj1r6eqCZnaF-F6nA2FQg7pvOHMk0PyDCyAc", 
            // 🚨 ใส่ลิงก์ Web App (Google Apps Script) อันใหม่ล่าสุดของท่านที่นี่ 🚨
            WEB_APP_URL: "https://script.google.com/macros/s/AKfycbwRkO2W4mNItUq70h1-8XN-G_x1-5n7wLpL7o3-uJz6Oa_T9zH_nF_Jg6s2Z_Y8XW/exec", 
            getCSVUrl: function(sheetName) {
                return `https://docs.google.com/spreadsheets/d/${this.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}&_=${new Date().getTime()}`;
            }
        };

        const fetchFastCSV = (sheetName) => {
            return new Promise((resolve, reject) => {
                Papa.parse(API_CONFIG.getCSVUrl(sheetName), {
                    download: true, header: true, skipEmptyLines: true,
                    complete: (results) => resolve(results.data),
                    error: (error) => reject(error)
                });
            });
        };

        const runGAS = async (functionName, ...args) => {
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[functionName](...args);
                });
            } else if (API_CONFIG.WEB_APP_URL && API_CONFIG.WEB_APP_URL.startsWith("https://script.google.com")) {
                try {
                    const response = await fetch(API_CONFIG.WEB_APP_URL, {
                        method: 'POST', redirect: 'follow',
                        body: JSON.stringify({ action: functionName, params: args }),
                        headers: { 'Content-Type': 'text/plain' } 
                    });
                    const result = await response.json();
                    if (result.success === false && result.error) throw new Error(result.error);
                    return result.data !== undefined ? result.data : result;
                } catch (error) { 
                    console.warn(`runGAS Fetch Error (${functionName}):`, error);
                    throw error; 
                }
            } else {
                return new Promise((resolve) => setTimeout(() => resolve({ success: true, count: 1 }), 500));
            }
        };

        const surveyData = [
            {
                title: "1. กระบวนการ ขั้นตอนการให้บริการ",
                questions: [
                    { id: "q1", text: "1.1 การประชาสัมพันธ์โครงการ ฯ" }, { id: "q2", text: "1.2 ความเหมาะสมของสถานที่" },
                    { id: "q3", text: "1.3 ความเหมาะสมของระยะเวลา" }, { id: "q4", text: "1.4 การจัดลำดับขั้นตอนของกิจกรรม" }
                ]
            },
            {
                title: "2. การอำนวยความสะดวก",
                questions: [
                    { id: "q5", text: "2.1 เอกสาร" }, { id: "q6", text: "2.2 โสตทัศนูปกรณ์" },
                    { id: "q7", text: "2.3 เจ้าหน้าที่สนับสนุน" }, { id: "q8", text: "2.4 อาหาร,เครื่องดื่มและสถานที่" }
                ]
            },
            {
                title: "3. คุณภาพการให้บริการ",
                questions: [
                    { id: "q9", text: "3.1 ท่านได้รับความรู้ แนวคิด ทักษะและประสบการณ์ใหม่ ๆ จากโครงการ" },
                    { id: "q10", text: "3.2 ท่านสามารถนำสิ่งที่ได้รับจากโครงการ/กิจกรรมนี้ไปใช้ในการปฏิบัติงาน" },
                    { id: "q11", text: "3.3 สิ่งที่ท่านได้รับจากโครงการ/กิจกรรมครั้งนี้ตรงตามความคาดหวังของท่านหรือไม่" },
                    { id: "q12", text: "3.4 โครงการ/กิจกรรมนี้เอื้ออำนวยต่อการเรียนรู้และพัฒนาความสามารถของท่าน" },
                    { id: "q13", text: "3.5 ประโยชน์ที่ท่านได้รับจากโครงการ/กิจกรรม" }
                ]
            }
        ];

        function App() {
            const [view, setView] = useState('home'); 
            const [student, setStudent] = useState(null);
            const [activities, setActivities] = useState([]);
            const [selectedActivity, setSelectedActivity] = useState(null);
            const [surveyAnswers, setSurveyAnswers] = useState({});
            const [suggestion, setSuggestion] = useState('');
            const [historyData, setHistoryData] = useState([]);

            const [systemOpen, setSystemOpen] = useState(true);
            const [adminData, setAdminData] = useState(null);

            const [searchPurpose, setSearchPurpose] = useState('activity');
            const [shirtSystemOpen, setShirtSystemOpen] = useState(true);
            const [shirtPrice, setShirtPrice] = useState({ normal: 250, oversize: 380, status: 'open' });
            const [receiptSettings, setReceiptSettings] = useState({ header: 'สโมสรนักศึกษาคณะเทคโนโลยีดิจิทัล มหาวิทยาลัยราชภัฏเชียงราย\nที่อยู่: 80 ซอย 9 ตำบล บ้านดู่ อำเภอเมืองเชียงราย เชียงราย 57100', note: 'กรุณานำใบเสร็จนี้มาแสดงในวันรับเสื้อ' });
            
            const [isEditingOrder, setIsEditingOrder] = useState(false);
            const [poloGender, setPoloGender] = useState('ชาย');
            const [poloSize, setPoloSize] = useState('M');
            const [poloQty, setPoloQty] = useState(1);
            const [tshirtGender, setTshirtGender] = useState('ชาย');
            const [tshirtSize, setTshirtSize] = useState('M');
            const [tshirtQty, setTshirtQty] = useState(1);
            const [receiptData, setReceiptData] = useState(null);

            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('theme') === 'dark');

            useEffect(() => {
                if (isDarkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); }
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [isDarkMode]);

            useEffect(() => {
                const loadInitialData = async () => {
                    try {
                        let acts = [];
                        if (API_CONFIG.USE_FAST_CSV && API_CONFIG.SHEET_ID && API_CONFIG.SHEET_ID !== "YOUR_SHEET_ID_HERE") {
                            const allActs = await fetchFastCSV('Activities');
                            acts = allActs.filter(a => a.Status === 'open');
                        } else { acts = await runGAS('getActiveActivities'); }
                        setActivities(acts || []);
                        
                        let priceInfo = null;
                        if (API_CONFIG.USE_FAST_CSV && API_CONFIG.SHEET_ID && API_CONFIG.SHEET_ID !== "YOUR_SHEET_ID_HERE") {
                            try {
                                const settings = await fetchFastCSV('Settings');
                                const priceRow = settings.find(r => r.Key === 'ShirtPrice') || {Value1: 250, Value2: 380};
                                const statusRow = settings.find(r => r.Key === 'ShirtStatus') || {Value1: 'open', Value2: ''};
                                const receiptRow = settings.find(r => r.Key === 'ReceiptConfig') || {Value1: 'สโมสรนักศึกษาคณะเทคโนโลยีดิจิทัล มหาวิทยาลัยราชภัฏเชียงราย\nที่อยู่: 80 ซอย 9 ตำบล บ้านดู่ อำเภอเมืองเชียงราย เชียงราย 57100', Value2: 'กรุณานำใบเสร็จนี้มาแสดงในวันรับเสื้อ'};
                                const systemRow = settings.find(r => r.Key === 'SystemStatus') || {Value1: 'open', Value2: ''};
                                
                                priceInfo = { 
                                    normal: Number(priceRow.Value1), oversize: Number(priceRow.Value2), 
                                    status: statusRow.Value1, receiptHeader: receiptRow.Value1, receiptNote: receiptRow.Value2,
                                    systemStatus: systemRow.Value1
                                };
                            } catch(e) { priceInfo = await runGAS('getShirtPrice'); }
                        } else { priceInfo = await runGAS('getShirtPrice'); }

                        if (priceInfo) {
                            setShirtPrice(priceInfo);
                            setShirtSystemOpen(priceInfo.status !== 'closed');
                            setSystemOpen(priceInfo.systemStatus !== 'maintenance');
                            setReceiptSettings({ header: priceInfo.receiptHeader, note: priceInfo.receiptNote });
                        }
                    } catch (e) { console.error("Initial load failed", e); }
                };
                if(view === 'home') loadInitialData();
            }, [view]);

            const goHome = () => {
                setStudent(null); setSearchPurpose('activity');
                setPoloGender('ชาย'); setPoloSize('M'); setPoloQty(1);
                setTshirtGender('ชาย'); setTshirtSize('M'); setTshirtQty(1);
                setReceiptData(null); setIsEditingOrder(false); setView('home');
            };

            const handleSearchStudent = async (studentId) => {
                if(!studentId) return Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสนักศึกษา', 'warning');
                Swal.fire({ title: 'ตรวจสอบข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try {
                    let res = { success: false };
                    if (API_CONFIG.USE_FAST_CSV && API_CONFIG.SHEET_ID && API_CONFIG.SHEET_ID !== "YOUR_SHEET_ID_HERE") {
                        try {
                            const allStudents = await fetchFastCSV('Students');
                            const studentData = allStudents.find(s => String(s.StudentID) === String(studentId) || String(s.IDCard) === String(studentId));
                            if (studentData) res = { success: true, data: studentData };
                            else res = { success: false };
                        } catch(csvErr) { res = await runGAS('verifyStudent', studentId).catch(e => { throw e }); }
                    } else { res = await runGAS('verifyStudent', studentId); }

                    if(res.success) {
                        setStudent(res.data);
                        localStorage.setItem('last_student_id', studentId);

                        if (searchPurpose === 'shirt') {
                            let orderCheck = { hasOrdered: false };
                            if (API_CONFIG.USE_FAST_CSV && API_CONFIG.SHEET_ID && API_CONFIG.SHEET_ID !== "YOUR_SHEET_ID_HERE") {
                                try {
                                    const allOrders = await fetchFastCSV('ShirtOrders');
                                    for (let i = allOrders.length - 1; i >= 0; i--) {
                                        if (String(allOrders[i].StudentID) === String(studentId)) {
                                            orderCheck = { hasOrdered: true, data: allOrders[i] };
                                            break;
                                        }
                                    }
                                } catch(csvErr) { orderCheck = await runGAS('checkShirtOrder', studentId); }
                            } else { orderCheck = await runGAS('checkShirtOrder', studentId); }

                            Swal.close();
                            if (orderCheck.hasOrdered && orderCheck.data) {
                                const pastOrder = orderCheck.data;
                                setReceiptData({
                                    student: res.data,
                                    poloGender: pastOrder.PoloGender || 'ชาย', poloSize: pastOrder.PoloSize, poloQty: Number(pastOrder.PoloQty),
                                    tshirtGender: pastOrder.TshirtGender || 'ชาย', tshirtSize: pastOrder.TshirtSize, tshirtQty: Number(pastOrder.TshirtQty),
                                    grandTotal: Number(pastOrder.TotalPrice),
                                    orderId: 'ORD-' + new Date(pastOrder.Timestamp).getTime().toString().slice(-6),
                                    date: new Date(pastOrder.Timestamp).toLocaleString('th-TH')
                                });
                                setPoloGender(pastOrder.PoloGender || 'ชาย'); setPoloSize(pastOrder.PoloSize); setPoloQty(Number(pastOrder.PoloQty));
                                setTshirtGender(pastOrder.TshirtGender || 'ชาย'); setTshirtSize(pastOrder.TshirtSize); setTshirtQty(Number(pastOrder.TshirtQty));
                                setView('receipt');
                            } else { setView('shirt_form'); }
                        } else { Swal.close(); setView('select'); }
                    } else { Swal.close(); Swal.fire({title:'ไม่พบข้อมูล', text:'ไม่พบรหัสนักศึกษานี้ในระบบ', icon:'error', confirmButtonColor: '#1a1a1a'}); }
                } catch(e) { Swal.fire('ข้อผิดพลาด', e.message, 'error'); }
            };

            const handleSubmitShirtOrder = async (e) => {
                e.preventDefault();
                if (poloQty < 1 || tshirtQty < 1) return Swal.fire('แจ้งเตือน', 'ระบุจำนวนอย่างน้อย 1 ตัว', 'warning');
                Swal.fire({ title: 'กำลังดำเนินการ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try {
                    const getPrice = (size) => ['XL', '2XL', '3XL'].includes(size) ? shirtPrice.oversize : shirtPrice.normal;
                    const grandTotal = (getPrice(poloSize) * poloQty) + (getPrice(tshirtSize) * tshirtQty);
                    const payload = { student, poloGender, poloSize, poloQty, tshirtGender, tshirtSize, tshirtQty, grandTotal };
                    const res = await runGAS('saveShirtOrder', payload);
                    Swal.close();
                    if(res.success) {
                        setReceiptData({ ...payload, orderId: 'ORD-' + Date.now().toString().slice(-6), date: new Date().toLocaleString('th-TH') });
                        Swal.fire({ title: 'บันทึกสำเร็จ', icon: 'success', confirmButtonColor: '#d19d47' }).then(() => { setIsEditingOrder(false); setView('receipt'); });
                    } else { Swal.fire('ข้อผิดพลาด', res.error, 'error'); }
                } catch(e) { Swal.fire('เกิดข้อผิดพลาด', e.message, 'error'); }
            };

            const handleSubmitSurvey = async (e) => {
                e.preventDefault();
                if(Object.keys(surveyAnswers).length < 13) return Swal.fire('แจ้งเตือน', 'กรุณาประเมินให้ครบทุกข้อ', 'warning');
                Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try {
                    const payload = { student, activity: selectedActivity, answers: surveyAnswers, suggestion };
                    const res = await runGAS('saveCheckInAndSurvey', payload);
                    Swal.close();
                    if(res.success) Swal.fire({title: 'เรียบร้อย', text: 'ขอบคุณที่เข้าร่วมกิจกรรม', icon: 'success', confirmButtonColor: '#1a1a1a'}).then(goHome);
                    else Swal.fire('ข้อผิดพลาด', res.error, 'error');
                } catch(e) { Swal.fire('ข้อผิดพลาด', e.message, 'error'); }
            };

            const handleSearchHistory = async (studentId) => {
                if(!studentId) return Swal.fire('แจ้งเตือน', 'กรอกรหัสนักศึกษา', 'warning');
                Swal.fire({ title: 'ค้นหาประวัติ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try {
                    let data = [];
                    if (API_CONFIG.USE_FAST_CSV && API_CONFIG.SHEET_ID && API_CONFIG.SHEET_ID !== "YOUR_SHEET_ID_HERE") {
                        const allChks = await fetchFastCSV('CheckIns').catch(() => []);
                        data = allChks.filter(c => String(c.StudentID) === String(studentId) || String(c.IDCard) === String(studentId));
                    } else { data = await runGAS('getStudentHistory', studentId); }
                    Swal.close(); setHistoryData(data || []); setView('history_result');
                } catch(e) { Swal.fire('ข้อผิดพลาด', e.message, 'error'); }
            };

            const loadAdminData = async () => {
                Swal.fire({ title: 'กำลังโหลดข้อมูลแอดมิน...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try {
                    let data;
                    if (API_CONFIG.USE_FAST_CSV && API_CONFIG.SHEET_ID && API_CONFIG.SHEET_ID !== "YOUR_SHEET_ID_HERE") {
                        // โหลดข้อมูลทุกอย่างผ่าน CSV โดยตรง (ไม่พึ่งพา Web App API เพื่อป้องกัน Error Failed to fetch ตอนล็อกอิน)
                        const [acts, chks, evals, shirts, settings] = await Promise.all([
                            fetchFastCSV('Activities').catch(() => []), 
                            fetchFastCSV('CheckIns').catch(() => []),
                            fetchFastCSV('Evaluations').catch(() => []), 
                            fetchFastCSV('ShirtOrders').catch(() => []),
                            fetchFastCSV('Settings').catch(() => [])
                        ]);
                        
                        let priceInfo = { normal: 250, oversize: 380, status: 'open', receiptHeader: 'สโมสรนักศึกษาคณะเทคโนโลยีดิจิทัล มหาวิทยาลัยราชภัฏเชียงราย\nที่อยู่: 80 ซอย 9 ตำบล บ้านดู่ อำเภอเมืองเชียงราย เชียงราย 57100', receiptNote: 'กรุณานำใบเสร็จนี้มาแสดงในวันรับเสื้อ', systemStatus: 'open' };
                        
                        // ดึงการตั้งค่าจากชีต Settings ตรงๆ
                        if (settings && settings.length > 0) {
                            const priceRow = settings.find(r => r.Key === 'ShirtPrice') || {Value1: 250, Value2: 380};
                            const statusRow = settings.find(r => r.Key === 'ShirtStatus') || {Value1: 'open', Value2: ''};

                                normal: Number(priceRow.Value1), oversize: Number(priceRow.Value2), 
                                status: statusRow.Value1, receiptHeader: receiptRow.Value1, receiptNote: receiptRow.Value2,
                                systemStatus: systemRow.Value1
                            };
                        } else {
                            try { priceInfo = await runGAS('getShirtPrice'); } catch(err) { console.warn("Fallback to default settings"); }
                        }
                        
                        data = { activities: acts, checkins: chks, evaluations: evals, shirtOrders: shirts, shirtPrice: priceInfo };

                    }
