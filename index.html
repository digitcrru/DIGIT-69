    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }

        tailwind.config = {
            theme: { extend: { colors: { primary: '#4f46e5', primary_hover: '#4338ca', secondary: '#10b981', admin: '#0f172a', admin_hover: '#1e293b' } } }

</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-100" id="main-nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">

                    <span class="font-bold text-lg sm:text-xl text-slate-800 tracking-tight" id="brand-text">DIGIT.<span class="text-primary">CRRU</span></span>
                </div>
                
                <div class="hidden md:flex space-x-1 items-center flex-grow justify-center" id="desktop-menu"></div>

                <div class="flex items-center">
                    <div class="bg-slate-100 p-1.5 rounded-2xl flex gap-1 mr-0 md:mr-4 hidden sm:flex border border-slate-200">
                        <button onclick="switchRole('student')" id="btn-role-student" class="px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-bold rounded-xl bg-indigo-100 text-indigo-700 shadow-sm transition-all border border-indigo-200">นักศึกษา</button>
                        <button onclick="switchRole('admin')" id="btn-role-admin" class="px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-bold rounded-xl text-slate-500 hover:text-slate-700 hover:bg-white border border-transparent transition-all">แอดมิน</button>
                    </div>
                    <button onclick="toggleMobileMenu()" class="sm:hidden text-slate-500 hover:text-primary focus:outline-none p-2 rounded-lg bg-slate-50 border border-slate-200 ml-2">
                        <i class="ph ph-user-switch text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div id="mobile-menu" class="hidden sm:hidden bg-white border-t border-slate-100 px-4 py-4 shadow-lg absolute w-full z-40">
            <p class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider text-center">สลับบทบาท (Role)</p>
            <div class="flex gap-1 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                 <button onclick="switchRole('student'); toggleMobileMenu();" id="btn-role-student-mob" class="flex-1 px-3 py-2.5 text-sm font-bold rounded-xl bg-indigo-100 text-indigo-700 shadow-sm border border-indigo-200 transition-all">นักศึกษา</button>
                 <button onclick="switchRole('admin'); toggleMobileMenu();" id="btn-role-admin-mob" class="flex-1 px-3 py-2.5 text-sm font-bold rounded-xl text-slate-500 hover:text-slate-700 hover:bg-white border border-transparent transition-all">แอดมิน</button>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 pb-28 md:pb-8 w-full" id="app-content"></main>

    <nav id="mobile-tab-bar" class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center z-40 pt-1 shadow-[0_-4px_15px_rgba(0,0,0,0.05)]" style="padding-bottom: env(safe-area-inset-bottom);"></nav>

    <div id="slipModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 transition-opacity">

            <div class="bg-slate-100 rounded-xl h-64 sm:h-80 flex items-center justify-center mb-4 border border-slate-200 overflow-hidden relative">
                <img src="https://images.unsplash.com/photo-1620714223084-8fcacc6dfd8d?auto=format&fit=crop&w=600&q=80" alt="Slip" class="h-full object-contain">

                <button onclick="verifyOrderFromModal()" class="px-4 py-2 rounded-xl text-white bg-green-500 hover:bg-green-600 font-medium flex items-center gap-2 transition-colors shadow-lg shadow-green-500/30 text-sm sm:text-base">

    <div id="editEventModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-lg w-full shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-800"><i class="ph-fill ph-pencil-simple text-primary"></i> แก้ไขข้อมูลกิจกรรม</h3>
                <button onclick="closeEditEventModal()" class="text-slate-400 hover:text-red-500 transition-colors"><i class="ph ph-x text-2xl"></i></button>
            </div>
            <form id="editEventForm" onsubmit="submitEditEvent(event)" class="space-y-4 sm:space-y-5">
                <input type="hidden" id="edit-event-id">

                    <label class="block text-sm font-bold text-slate-700 mb-1.5">ชื่อกิจกรรม</label>

                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">วันที่จัด</label>
                    <input type="text" id="edit-event-date" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none font-medium text-sm">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">สถานที่</label>
                    <input type="text" id="edit-event-location" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none font-medium text-sm">

    <div id="homePopupModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[120] flex items-center justify-center p-4 transition-opacity fade-in">
        <div class="bg-white rounded-3xl overflow-hidden max-w-md w-full shadow-2xl transform transition-all relative">
            <button onclick="closeHomePopup()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-black/20 hover:bg-black/40 text-white rounded-full transition-colors z-10 backdrop-blur-md">
                <i class="ph ph-x text-lg font-bold"></i>
            </button>
            <div class="h-40 sm:h-56 w-full bg-slate-200 relative">
                <img id="popup-banner-img" src="" alt="Banner" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent"></div>
                <div class="absolute bottom-5 left-6 right-6">
                    <span class="inline-block px-2.5 py-1 bg-red-500 text-white text-[10px] font-bold uppercase tracking-wider rounded-lg mb-2 shadow-sm">ประกาศสำคัญ</span>
                    <h2 id="popup-title" class="text-xl sm:text-2xl font-bold text-white leading-snug"></h2>
                </div>
            </div>
            <div class="p-6 sm:p-8">
                <p id="popup-desc" class="text-slate-600 text-sm leading-relaxed mb-6 font-medium whitespace-pre-line"></p>
                <div class="flex gap-3">
                    <button onclick="closeHomePopup()" class="flex-1 py-3.5 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors text-sm">ปิด</button>
                    <button onclick="closeHomePopup(); navigate('shirt');" class="flex-[2] py-3.5 rounded-xl font-bold text-white bg-primary hover:bg-primary_hover shadow-md shadow-primary/30 transition-colors flex items-center justify-center gap-2 text-sm">
                        สั่งจองเสื้อ <i class="ph ph-arrow-right text-lg"></i>
                    </button>
                </div>
            </div>
        </div>

    <div id="toast-container" class="fixed bottom-20 md:bottom-5 right-4 md:right-5 z-[130] flex flex-col gap-2 w-auto max-w-[90%] pointer-events-none"></div>

    <script>
        // ==========================================
        // URL ของ GOOGLE APPS SCRIPT
        // ==========================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6wkWGyyWSJBMQ90nd6DFqh8JKOWlJ_aWsxzNNSbSstIwX8UDVL47Nn6jtm0P0l3ViWw/exec';
        
        // --- State Management ---
        let currentRole = 'student'; 
        let currentView = 'events';
        let currentModalOrderId = null;
        let globalActivities = [];
        let currentCheckoutOrder = null;
        let isShirtShopOpen = true; 

        // ตัวแปรเก็บการตั้งค่า Popup
        let popupSettings = {
            enabled: true,
            title: 'แจ้งเตือนนักศึกษาใหม่\nรหัส 69 ทุกคน!',
            description: 'ขอให้นักศึกษาชั้นปีที่ 1 (รหัส 69) ทุกคน เข้าไปทำการ "สั่งจองชุดเสื้อคณะ (แพ็คเกจคู่)" ให้เรียบร้อย ภายในวันที่กำหนด เพื่อใช้ในการทำกิจกรรมรับน้องและประดับรุ่นครับ',
            imageUrl: 'https://images.unsplash.com/photo-1523580494112-071d16940a1c?auto=format&fit=crop&q=80&w=800'
        };

        function formatThaiDate(dateString, includeTime = false) {
            if (!dateString || String(dateString).trim() === '-' || String(dateString).trim() === '') return dateString;
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return dateString; 
            const thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            let formatted = `${date.getDate()} ${thaiMonths[date.getMonth()]} ${date.getFullYear() + 543}`;
            if (includeTime) formatted += ` ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')} น.`;
            return formatted;
        }

        const NAV_STUDENT = [
            { id: 'events', label: 'กิจกรรมทั้งหมด', tabLabel: 'กิจกรรม', icon: 'ph-megaphone' },
            { id: 'history', label: 'ประวัติของฉัน', tabLabel: 'ประวัติ', icon: 'ph-clock-counter-clockwise' },
            { id: 'shirt', label: 'สั่งจองเสื้อ', tabLabel: 'สั่งจอง', icon: 'ph-t-shirt' },
            { id: 'tracking', label: 'ติดตามสถานะ', tabLabel: 'ติดตาม', icon: 'ph-truck' }
        ];

        const NAV_ADMIN = [
            { id: 'admin-dash', label: 'ภาพรวม (Dashboard)', tabLabel: 'ภาพรวม', icon: 'ph-chart-pie-slice' },
            { id: 'admin-orders', label: 'จัดการสั่งจองเสื้อ', tabLabel: 'จองเสื้อ', icon: 'ph-t-shirt' },
            { id: 'admin-events', label: 'จัดการกิจกรรม', tabLabel: 'กิจกรรม', icon: 'ph-calendar-plus' },
            { id: 'admin-settings', label: 'ตั้งค่าระบบ', tabLabel: 'ตั้งค่า', icon: 'ph-gear' } 
        ];

        // --- Mock Data ---
        const MOCK_EVENTS = [
            { id: 1, timestamp: '10/06/2026 09:00', title: 'ปฐมนิเทศนักศึกษาใหม่ Dek69', date: '15 ตุลาคม 2569', location: 'หอประชุมใหญ่', status: 'open', spots: 500, joined: 320 },
            { id: 2, timestamp: '12/06/2026 14:30', title: 'กิจกรรมรับน้อง Dek68 และ Dek69', date: '5 พฤศจิกายน 2569', location: 'ลานกิจกรรม', status: 'open', spots: 200, joined: 185 }
        ];

        const MOCK_ORDERS = [
            { id: 'ORD-26-001', studentId: '69010001', name: 'นายรักเรียน ขยันยิ่ง', type: 'แพ็คเกจคู่', size: 'โปโล L, กิจกรรม L', qty: 2, total: 560, date: '17 มิ.ย. 2569', status: 2, hasEdited: false },
            { id: 'ORD-26-002', studentId: '69010045', name: 'นางสาวเรียนดี สีสด', type: 'แพ็คเกจคู่', size: 'โปโล M, กิจกรรม S', qty: 2, total: 560, date: '17 มิ.ย. 2569', status: 1, hasEdited: false }
        ];

        const STATUS_MAP = {
            1: { text: 'รอตรวจสอบ', color: 'bg-amber-100 text-amber-700 border-amber-200', icon: 'ph-hourglass-high' },
            2: { text: 'ชำระเงินแล้ว', color: 'bg-blue-100 text-blue-700 border-blue-200', icon: 'ph-check-circle' },
            3: { text: 'กำลังผลิต', color: 'bg-purple-100 text-purple-700 border-purple-200', icon: 'ph-scissors' },
            4: { text: 'พร้อมรับ', color: 'bg-green-100 text-green-700 border-green-200', icon: 'ph-package' }
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            switchRole('student');
            setTimeout(() => {
                if (!sessionStorage.getItem('homePopupShown') && currentRole === 'student') {
                    openHomePopup();
                    sessionStorage.setItem('homePopupShown', 'true');
                }
            }, 500);
        });

        function switchRole(role) {
            currentRole = role;
            const btnStudent = document.getElementById('btn-role-student'); const btnAdmin = document.getElementById('btn-role-admin');
            const btnStudentMob = document.getElementById('btn-role-student-mob'); const btnAdminMob = document.getElementById('btn-role-admin-mob');
            const brandIcon = document.getElementById('brand-icon'); const brandText = document.getElementById('brand-text');

            const aC = 'px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-bold rounded-xl bg-indigo-100 text-indigo-700 shadow-sm transition-all border border-indigo-200';
            const iC = 'px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-bold rounded-xl text-slate-500 hover:text-slate-700 hover:bg-white border border-transparent transition-all';
            const aCMob = 'flex-1 px-3 py-2.5 text-sm font-bold rounded-xl bg-indigo-100 text-indigo-700 shadow-sm border border-indigo-200 transition-all';
            const iCMob = 'flex-1 px-3 py-2.5 text-sm font-bold rounded-xl text-slate-500 hover:text-slate-700 hover:bg-white border border-transparent transition-all';

            if (role === 'student') {
                if(btnStudent) btnStudent.className = aC; if(btnAdmin) btnAdmin.className = iC;
                if(btnStudentMob) btnStudentMob.className = aCMob; if(btnAdminMob) btnAdminMob.className = iCMob;
                brandIcon.className = 'ph-fill ph-student text-primary text-2xl sm:text-3xl mr-2 transition-colors';
                brandText.innerHTML = 'DIGIT.<span class="text-primary">CRRU</span>';
                navigate('events');
            } else {
                if(btnAdmin) btnAdmin.className = aC; if(btnStudent) btnStudent.className = iC;
                if(btnAdminMob) btnAdminMob.className = aCMob; if(btnStudentMob) btnStudentMob.className = iCMob;
                brandIcon.className = 'ph-fill ph-shield-check text-admin text-2xl sm:text-3xl mr-2 transition-colors';
                brandText.innerHTML = 'Admin<span class="text-admin font-normal">Panel</span>';
                navigate('admin-dash');
            }
        }

        function renderNav() {
            const items = currentRole === 'student' ? NAV_STUDENT : NAV_ADMIN;
            const desktopContainer = document.getElementById('desktop-menu'); const tabBarContainer = document.getElementById('mobile-tab-bar');
            let desktopHTML = ''; let tabBarHTML = '';
            
            const primaryColor = currentRole === 'student' ? 'text-primary bg-primary/10' : 'text-admin bg-slate-200';
            const hoverColor = currentRole === 'student' ? 'hover:text-primary' : 'hover:text-admin';
            const tabActiveColor = currentRole === 'student' ? 'text-primary' : 'text-slate-800';

            items.forEach(item => {
                const isActive = item.id === currentView;
                const activeClassDesktop = isActive ? `${primaryColor} font-bold` : `text-slate-600 hover:bg-slate-50 ${hoverColor}`;
                desktopHTML += `<button onclick="navigate('${item.id}')" class="px-4 py-2 rounded-full transition-colors flex items-center gap-2 ${activeClassDesktop} text-sm"><i class="ph ${item.icon} text-lg sm:text-xl"></i> ${item.label}</button>`;

                const activeTabClass = isActive ? `${tabActiveColor} font-bold` : 'text-slate-400 font-medium hover:text-slate-600';
                tabBarHTML += `<button onclick="navigate('${item.id}')" class="flex-1 flex flex-col items-center justify-center py-2 gap-1 transition-colors ${activeTabClass} select-none"><i class="${isActive?'ph-fill':'ph'} ${item.icon} text-[22px] transition-transform ${isActive?'scale-110':''}"></i><span class="text-[10px] whitespace-nowrap tracking-wide">${item.tabLabel}</span></button>`;
            });

            if(desktopContainer) desktopContainer.innerHTML = desktopHTML;
            if(tabBarContainer) tabBarContainer.innerHTML = tabBarHTML;
        }

        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }

        function navigate(viewId, param = null) {
            currentView = viewId; renderNav(); const content = document.getElementById('app-content'); content.innerHTML = ''; window.scrollTo(0, 0);

            if (currentRole === 'student') {
                if(viewId === 'events') renderEvents(content); else if(viewId === 'register') renderRegistration(content, param);
                else if(viewId === 'history') renderHistory(content); else if(viewId === 'shirt') renderShirtShop(content);
                else if(viewId === 'checkout') renderCheckout(content, param); else if(viewId === 'tracking') renderTracking(content);
                else if(viewId === 'edit-order') renderEditOrder(content, param);
            } else {
                if(viewId === 'admin-dash') renderAdminDashboard(content); else if(viewId === 'admin-orders') renderAdminOrders(content);
                else if(viewId === 'admin-events') renderAdminEvents(content); else if(viewId === 'admin-settings') renderAdminSettings(content);
            }
        }

        // ==========================================
        // API FETCHERS
        // ==========================================
        async function fetchActivitiesData() {
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getActivities`); const result = await res.json();
                if (result.success && result.data && result.data.length > 0) {
                    result.data.forEach(item => { item.date = formatThaiDate(item.date); item.timestamp = formatThaiDate(item.timestamp, true); });
                    globalActivities = result.data; return globalActivities;
                }
            } catch (error) { console.warn('Offline Mode'); }
            globalActivities = MOCK_EVENTS; return globalActivities; 
        }
        async function fetchAllCheckInsData() {
            try { const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCheckIns`); const result = await res.json(); if (result.success && result.data) return result.data; } catch (e) {} return new Array(45); 
        }
        async function fetchOrdersData() {
            try { const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getOrders`); const result = await res.json(); if (result.success && result.data) return result.data; } catch (e) {} return MOCK_ORDERS; 
        }

        // ==========================================
        // STUDENT VIEWS
        // ==========================================
        function renderEvents(container) {
            container.innerHTML = `<div class="fade-in py-20 text-center"><i class="ph ph-spinner animate-spin text-4xl text-primary mb-4"></i><p class="text-slate-500 font-medium">กำลังโหลดข้อมูลกิจกรรม...</p></div>`;
            fetchActivitiesData().then(activities => {
                let html = `<div class="fade-in"><div class="mb-6 sm:mb-8 text-center sm:text-left"><h1 class="text-2xl sm:text-3xl font-bold text-slate-800">ลงทะเบียนเข้าร่วมกิจกรรม</h1><p class="text-sm sm:text-base text-slate-500 mt-1 sm:mt-2">เลือกลงทะเบียนกิจกรรมที่เปิดรับสมัคร</p></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">`;
                activities.forEach(event => {
                    const isOpen = event.status === 'open';
                    const statusBadge = isOpen ? `<span class="bg-green-100 text-green-700 text-[10px] sm:text-xs font-semibold px-2 sm:px-3 py-1 rounded-full border border-green-200 shadow-sm whitespace-nowrap">เปิดรับสมัคร</span>` : `<span class="bg-red-100 text-red-700 text-[10px] sm:text-xs font-semibold px-2 sm:px-3 py-1 rounded-full border border-red-200 shadow-sm whitespace-nowrap">ปิดรับสมัคร</span>`;

        async function fetchStudentData() {
            const searchId = document.getElementById('search-student-id').value.trim(); const feedback = document.getElementById('search-feedback');
            if(!searchId) { feedback.textContent = 'กรุณากรอกรหัสก่อนค้นหา'; feedback.classList.remove('hidden'); return; }
            const btn = document.getElementById('btn-fetch-student'); const originalBtnHtml = btn.innerHTML; btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>...'; btn.disabled = true; feedback.classList.add('hidden');
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=search&id=${encodeURIComponent(searchId)}`); const result = await res.json();
                if (result.success && result.data) {
                    document.getElementById('reg-student-id').value = result.data.studentId || searchId; document.getElementById('reg-citizen-id').value = result.data.citizenId || result.data.year || '';
                    document.getElementById('reg-hidden-student-id').value = result.data.studentId || ''; document.getElementById('reg-hidden-citizen-id').value = result.data.citizenId || result.data.year || '';
                    document.getElementById('reg-name').value = result.data.name || ''; document.getElementById('reg-faculty').value = result.data.faculty || '';
                    ['reg-name', 'reg-faculty', 'reg-student-id', 'reg-citizen-id'].forEach(id => { const f = document.getElementById(id); if (f.value) { f.readOnly = true; f.classList.replace('bg-white', 'bg-slate-100'); } });
                    document.getElementById('step-search').classList.add('hidden'); document.getElementById('step-form').classList.remove('hidden'); showToast('ดึงข้อมูลสำเร็จ', 'success');
                } else { feedback.textContent = 'ไม่พบข้อมูล กรุณาลองใหม่'; feedback.classList.remove('hidden'); }
            } catch (error) { feedback.textContent = 'เชื่อมต่อล้มเหลว'; feedback.classList.remove('hidden'); showManualForm(searchId); } 
            finally { btn.innerHTML = originalBtnHtml; btn.disabled = false; }
        }

        function showManualForm(prefillId = '') {
            const searchInput = document.getElementById('search-student-id').value.trim() || prefillId;
            if (searchInput.length === 13 && !isNaN(searchInput)) document.getElementById('reg-citizen-id').value = searchInput; else document.getElementById('reg-student-id').value = searchInput;
            document.getElementById('step-search').classList.add('hidden'); document.getElementById('step-form').classList.remove('hidden'); document.getElementById('step-form').firstElementChild.classList.add('hidden'); 
        }

        function resetSearchForm() {
            document.getElementById('step-form').classList.add('hidden'); document.getElementById('step-search').classList.remove('hidden'); document.getElementById('search-feedback').classList.add('hidden'); document.getElementById('step-form').reset();
            document.getElementById('reg-hidden-student-id').value = ''; document.getElementById('reg-hidden-citizen-id').value = ''; document.getElementById('step-form').firstElementChild.classList.remove('hidden');
            ['reg-name', 'reg-faculty', 'reg-student-id', 'reg-citizen-id'].forEach(id => { const f = document.getElementById(id); if (f) { f.readOnly = false; f.classList.replace('bg-slate-100', 'bg-white'); } });
        }

        async function handleRegistrationSubmit(e, eventId) {
            e.preventDefault();
            const sid = document.getElementById('reg-student-id').value.trim(); const cid = document.getElementById('reg-citizen-id').value.trim();
            const payload = { action: 'checkIn', eventId: eventId, eventName: globalActivities.find(e => String(e.id) === String(eventId))?.title || 'กิจกรรม', studentId: document.getElementById('reg-hidden-student-id').value || sid, citizenId: document.getElementById('reg-hidden-citizen-id').value || cid, name: document.getElementById('reg-name').value, faculty: document.getElementById('reg-faculty').value, timestamp: new Date().toLocaleString('th-TH') };
            const btn = e.target.querySelector('button[type="submit"]'); const txt = btn.innerHTML; btn.innerHTML = '<i class="ph ph-spinner animate-spin text-lg"></i>...'; btn.disabled = true;
            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }); showToast('ลงทะเบียนสำเร็จ! ข้อมูลถูกบันทึกแล้ว', 'success'); } catch (error) { showToast('จำลองการลงทะเบียน (เชื่อมต่อล้มเหลว)', 'warning'); } 
            finally { btn.innerHTML = txt; btn.disabled = false; setTimeout(()=> navigate('events'), 1500); }
        }

        async function fetchHistoryData() {
            const searchId = document.getElementById('search-history-id').value.trim(); if(!searchId) { showToast('กรุณากรอกข้อมูล', 'error'); return; }
            const btn = document.getElementById('btn-fetch-history'); const txt = btn.innerHTML; btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>...'; btn.disabled = true;
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&id=${encodeURIComponent(searchId)}`); const result = await res.json();
                if (result.success && result.data && result.data.length > 0) {
                    result.data.forEach(item => item.date = formatThaiDate(item.date));
                    sessionStorage.setItem('historySearchTerm', searchId); sessionStorage.setItem('historyData', JSON.stringify({ history: result.data })); showToast('ค้นหาสำเร็จ', 'success');
                } else { sessionStorage.setItem('historySearchTerm', searchId); sessionStorage.setItem('historyData', JSON.stringify({ history: [] })); showToast('ไม่พบประวัติ', 'warning'); }
            } catch (error) { sessionStorage.setItem('historySearchTerm', searchId); sessionStorage.setItem('historyData', JSON.stringify({ history: [] })); showToast('Offline Mode', 'warning'); } 
            finally { btn.innerHTML = txt; btn.disabled = false; renderHistory(document.getElementById('app-content')); }
        }

            else ordersData.forEach(order => {

                html += `

        async function updateOrderStatus(orderId, newStatus) {
            showToast('กำลังบันทึก...', 'warning');
            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateOrderStatus', orderId: String(orderId), status: parseInt(newStatus) }) }); showToast(`อัปเดตสถานะสำเร็จ`, 'success'); } catch (error) { showToast('อัปเดตสถานะจำลอง', 'error'); } navigate(currentView); 
        }
        function openSlipModal(orderId) { currentModalOrderId = orderId; document.getElementById('slipModal').classList.remove('hidden'); }
        function closeModal() { currentModalOrderId = null; document.getElementById('slipModal').classList.add('hidden'); }
        function verifyOrderFromModal() { if(currentModalOrderId){ updateOrderStatus(currentModalOrderId, 2); closeModal(); } }

                            <div class="md:col-span-1"><button type="submit" class="w-full px-4 sm:px-6 py-2.5 sm:py-3 bg-admin text-white font-bold rounded-xl hover:bg-admin_hover transition-colors shadow-sm flex items-center justify-center gap-2 text-sm sm:text-base"><i class="ph ph-floppy-disk text-lg"></i> บันทึก</button></div>
                        </form>
                    </div>
                    <div class="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse min-w-[700px]">
                                <thead><tr class="bg-slate-50 border-b border-slate-100 text-slate-500 text-[10px] sm:text-xs font-bold uppercase tracking-wider"><th class="p-3 sm:p-4">เวลาสร้าง</th><th class="p-3 sm:p-4">ชื่อกิจกรรม</th><th class="p-3 sm:p-4">วันที่จัด</th><th class="p-3 sm:p-4">สถานที่</th><th class="p-3 sm:p-4 text-center">จัดการ</th></tr></thead>
                                <tbody class="text-xs sm:text-sm text-slate-700">
            `;
            if (activities.length === 0) html += `<tr><td colspan="5" class="p-8 text-center text-slate-400 font-medium">ยังไม่มีข้อมูล</td></tr>`;

                                        <div class="w-9 sm:w-11 h-5 sm:h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 sm:after:h-5 after:w-4 sm:after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                                    </label><span class="block text-[8px] sm:text-[10px] mt-1 font-bold uppercase ${isOpen?'text-green-600':'text-slate-400'}">${isOpen?'เปิด':'ปิด'}</span>

                                <div class="flex items-center gap-1 border-l border-slate-200 pl-2 sm:pl-3">
                                    <button onclick="openEditEventModal('${event.id}')" class="w-7 sm:w-8 h-7 sm:h-8 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100 flex items-center justify-center"><i class="ph-fill ph-pencil-simple text-xs sm:text-sm"></i></button>
                                    <button onclick="exportEventParticipants('${event.title}')" class="w-7 sm:w-8 h-7 sm:h-8 rounded-full bg-green-50 text-green-600 hover:bg-green-100 flex items-center justify-center"><i class="ph-fill ph-microsoft-excel-logo text-xs sm:text-sm"></i></button>

        async function createNewEvent(e) {
            e.preventDefault(); const submitBtn = e.target.querySelector('button[type="submit"]'); const txt = submitBtn.innerHTML; submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; submitBtn.disabled = true;
            const now = new Date(); const payload = { action: 'createActivity', id: 'ACT-' + Date.now().toString(), timestamp: now.toLocaleDateString('th-TH') + ' ' + now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}), title: document.getElementById('new-event-title').value, date: document.getElementById('new-event-date').value, location: document.getElementById('new-event-location').value, status: 'open', spots: 100, joined: 0 };
            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }); showToast('สร้างกิจกรรมใหม่สำเร็จ', 'success'); } catch (error) { showToast('สร้างข้อมูลจำลอง', 'warning'); } 
            finally { submitBtn.innerHTML = txt; submitBtn.disabled = false; renderAdminEvents(document.getElementById('app-content')); }
        }

        async function toggleEventStatus(id, currentStatus) {
            const newStatus = currentStatus === 'open' ? 'closed' : 'open';
            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'toggleActivity', id: String(id), status: newStatus }) }); showToast(`อัปเดตสถานะเรียบร้อย`, 'success'); } catch (error) { showToast('อัปเดตจำลอง', 'warning'); } renderAdminEvents(document.getElementById('app-content'));
        }

        function openEditEventModal(id) {
            const event = globalActivities.find(e => String(e.id) === String(id)); if (!event) return;
            document.getElementById('edit-event-id').value = event.id; document.getElementById('edit-event-title').value = event.title; document.getElementById('edit-event-date').value = event.date; document.getElementById('edit-event-location').value = event.location;
            document.getElementById('editEventModal').classList.remove('hidden');
        }
        function closeEditEventModal() { document.getElementById('editEventModal').classList.add('hidden'); }

        async function submitEditEvent(e) {
            e.preventDefault(); const submitBtn = e.target.querySelector('button[type="submit"]'); const txt = submitBtn.innerHTML; submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin"></i>'; submitBtn.disabled = true;
            const payload = { action: 'editActivity', id: document.getElementById('edit-event-id').value, title: document.getElementById('edit-event-title').value, date: document.getElementById('edit-event-date').value, location: document.getElementById('edit-event-location').value };
            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }); showToast('แก้ไขกิจกรรมสำเร็จ', 'success'); closeEditEventModal(); renderAdminEvents(document.getElementById('app-content')); } 
            catch (error) { showToast('แก้ไขจำลองล้มเหลว', 'error'); } finally { submitBtn.innerHTML = txt; submitBtn.disabled = false; }
        }

        async function exportEventParticipants(eventName) {
            showToast('เตรียมไฟล์...', 'success'); const allCheckIns = await fetchAllCheckInsData(); const participants = allCheckIns.filter(row => String(row[1]).trim() === String(eventName).trim());
            if (participants.length === 0) { showToast('ยังไม่มีผู้ลงทะเบียน', 'warning'); return; }
            let csvContent = "\uFEFFเวลาลงทะเบียน,ชื่อกิจกรรม,รหัสนักศึกษา,บัตรประชาชน,ชื่อ-นามสกุล,คณะ,ชั่วโมง\n";
            participants.forEach(row => { csvContent += row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',') + "\n"; });
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' })); link.download = `รายชื่อ_${eventName}.csv`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function renderAdminSettings(container) {
            container.innerHTML = `
                <div class="fade-in max-w-4xl mx-auto pb-10">
                    <div class="mb-6 sm:mb-8 text-center sm:text-left"><h1 class="text-2xl sm:text-3xl font-bold text-slate-800">ตั้งค่าระบบ</h1><p class="text-sm sm:text-base text-slate-500 mt-1">ปรับแต่งการทำงานและข้อมูลพื้นฐานของระบบ</p></div>
                    <form onsubmit="submitSettings(event)" class="space-y-5 sm:space-y-6">
                        <div class="bg-white rounded-2xl sm:rounded-3xl p-5 sm:p-8 shadow-sm border border-slate-100">
                            <h2 class="text-lg sm:text-xl font-bold text-slate-800 mb-4 sm:mb-5 flex items-center gap-2"><i class="ph-fill ph-toggle-left text-primary"></i> เปิด-ปิด ระบบ</h2>
                            <div class="flex items-center justify-between p-4 sm:p-5 bg-slate-50 rounded-xl sm:rounded-2xl border border-slate-200">
                                <div><p class="font-bold text-slate-800 text-sm sm:text-base">ระบบสั่งจองเสื้อคณะ</p><p class="text-xs sm:text-sm text-slate-500 mt-0.5 font-medium">เปิดให้นักศึกษาเข้ามาสั่งจองเสื้อได้</p></div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="setting-shirt-toggle" class="sr-only peer" ${isShirtShopOpen ? 'checked' : ''}>
                                    <div class="w-12 sm:w-14 h-6 sm:h-7 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 sm:after:h-6 after:w-5 sm:after:w-6 after:transition-all peer-checked:bg-green-500 shadow-sm"></div>
                                </label>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl sm:rounded-3xl p-5 sm:p-8 shadow-sm border border-slate-100">
                            <h2 class="text-lg sm:text-xl font-bold text-slate-800 mb-4 sm:mb-5 flex items-center gap-2"><i class="ph-fill ph-app-window text-primary"></i> ตั้งค่าประกาศหน้าแรก (Popup)</h2>
                            <div class="space-y-4 sm:space-y-5">
                                <div class="flex items-center justify-between p-4 sm:p-5 bg-indigo-50 rounded-xl sm:rounded-2xl border border-indigo-100">
                                    <div><p class="font-bold text-indigo-900 text-sm sm:text-base">เปิดใช้งาน Popup แจ้งเตือน</p><p class="text-xs sm:text-sm text-indigo-700 mt-0.5 font-medium">แสดงประกาศเมื่อเข้าหน้าเว็บครั้งแรก</p></div>
                                    <label class="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" id="setting-popup-toggle" class="sr-only peer" ${popupSettings.enabled ? 'checked' : ''}>
                                        <div class="w-12 sm:w-14 h-6 sm:h-7 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 sm:after:h-6 after:w-5 sm:after:w-6 after:transition-all peer-checked:bg-primary shadow-sm"></div>
                                    </label>
                                </div>
                                <div><label class="block text-xs sm:text-sm font-bold text-slate-700 mb-1.5 sm:mb-2">หัวข้อประกาศ</label><textarea id="setting-popup-title" rows="2" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none font-bold text-sm bg-slate-50">${popupSettings.title}</textarea></div>
                                <div><label class="block text-xs sm:text-sm font-bold text-slate-700 mb-1.5 sm:mb-2">รายละเอียดเนื้อหา</label><textarea id="setting-popup-desc" rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none font-medium text-sm bg-slate-50">${popupSettings.description}</textarea></div>

                                    <label class="block text-xs sm:text-sm font-bold text-slate-700 mb-1.5 sm:mb-2">รูปภาพแบนเนอร์ (อัปโหลดจากเครื่อง)</label>
                                    <input type="hidden" id="setting-popup-image" value="${popupSettings.imageUrl}">
                                    <label class="flex flex-col items-center justify-center w-full h-28 sm:h-32 border-2 border-slate-200 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors relative overflow-hidden group">
                                        <div class="flex flex-col items-center justify-center pt-5 pb-6 text-slate-500 z-10"><i class="ph ph-upload-simple text-2xl sm:text-3xl mb-1 text-primary group-hover:scale-110 transition-transform"></i><p class="text-[10px] sm:text-xs font-bold">คลิกอัปโหลดรูปภาพใหม่</p></div>
                                        <img id="setting-popup-preview" src="${popupSettings.imageUrl}" class="absolute inset-0 w-full h-full object-cover opacity-20 group-hover:opacity-10 transition-opacity">
                                        <input type="file" class="hidden" accept="image/*" onchange="previewSettingsPopupImage(this)" />
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="flex justify-end pt-2 sm:pt-4"><button type="submit" class="w-full md:w-auto px-6 sm:px-10 py-3.5 sm:py-4 rounded-xl font-bold text-white bg-admin hover:bg-admin_hover transition-colors shadow-lg text-sm sm:text-base"><i class="ph ph-floppy-disk text-lg sm:text-xl"></i> บันทึกการตั้งค่า</button></div>
                    </form>
                </div>`;
        }

        function previewSettingsPopupImage(input) {
            if (input.files && input.files[0]) {
                const r = new FileReader(); r.onload = function(e) { document.getElementById('setting-popup-image').value = e.target.result; document.getElementById('setting-popup-preview').src = e.target.result; }
                r.readAsDataURL(input.files[0]);
            }
        }

        function submitSettings(e) {
            e.preventDefault(); const btn = e.target.querySelector('button[type="submit"]'); const txt = btn.innerHTML; btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> บันทึก...'; btn.disabled = true;
            isShirtShopOpen = document.getElementById('setting-shirt-toggle').checked;
            popupSettings.enabled = document.getElementById('setting-popup-toggle').checked; popupSettings.title = document.getElementById('setting-popup-title').value; popupSettings.description = document.getElementById('setting-popup-desc').value; popupSettings.imageUrl = document.getElementById('setting-popup-image').value;
            setTimeout(() => { showToast('บันทึกการตั้งค่าเรียบร้อยแล้ว', 'success'); btn.innerHTML = txt; btn.disabled = false; }, 600);
        }

        function openHomePopup() { 
            if (!popupSettings.enabled) return;
            document.getElementById('popup-banner-img').src = popupSettings.imageUrl; document.getElementById('popup-title').innerHTML = popupSettings.title.replace(/\n/g, '<br>'); document.getElementById('popup-desc').innerText = popupSettings.description;
            document.getElementById('homePopupModal').classList.remove('hidden'); 
        }
        function closeHomePopup() { document.getElementById('homePopupModal').classList.add('hidden'); }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-white border-l-4 border-green-500' : type === 'error' ? 'bg-white border-l-4 border-red-500' : 'bg-white border-l-4 border-amber-500';
            const icon = type === 'success' ? '<i class="ph-fill ph-check-circle text-green-500 text-xl sm:text-2xl"></i>' : type === 'error' ? '<i class="ph-fill ph-x-circle text-red-500 text-xl sm:text-2xl"></i>' : '<i class="ph-fill ph-warning-circle text-amber-500 text-xl sm:text-2xl"></i>';
            toast.className = `${bgColor} text-slate-700 p-3 sm:p-4 rounded-xl shadow-lg flex items-center gap-2 sm:gap-3 transform transition-all duration-300 translate-x-full border border-slate-100`;
            toast.innerHTML = `${icon} <span class="font-bold text-xs sm:text-sm leading-tight">${message}</span>`;
            container.appendChild(toast); requestAnimationFrame(() => toast.classList.remove('translate-x-full'));
            setTimeout(() => { toast.classList.add('translate-x-full'); setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
