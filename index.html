<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการกิจกรรมนักศึกษา</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js (สำหรับ Dashboard Admin) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f8fafc;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Animations */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Timeline Styles */
        .step-active .step-icon { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        .step-active .step-line { background-color: #4f46e5; }
        .step-inactive .step-icon { background-color: white; color: #cbd5e1; border-color: #e2e8f0; }
        .step-inactive .step-line { background-color: #e2e8f0; }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        primary_hover: '#4338ca',
                        secondary: '#10b981',
                        admin: '#0f172a',
                        admin_hover: '#1e293b'
                    }
                }
            }
        }
    </script>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-100" id="main-nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- Brand -->
                <div class="flex items-center">
                    <i class="ph-fill ph-student text-primary text-3xl mr-2" id="brand-icon"></i>
                    <span class="font-bold text-xl text-slate-800" id="brand-text">Campus<span class="text-primary">Act</span></span>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:flex space-x-1 items-center flex-grow justify-center" id="desktop-menu">
                    <!-- Menu items generated by JS -->
                </div>

                <!-- Role Switcher & Mobile Toggle -->
                <div class="flex items-center">
                    <div class="bg-slate-100 p-1 rounded-lg flex gap-1 mr-4 hidden md:flex">
                        <button onclick="switchRole('student')" id="btn-role-student" class="px-3 py-1.5 text-sm font-medium rounded-md bg-white shadow-sm text-primary transition-all">นักศึกษา</button>
                        <button onclick="switchRole('admin')" id="btn-role-admin" class="px-3 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-all">แอดมิน</button>
                    </div>

                    <button onclick="toggleMobileMenu()" class="md:hidden text-slate-500 hover:text-primary focus:outline-none p-2">
                        <i class="ph ph-list text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-100 px-2 pt-2 pb-3 space-y-1 shadow-lg absolute w-full">
            <div id="mobile-menu-items"></div>
            <!-- Mobile Role Switcher -->
            <div class="border-t border-slate-100 mt-2 pt-2 flex gap-2 p-2">
                 <button onclick="switchRole('student'); toggleMobileMenu();" class="flex-1 px-3 py-2 text-sm font-medium rounded-md bg-primary/10 text-primary">นักศึกษา</button>
                 <button onclick="switchRole('admin'); toggleMobileMenu();" class="flex-1 px-3 py-2 text-sm font-medium rounded-md bg-slate-100 text-slate-700">แอดมิน</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full" id="app-content">
        <!-- Views will be injected here dynamically -->
    </main>

    <!-- Modal for Slip Viewing (Admin) -->
    <div id="slipModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-2xl p-6 max-w-lg w-full shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-slate-800">ตรวจสอบสลิปโอนเงิน</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition-colors"><i class="ph ph-x text-2xl"></i></button>
            </div>
            <div class="bg-slate-100 rounded-xl h-80 flex items-center justify-center mb-4 border border-slate-200 overflow-hidden relative">
                <img src="https://images.unsplash.com/photo-1620714223084-8fcacc6dfd8d?auto=format&fit=crop&w=600&q=80" alt="Slip" class="h-full object-contain">
                <div class="absolute bottom-2 right-2 bg-black/70 text-white text-xs px-2 py-1 rounded">ตัวอย่างสลิปจำลอง</div>
            </div>
            <div class="flex gap-3 justify-end">
                <button onclick="closeModal()" class="px-4 py-2 rounded-xl text-slate-600 bg-slate-100 hover:bg-slate-200 font-medium transition-colors">ปิดหน้าต่าง</button>
                <button onclick="verifyOrderFromModal()" class="px-4 py-2 rounded-xl text-white bg-green-500 hover:bg-green-600 font-medium flex items-center gap-2 transition-colors shadow-lg shadow-green-500/30">
                    <i class="ph ph-check-circle"></i> ยืนยันความถูกต้อง
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-[110] flex flex-col gap-2"></div>

    <script>
        // ==========================================
        // URL ของ GOOGLE APPS SCRIPT
        // ==========================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6wkWGyyWSJBMQ90nd6DFqh8JKOWlJ_aWsxzNNSbSstIwX8UDVL47Nn6jtm0P0l3ViWw/exec';
        
        // --- State Management ---
        let currentRole = 'student'; // 'student' or 'admin'
        let currentView = 'events';
        let currentModalOrderId = null;
        let globalActivities = [];

        // --- Menu Definitions ---
        const NAV_STUDENT = [
            { id: 'events', label: 'กิจกรรมทั้งหมด', icon: 'ph-megaphone' },
            { id: 'history', label: 'ประวัติของฉัน', icon: 'ph-clock-counter-clockwise' },
            { id: 'shirt', label: 'สั่งจองเสื้อ', icon: 'ph-t-shirt' },
            { id: 'tracking', label: 'ติดตามสถานะ', icon: 'ph-truck' }
        ];

        const NAV_ADMIN = [
            { id: 'admin-dash', label: 'ภาพรวม (Dashboard)', icon: 'ph-chart-pie-slice' },
            { id: 'admin-orders', label: 'จัดการคำสั่งซื้อ', icon: 'ph-list-checks' },
            { id: 'admin-events', label: 'จัดการกิจกรรม', icon: 'ph-calendar-plus' }
        ];

        // --- Mock Data ---
        const MOCK_EVENTS = [
            { id: 1, timestamp: '10/06/2026 09:00', title: 'ค่ายอาสาพัฒนาชนบท รุ่นที่ 25', date: '15-18 ตุลาคม 2026', location: 'โรงเรียนบ้านหนองบัว จ.เชียงใหม่', status: 'open', image: 'https://images.unsplash.com/photo-1559027615-cd4628902d4a?auto=format&fit=crop&q=80&w=800', spots: 50, joined: 32 },
            { id: 2, timestamp: '12/06/2026 14:30', title: 'สัมมนา AI in Modern Business', date: '5 พฤศจิกายน 2026', location: 'หอประชุมใหญ่ คณะบริหารธุรกิจ', status: 'open', image: 'https://images.unsplash.com/photo-1485827404703-89b55fcc595e?auto=format&fit=crop&q=80&w=800', spots: 200, joined: 185 },
            { id: 3, timestamp: '01/06/2026 10:15', title: 'แข่งขันกีฬาภายใน (Freshy Games)', date: '20 สิงหาคม 2026', location: 'สนามกีฬาหลัก', status: 'closed', image: 'https://images.unsplash.com/photo-1526676037777-05a232554f77?auto=format&fit=crop&q=80&w=800', spots: 500, joined: 500 }
        ];

        const MOCK_HISTORY = [
            { eventName: 'ปฐมนิเทศนักศึกษาใหม่ 2026', date: '10 มิถุนายน 2026', hours: 6, status: 'completed' },
            { eventName: 'อบรมมารยาททางสังคม', date: '15 กรกฎาคม 2026', hours: 3, status: 'completed' }
        ];

        const MOCK_ORDERS = [
            { id: 'ORD-26-001', studentId: '66010001', name: 'นายรักเรียน ขยันยิ่ง', type: 'แพ็คเกจคู่', size: 'โปโล L, กิจกรรม L', qty: 2, total: 560, date: '17/06/2026 10:30', status: 2, hasEdited: false },
            { id: 'ORD-26-002', studentId: '66010045', name: 'นางสาวเรียนดี สีสด', type: 'แพ็คเกจคู่', size: 'โปโล M, กิจกรรม S', qty: 2, total: 560, date: '17/06/2026 11:15', status: 1, hasEdited: false },
            { id: 'ORD-26-003', studentId: '66010112', name: 'นายสายเสมอ มาทัน', type: 'แพ็คเกจคู่', size: 'โปโล XL, กิจกรรม XL', qty: 2, total: 700, date: '16/06/2026 09:00', status: 3, hasEdited: true },
            { id: 'ORD-26-004', studentId: '66010204', name: 'นางสาวใจดี มีสุข', type: 'แพ็คเกจคู่', size: 'โปโล S, กิจกรรม S', qty: 2, total: 560, date: '15/06/2026 14:20', status: 4, hasEdited: false }
        ];

        const STATUS_MAP = {
            1: { text: 'รอตรวจสอบยอดเงิน', color: 'bg-amber-100 text-amber-700 border-amber-200', icon: 'ph-hourglass-high' },
            2: { text: 'ชำระเงินถูกต้อง', color: 'bg-blue-100 text-blue-700 border-blue-200', icon: 'ph-check-circle' },
            3: { text: 'กำลังผลิต', color: 'bg-purple-100 text-purple-700 border-purple-200', icon: 'ph-scissors' },
            4: { text: 'พร้อมรับสินค้า', color: 'bg-green-100 text-green-700 border-green-200', icon: 'ph-package' }
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            switchRole('student');
        });

        // --- Core Functions ---
        function switchRole(role) {
            currentRole = role;
            
            const btnStudent = document.getElementById('btn-role-student');
            const btnAdmin = document.getElementById('btn-role-admin');
            const brandIcon = document.getElementById('brand-icon');
            const brandText = document.getElementById('brand-text');

            if (role === 'student') {
                btnStudent.className = 'px-3 py-1.5 text-sm font-medium rounded-md bg-white shadow-sm text-primary transition-all';
                btnAdmin.className = 'px-3 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-all';
                brandIcon.className = 'ph-fill ph-student text-primary text-3xl mr-2 transition-colors';
                brandText.innerHTML = 'Campus<span class="text-primary">Act</span>';
                navigate('events');
            } else {
                btnAdmin.className = 'px-3 py-1.5 text-sm font-medium rounded-md bg-white shadow-sm text-admin transition-all';
                btnStudent.className = 'px-3 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-all';
                brandIcon.className = 'ph-fill ph-shield-check text-admin text-3xl mr-2 transition-colors';
                brandText.innerHTML = 'Admin<span class="text-admin font-normal">Panel</span>';
                navigate('admin-dash');
            }
        }

        function renderNav() {
            const items = currentRole === 'student' ? NAV_STUDENT : NAV_ADMIN;
            const desktopContainer = document.getElementById('desktop-menu');
            const mobileContainerItems = document.getElementById('mobile-menu-items');
            
            let desktopHTML = '';
            let mobileHTML = '';
            
            const primaryColor = currentRole === 'student' ? 'text-primary bg-primary/10' : 'text-admin bg-slate-200';
            const hoverColor = currentRole === 'student' ? 'hover:text-primary' : 'hover:text-admin';

            items.forEach(item => {
                const isActive = item.id === currentView;
                const activeClassDesktop = isActive ? `${primaryColor} font-medium` : `text-slate-600 hover:bg-slate-50 ${hoverColor}`;
                const activeClassMobile = isActive ? `${primaryColor} border-l-4 border-current` : 'text-slate-600 hover:bg-slate-50 pl-5';

                desktopHTML += `
                    <button onclick="navigate('${item.id}')" class="px-4 py-2 rounded-full transition-colors flex items-center gap-2 ${activeClassDesktop}">
                        <i class="ph ${item.icon} text-xl"></i> ${item.label}
                    </button>
                `;

                mobileHTML += `
                    <button onclick="navigate('${item.id}'); toggleMobileMenu();" class="w-full text-left px-4 py-3 text-base font-medium transition-colors flex items-center gap-3 ${activeClassMobile}">
                        <i class="ph ${item.icon} text-xl"></i> ${item.label}
                    </button>
                `;
            });

            desktopContainer.innerHTML = desktopHTML;
            mobileContainerItems.innerHTML = mobileHTML;
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        function navigate(viewId, param = null) {
            currentView = viewId;
            renderNav();
            
            const content = document.getElementById('app-content');
            content.innerHTML = ''; 

            if (currentRole === 'student') {
                if(viewId === 'events') renderEvents(content);
                else if(viewId === 'register') renderRegistration(content, param);
                else if(viewId === 'history') renderHistory(content);
                else if(viewId === 'shirt') renderShirtShop(content);
                else if(viewId === 'checkout') renderCheckout(content, param);
                else if(viewId === 'tracking') renderTracking(content);
                else if(viewId === 'edit-order') renderEditOrder(content, param);
            } else {
                if(viewId === 'admin-dash') renderAdminDashboard(content);
                else if(viewId === 'admin-orders') renderAdminOrders(content);
                else if(viewId === 'admin-events') renderAdminEvents(content);
            }
        }

        // ==========================================
        // ฟังก์ชันโหลดข้อมูลกิจกรรมจาก Google Sheets
        // ==========================================
        async function fetchActivitiesData() {
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getActivities`);
                const result = await response.json();
                if (result.success && result.data && result.data.length > 0) {
                    globalActivities = result.data;
                    return globalActivities;
                }
            } catch (error) {
                console.error('Error fetching activities:', error);
            }
            // Fallback
            globalActivities = MOCK_EVENTS;
            return globalActivities; 
        }

        // ==========================================
        // STUDENT VIEWS
        // ==========================================

        function renderEvents(container) {
            container.innerHTML = `
                <div class="fade-in flex flex-col items-center justify-center py-20">
                    <i class="ph ph-spinner animate-spin text-4xl text-primary mb-4"></i>
                    <p class="text-slate-500 font-medium">กำลังโหลดข้อมูลกิจกรรม...</p>
                </div>
            `;

            fetchActivitiesData().then(activities => {
                let html = `
                    <div class="fade-in">
                        <div class="mb-8 text-center sm:text-left">
                            <h1 class="text-3xl font-bold text-slate-800">ประกาศรับสมัครกิจกรรม</h1>
                            <p class="text-slate-500 mt-2">เลือกกิจกรรมที่คุณสนใจเพื่อลงทะเบียนเข้าร่วม</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="events-grid">
                `;

                activities.forEach(event => {
                    const isOpen = event.status === 'open';
                    const statusBadge = isOpen 
                        ? `<span class="bg-green-100 text-green-700 text-xs font-semibold px-2.5 py-0.5 rounded-full border border-green-200">เปิดรับสมัคร</span>`
                        : `<span class="bg-red-100 text-red-700 text-xs font-semibold px-2.5 py-0.5 rounded-full border border-red-200">ปิดรับสมัคร</span>`;
                    
                    const percentFull = Math.round((event.joined / event.spots) * 100) || 0;

                    html += `
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow group flex flex-col">
                            <div class="h-48 overflow-hidden relative">
                                <img src="${event.image}" alt="${event.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                <div class="absolute top-3 right-3">${statusBadge}</div>
                            </div>
                            <div class="p-5 flex-grow flex flex-col">
                                <h3 class="text-xl font-bold text-slate-800 mb-2 line-clamp-2">${event.title}</h3>
                                <div class="space-y-2 mt-auto mb-4 text-sm text-slate-600">
                                    <div class="flex items-center gap-2"><i class="ph ph-calendar-blank text-primary"></i> ${event.date}</div>
                                    <div class="flex items-center gap-2"><i class="ph ph-map-pin text-primary"></i> ${event.location}</div>
                                    <div class="mt-3">
                                        <div class="flex justify-between text-xs mb-1">
                                            <span>ผู้สมัครแล้ว ${event.joined}/${event.spots} คน</span>
                                            <span class="font-medium">${percentFull}%</span>
                                        </div>
                                        <div class="w-full bg-slate-100 rounded-full h-1.5">
                                            <div class="bg-primary h-1.5 rounded-full" style="width: ${percentFull}%"></div>
                                        </div>
                                    </div>
                                </div>
                                <button 
                                    onclick="navigate('register', '${event.id}')" 
                                    ${!isOpen ? 'disabled' : ''} 
                                    class="w-full mt-2 py-2.5 rounded-xl font-medium transition-colors ${isOpen ? 'bg-primary text-white hover:bg-primary_hover shadow-md shadow-primary/20' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}">
                                    ${isOpen ? 'ลงทะเบียนเข้าร่วม' : 'เต็มแล้ว'}
                                </button>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`;
                container.innerHTML = html;
            });
        }

        function renderRegistration(container, eventId) {
            const event = globalActivities.find(e => String(e.id) === String(eventId));
            if(!event) return navigate('events');

            container.innerHTML = `
                <div class="fade-in max-w-2xl mx-auto">
                    <button onclick="navigate('events')" class="flex items-center gap-2 text-slate-500 hover:text-primary mb-6 transition-colors">
                        <i class="ph ph-arrow-left text-xl"></i> กลับไปหน้ากิจกรรม
                    </button>
                    
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="bg-primary/5 p-6 border-b border-slate-100">
                            <h2 class="text-2xl font-bold text-slate-800">ลงทะเบียนเข้าร่วมกิจกรรม</h2>
                            <p class="text-primary font-medium mt-1">${event.title}</p>
                        </div>
                        
                        <div class="p-6">
                            <!-- ขั้นตอนที่ 1: ค้นหาข้อมูล -->
                            <div id="step-search" class="mb-6">
                                <label class="block text-sm font-medium text-slate-700 mb-2">ระบุรหัสนักศึกษา หรือ บัตรประชาชน เพื่อดึงข้อมูล</label>
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <div class="relative w-full">
                                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                                            <i class="ph ph-identification-card text-slate-400 text-lg"></i>
                                        </div>
                                        <input type="text" id="search-student-id" 
                                            class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-primary focus:border-primary block w-full pl-10 p-3 outline-none transition-colors" 
                                            placeholder="เช่น 66010001 หรือ 1100000000000"
                                            onkeypress="if(event.key === 'Enter') fetchStudentData()">
                                    </div>
                                    <button onclick="fetchStudentData()" id="btn-fetch-student" class="px-6 py-3 bg-slate-800 text-white text-sm font-medium rounded-xl hover:bg-black transition-colors whitespace-nowrap shadow-sm flex items-center justify-center gap-2">
                                        <i class="ph ph-magnifying-glass"></i> ค้นหาข้อมูล
                                    </button>
                                </div>
                                <p id="search-feedback" class="text-xs text-red-500 mt-2 hidden"></p>
                            </div>

                            <!-- ขั้นตอนที่ 2: แสดงข้อมูลและยืนยัน -->
                            <form id="step-form" class="space-y-5 hidden" onsubmit="handleRegistrationSubmit(event, '${eventId}')">
                                <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl mb-4 flex items-start gap-3">
                                    <i class="ph-fill ph-check-circle text-blue-500 text-xl mt-0.5"></i>
                                    <div>
                                        <p class="text-sm font-bold text-slate-800">พบข้อมูลในระบบ</p>
                                        <p class="text-xs text-slate-600 mt-1">กรุณาตรวจสอบความถูกต้องก่อนกดยืนยันลงทะเบียน</p>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div class="md:col-span-2">
                                         <label class="block text-sm font-medium text-slate-700 mb-1">รหัสนักศึกษา/บัตรประชาชน</label>
                                         <input type="text" id="reg-student-id" required readonly class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-100 text-slate-600 focus:outline-none cursor-not-allowed">
                                    </div>
                                    <div class="md:col-span-2">
                                        <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อ-นามสกุล *</label>
                                        <input type="text" id="reg-name" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none bg-white">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-slate-700 mb-1">คณะ *</label>

        async function fetchStudentData() {
            const input = document.getElementById('search-student-id');
            const searchId = input.value.trim();
            const feedback = document.getElementById('search-feedback');
            
            if(!searchId) {
                feedback.textContent = 'กรุณากรอกรหัสก่อนค้นหา';
                feedback.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('btn-fetch-student');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> กำลังค้นหา...';
            btn.disabled = true;
            feedback.classList.add('hidden');

            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=search&id=${encodeURIComponent(searchId)}`);
                const result = await response.json();

                if (result.success && result.data) {
                    document.getElementById('reg-student-id').value = searchId;
                    document.getElementById('reg-name').value = result.data.name || '';
                    document.getElementById('reg-faculty').value = result.data.faculty || '';
                    document.getElementById('reg-year').value = result.data.year || '';
                    
                    document.getElementById('step-search').classList.add('hidden');
                    document.getElementById('step-skip').classList.add('hidden');
                    document.getElementById('step-form').classList.remove('hidden');
                    showToast('ดึงข้อมูลสำเร็จ', 'success');
                } else {
                    feedback.textContent = 'ไม่พบข้อมูลที่ตรงกับรหัสนี้ กรุณาลองใหม่ หรือกรอกข้อมูลเองด้านล่าง';
                    feedback.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error fetching student:', error);
                feedback.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่';
                feedback.classList.remove('hidden');
                showManualForm(searchId);
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
            }
        }

        function showManualForm(prefillId = '') {
            const searchInput = document.getElementById('search-student-id').value.trim() || prefillId;
            document.getElementById('reg-student-id').value = searchInput;
            document.getElementById('reg-student-id').readOnly = false;
            document.getElementById('reg-student-id').classList.remove('bg-slate-100', 'cursor-not-allowed');
            document.getElementById('reg-student-id').classList.add('bg-white');
            
            document.getElementById('step-search').classList.add('hidden');
            document.getElementById('step-skip').classList.add('hidden');
            
            const form = document.getElementById('step-form');
            form.classList.remove('hidden');
            form.firstElementChild.classList.add('hidden');
        }

        function resetSearchForm() {
            document.getElementById('step-form').classList.add('hidden');
            document.getElementById('step-search').classList.remove('hidden');
            document.getElementById('step-skip').classList.remove('hidden');
            document.getElementById('search-feedback').classList.add('hidden');
            document.getElementById('step-form').reset();
            
            document.getElementById('step-form').firstElementChild.classList.remove('hidden');
            
            const idField = document.getElementById('reg-student-id');
            idField.readOnly = true;
            idField.classList.add('bg-slate-100', 'cursor-not-allowed');
            idField.classList.remove('bg-white');
        }

        async function handleRegistrationSubmit(e, eventId) {
            e.preventDefault();
            
            const idInput = document.getElementById('reg-student-id').value;
            const nameInput = document.getElementById('reg-name').value;
            const facultyInput = document.getElementById('reg-faculty').value;
            const yearInput = document.getElementById('reg-year').value;

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-lg"></i> กำลังบันทึก...';
            submitBtn.disabled = true;

            const payload = {
                action: 'register',
                eventId: eventId,
                studentId: idInput,
                name: nameInput,
                faculty: facultyInput,
                year: yearInput,
                timestamp: new Date().toISOString()
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                showToast('ลงทะเบียนสำเร็จ! ข้อมูลถูกบันทึกแล้ว', 'success');
                setTimeout(()=> navigate('events'), 1500);

            } catch (error) {
                console.error('Error posting registration:', error);
                showToast('จำลองการลงทะเบียน (เชื่อมต่อ API ล้มเหลว)', 'warning');
                setTimeout(()=> navigate('events'), 1500);
            } finally {
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        }

        async function fetchHistoryData() {
            const input = document.getElementById('search-history-id');
            const searchId = input.value.trim();
            
            if(!searchId) {
                showToast('กรุณากรอกรหัสนักศึกษา หรือ บัตรประชาชน', 'error');
                return;
            }
            
            const btn = document.getElementById('btn-fetch-history');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> กำลังค้นหา...';
            btn.disabled = true;

            try {
                // เรียก API ไปยัง Google Apps Script ส่ง action=getHistory
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&id=${encodeURIComponent(searchId)}`);
                const result = await response.json();

                if (result.success && result.data && result.data.length > 0) {
                    sessionStorage.setItem('historySearchTerm', searchId);
                    sessionStorage.setItem('historyData', JSON.stringify({
                        studentName: result.studentName,
                        history: result.data
                    }));
                    showToast('ค้นหาประวัติสำเร็จ', 'success');
                } else {
                    // หาไม่เจอ แต่ก็ให้เปิดหน้าต่างขึ้นมาโชว์ว่าหาไม่เจอ
                    sessionStorage.setItem('historySearchTerm', searchId);
                    sessionStorage.setItem('historyData', JSON.stringify({ studentName: '', history: [] }));
                    showToast('ไม่พบประวัติสำหรับรหัสนี้', 'warning');
                }
            } catch (error) {
                console.error('Error fetching history:', error);
                showToast('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
                renderHistory(document.getElementById('app-content'));
            }
        }

        function clearHistorySearch() {
            sessionStorage.removeItem('historySearchTerm');
            sessionStorage.removeItem('historyData');
            renderHistory(document.getElementById('app-content'));
        }

        async function fetchStudentForOrder() {
            const input = document.getElementById('search-order-id');
            const searchId = input.value.trim();
            const feedback = document.getElementById('search-order-feedback');
            
            if(!searchId) {
                feedback.textContent = 'กรุณากรอกรหัสนักศึกษา หรือ บัตรประชาชน';
                feedback.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('btn-fetch-order');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> กำลังค้นหา...';
            btn.disabled = true;
            feedback.classList.add('hidden');

            try {
                // เรียก API ไปยัง Google Apps Script ส่ง action=searchStudentOrder
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=searchStudentOrder&id=${encodeURIComponent(searchId)}`);
                const result = await response.json();

                if (result.success && result.data) {
                    const idField = document.getElementById('order-student-id');
                    const nameField = document.getElementById('order-student-name');
                    
                    idField.value = searchId;
                    nameField.value = result.data.name || '';
                    
                    idField.readOnly = true;
                    nameField.readOnly = true;
                    idField.classList.replace('bg-white', 'bg-blue-100/50');
                    nameField.classList.replace('bg-white', 'bg-blue-100/50');

                    document.getElementById('order-step-search').classList.add('hidden');
                    document.getElementById('order-step-form').classList.remove('hidden');
                    showToast('ดึงข้อมูลสำเร็จ', 'success');
                    setTimeout(recalculatePrice, 50);
                } else {
                    feedback.textContent = 'ไม่พบข้อมูลที่ตรงกับรหัสนี้ กรุณาลองใหม่ หรือข้ามไปกรอกข้อมูลเอง';
                    feedback.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error fetching student:', error);
                feedback.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อ';
                feedback.classList.remove('hidden');
                // Fallback (จำลองว่าไม่เจอข้อมูล ให้กดข้ามไปกรอกเอง)
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
            }
        }

        function skipOrderSearch(prefillId = '') {
            const searchInput = document.getElementById('search-order-id').value.trim() || prefillId;
            const idField = document.getElementById('order-student-id');
            const nameField = document.getElementById('order-student-name');
            
            idField.value = searchInput;
            nameField.value = '';
            
            idField.readOnly = false;
            nameField.readOnly = false;
            idField.classList.replace('bg-blue-100/50', 'bg-white');
            nameField.classList.replace('bg-blue-100/50', 'bg-white');

            document.getElementById('order-step-search').classList.add('hidden');

        function recalculatePrice() {
            const form = document.getElementById('orderForm');
            if(!form) return;

            let poloSize = form.elements['poloSize'] ? form.elements['poloSize'].value : 'S';
            let poloUnitPrice = (poloSize === 'XL' || poloSize === '2XL') ? 350 : 280;
            const poloQtyInput = document.getElementById('poloQty');
            let poloQty = poloQtyInput ? (parseInt(poloQtyInput.value) || 1) : 1;
            
            let actSize = form.elements['actSize'] ? form.elements['actSize'].value : 'S';
            let actUnitPrice = (actSize === 'XL' || actSize === '2XL') ? 350 : 280;
            const actQtyInput = document.getElementById('actQty');
            let actQty = actQtyInput ? (parseInt(actQtyInput.value) || 1) : 1;

            const totalPrice = (poloUnitPrice * poloQty) + (actUnitPrice * actQty);
            document.getElementById('priceDisplay').innerText = `฿ ${totalPrice.toLocaleString()}`;
        }

        function updateQty(type, change) {
            const input = document.getElementById(type + 'Qty');
            if(!input) return;
            let val = parseInt(input.value) + change;
            if(val < 1) val = 1; 
            if(val > 10) val = 10;
            input.value = val;
            
            recalculatePrice(); 
        }

        let countdownInterval;
        function startCountdown() {
            clearInterval(countdownInterval);
            let time = 15 * 60; 
            const display = document.getElementById('countdown');
            if(!display) return;

            countdownInterval = setInterval(() => {
                let minutes = parseInt(time / 60, 10);
                let seconds = parseInt(time % 60, 10);
                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;
                display.textContent = minutes + ":" + seconds;
                if (--time < 0) {
                    clearInterval(countdownInterval);
                    showToast('หมดเวลาทำรายการ กรุณาทำรายการใหม่', 'error');
                    setTimeout(() => navigate('shirt'), 2000);
                }
            }, 1000);
        }

        function togglePayment(method) {
            const btnQr = document.getElementById('btn-pay-qr');
            const btnCash = document.getElementById('btn-pay-cash');
            const viewQr = document.getElementById('view-pay-qr');
            const viewCash = document.getElementById('view-pay-cash');

            if(method === 'qr') {
                btnQr.className = 'flex-1 py-3 text-sm font-bold rounded-xl bg-primary text-white shadow-md transition-all flex items-center justify-center gap-2';
                btnCash.className = 'flex-1 py-3 text-sm font-bold rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 transition-all flex items-center justify-center gap-2';
                viewQr.classList.remove('hidden');
                viewCash.classList.add('hidden');
            } else {
                btnCash.className = 'flex-1 py-3 text-sm font-bold rounded-xl bg-primary text-white shadow-md transition-all flex items-center justify-center gap-2';
                btnQr.className = 'flex-1 py-3 text-sm font-bold rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 transition-all flex items-center justify-center gap-2';
                viewCash.classList.remove('hidden');
                viewQr.classList.add('hidden');
            }
        }

        function previewSlip(input) {
            const placeholder = document.getElementById('slip-placeholder');
            const preview = document.getElementById('slip-preview');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('opacity-0'); 
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function submitPayment(e, method) {
            if(e) e.preventDefault();
            clearInterval(countdownInterval); 
            
            if(method === 'qr') {
                showToast('ส่งหลักฐานสำเร็จ! ระบบกำลังตรวจสอบ (ใช้เวลา 1-2 วัน)', 'success');

            }
            
            setTimeout(() => navigate('tracking'), 2500);
        }

        function submitEditOrder(e, orderId) {
            e.preventDefault();
            const order = MOCK_ORDERS.find(o => o.id === orderId);
            if(order) {
                const poloSize = document.getElementById('editPoloSize').value;
                const poloQty = parseInt(document.getElementById('editPoloQty').value);
                const actSize = document.getElementById('editActSize').value;
                const actQty = parseInt(document.getElementById('editActQty').value);
                
                const poloPrice = (poloSize === 'XL' || poloSize === '2XL') ? 350 : 280;
                const actPrice = (actSize === 'XL' || actSize === '2XL') ? 350 : 280;
                const total = (poloPrice * poloQty) + (actPrice * actQty);

                order.size = `โปโล ${poloSize}, กิจกรรม ${actSize}`;
                order.qty = poloQty + actQty; 
                order.total = total;
                order.hasEdited = true;
                order.type = 'แพ็คเกจคู่';
                
                const now = new Date();
                order.date = now.toLocaleDateString('th-TH') + ' ' + now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});

                showToast('อัปเดตข้อมูลสำเร็จ! รายการถูกล็อกการแก้ไขแล้ว', 'success');
                navigate('tracking');
            }
        }

                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-8">
                        <h3 class="font-bold text-lg text-slate-800 mb-4 flex items-center gap-2"><i class="ph-fill ph-plus-circle text-primary"></i> สร้างกิจกรรมใหม่</h3>
                        <form onsubmit="createNewEvent(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                            <div class="md:col-span-1">
                                <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อกิจกรรม *</label>
                                <input type="text" id="new-event-title" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none" placeholder="ระบุชื่อกิจกรรม">
                            </div>
                            <div class="md:col-span-1">
                                <label class="block text-sm font-medium text-slate-700 mb-1">วันที่จัด *</label>
                                <input type="text" id="new-event-date" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none" placeholder="เช่น 20 ต.ค. 2026">
                            </div>
                            <div class="md:col-span-1">
                                <label class="block text-sm font-medium text-slate-700 mb-1">สถานที่ *</label>
                                <input type="text" id="new-event-location" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none" placeholder="ระบุสถานที่">
                            </div>
                            <div class="md:col-span-1">
                                <button type="submit" class="w-full px-6 py-2.5 bg-admin text-white font-medium rounded-xl hover:bg-admin_hover transition-colors shadow-sm flex items-center justify-center gap-2">
                                    <i class="ph ph-floppy-disk text-lg"></i> บันทึกกิจกรรม
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Events List Table -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse min-w-[800px]">
                                <thead>
                                    <tr class="bg-slate-50 border-b border-slate-100 text-slate-500 text-sm">
                                        <th class="p-4 font-medium">Timestamp</th>
                                        <th class="p-4 font-medium">ชื่อกิจกรรม</th>
                                        <th class="p-4 font-medium">วันที่จัด</th>
                                        <th class="p-4 font-medium">สถานที่</th>
                                        <th class="p-4 font-medium text-center">เปิด/ปิด รับสมัคร</th>
                                    </tr>
                                </thead>
                                <tbody class="text-sm text-slate-700">
            `;

            if (activities.length === 0) {
                html += `<tr><td colspan="5" class="p-8 text-center text-slate-400">ยังไม่มีข้อมูลกิจกรรมในระบบ</td></tr>`;
            } else {
                activities.forEach(event => {
                    const isOpen = event.status === 'open';
                    html += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
                            <td class="p-4 text-slate-500 text-xs">${event.timestamp || '-'}</td>
                            <td class="p-4 font-bold text-slate-800">${event.title}</td>
                            <td class="p-4 text-slate-600">${event.date}</td>
                            <td class="p-4 text-slate-600">${event.location}</td>
                            <td class="p-4 text-center">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="sr-only peer" ${isOpen ? 'checked' : ''} onchange="toggleEventStatus('${event.id}', '${event.status}')">
                                    <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                                </label>
                                <span class="block text-xs mt-1 font-medium ${isOpen ? 'text-green-600' : 'text-slate-400'}">${isOpen ? 'เปิด' : 'ปิด'}</span>
                            </td>
                        </tr>
                    `;
                });
            }

            html += `</tbody></table></div></div></div>`;
            container.innerHTML = html;
        }

        async function createNewEvent(e) {
            e.preventDefault();
            const title = document.getElementById('new-event-title').value;
            const date = document.getElementById('new-event-date').value;
            const location = document.getElementById('new-event-location').value;
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> กำลังบันทึก...';
            submitBtn.disabled = true;

            const now = new Date();
            const timestamp = now.toLocaleDateString('th-TH') + ' ' + now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            const newId = 'ACT-' + Date.now().toString();

            const payload = {
                action: 'createActivity',
                id: newId,
                timestamp: timestamp,
                title: title,
                date: date,
                location: location,
                status: 'open',
                image: 'https://images.unsplash.com/photo-1523580494112-071d16940a1c?auto=format&fit=crop&q=80&w=800', 
                spots: 100, 
                joined: 0
            };
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                showToast('บันทึกข้อมูลลง Google Sheets สำเร็จ', 'success');
            } catch (error) {
                console.warn('เชื่อมต่อล้มเหลว ใช้ข้อมูลจำลอง', error);
                globalActivities.unshift(payload); 
                showToast('จำลองการสร้าง (เชื่อมต่อฐานข้อมูลล้มเหลว)', 'warning');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                renderAdminEvents(document.getElementById('app-content'));
            }
        }

        async function toggleEventStatus(id, currentStatus) {
            const newStatus = currentStatus === 'open' ? 'closed' : 'open';
            const payload = {
                action: 'toggleActivity',
                id: String(id),
                status: newStatus
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                showToast(`อัปเดตสถานะเป็น ${newStatus === 'open' ? 'เปิด' : 'ปิด'} รับสมัครเรียบร้อย`, 'success');
            } catch (error) {
                console.warn('เชื่อมต่อล้มเหลว ใช้ข้อมูลจำลอง', error);
                const event = globalActivities.find(e => String(e.id) === String(id));
                if (event) event.status = newStatus;
                showToast('อัปเดตสถานะจำลอง (เชื่อมต่อฐานข้อมูลล้มเหลว)', 'warning');
            }
            renderAdminEvents(document.getElementById('app-content'));
        }

        // --- Utils: Toast Notification ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-white border-l-4 border-green-500' : 'bg-white border-l-4 border-red-500';
            const icon = type === 'success' ? '<i class="ph-fill ph-check-circle text-green-500 text-xl"></i>' : '<i class="ph-fill ph-warning-circle text-red-500 text-xl"></i>';

            toast.className = `${bgColor} text-slate-700 px-5 py-3.5 rounded-xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] flex items-center gap-3 transform transition-all duration-300 translate-x-full border border-slate-100`;
            toast.innerHTML = `${icon} <span class="font-bold text-sm">${message}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-x-full'));
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

    </script>
</body>
</html>
