<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGIT.69 - Activity Management</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#FF6B00', dark: '#E65C00', light: '#FF8533' },
                        dark: { 900: '#0F172A', 800: '#1E293B', 700: '#334155' }
                    },
                    fontFamily: {
                        sans: ['Sarabun', 'Prompt', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (For JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- PapaParse (For fast CSV reading) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; color: #f8fafc; }
        
        /* Glassmorphism Classes */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: linear-gradient(145deg, rgba(30,41,59,0.8) 0%, rgba(15,23,42,0.9) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 0, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #FF6B00; }
        
        .bg-animated {
            background: radial-gradient(circle at 15% 50%, rgba(255, 107, 0, 0.15), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(255, 107, 0, 0.1), transparent 25%);
            background-color: #0F172A;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-animated min-h-screen text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 📊 Mock Data (สำหรับให้ระบบทำงานได้ทันที โดยไม่ต้องต่อ API จริงในตอนนี้) ---
        const MOCK_ACTIVITIES = [
            { ActID: 'A1', ActName: 'ปฐมนิเทศนักศึกษาใหม่ คณะเทคโนโลยีดิจิทัล', Date: '2026-06-15', Location: 'หอประชุมใหญ่', Status: 'open' },
            { ActID: 'A2', ActName: 'อบรมสัมมนา AI & Data Science', Date: '2026-06-20', Location: 'ห้องประชุม 1', Status: 'open' },
            { ActID: 'A3', ActName: 'กีฬาสานสัมพันธ์ 69', Date: '2026-05-10', Location: 'สนามกีฬากลาง', Status: 'closed' }
        ];

        const MOCK_STUDENTS = [
            { StudentID: '65123456', Name: 'นายสมชาย ใจดี', Major: 'วิศวกรรมซอฟต์แวร์', IDCard: '1122334455667' },
            { StudentID: '66112233', Name: 'นางสาวสมหญิง สวยงาม', Major: 'วิทยาการคอมพิวเตอร์', IDCard: '9988776655443' }
        ];

        // --- 🎨 Icons (SVG) ---
        const Icons = {
            Home: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>,
            CheckIn: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            History: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Login: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>,
            Dashboard: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>,
            Users: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>,
            Report: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>,
            Settings: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>,
            Download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        };

        // ==========================================
        // 🚀 MAIN APP COMPONENT
        // ==========================================
        function App() {
            // States
            const [view, setView] = useState('home'); // home, checkin, survey, history, admin
            const [isAdmin, setIsAdmin] = useState(false);
            const [systemOpen, setSystemOpen] = useState(true);
            
            // Data States
            const [activities, setActivities] = useState(MOCK_ACTIVITIES);
            const [currentStudent, setCurrentStudent] = useState(null);
            const [selectedActId, setSelectedActId] = useState(null);

            // Load Settings from LocalStorage
            useEffect(() => {
                const isSysOpen = localStorage.getItem('digit69_systemOpen');
                if (isSysOpen !== null) setSystemOpen(isSysOpen === 'true');
            }, []);

            // --- SweetAlert Wrappers ---
            const showLoading = (title) => {
                Swal.fire({ title, background: '#1e293b', color: '#fff', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            };
            const showSuccess = (title) => {
                Swal.fire({ icon: 'success', title, background: '#1e293b', color: '#fff', timer: 1500, showConfirmButton: false });
            };
            const showError = (title, text) => {
                Swal.fire({ icon: 'error', title, text, background: '#1e293b', color: '#fff', confirmButtonColor: '#FF6B00' });
            };

            // --- Navigation Bar ---
            const Navbar = () => (
                <nav className="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
                    <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('home')}>
                        <div className="bg-brand text-white p-2 rounded-xl font-bold text-xl shadow-lg shadow-brand/20">D.69</div>
                        <div>
                            <h1 className="text-xl font-bold tracking-wider text-white">DIGIT<span className="text-brand">.69</span></h1>
                            <p className="text-xs text-slate-400">Activity Management System</p>
                        </div>
                    </div>
                    <div>
                        {!isAdmin ? (
                            <button onClick={() => setView('adminLogin')} className="flex items-center gap-2 text-sm text-slate-300 hover:text-brand transition-colors bg-white/5 px-4 py-2 rounded-lg border border-white/10 hover:border-brand/50">
                                <Icons.Login /> Staff Login
                            </button>
                        ) : (
                            <div className="flex gap-4">
                                <button onClick={() => setView('admin')} className="text-brand font-semibold">เข้าสู่ Dashboard</button>
                                <button onClick={() => { setIsAdmin(false); setView('home'); }} className="text-red-400 hover:text-red-300">ออกจากระบบ</button>
                            </div>
                        )}
                    </div>
                </nav>
            );

            // ==========================================
            // 👩‍🎓 STUDENT VIEWS
            // ==========================================

            // 1. Home View
            const HomeView = () => (
                <div className="max-w-4xl mx-auto mt-20 p-6">
                    <div className="text-center mb-16">
                        <h2 className="text-4xl md:text-5xl font-bold mb-4">ยินดีต้อนรับสู่ระบบ <span className="text-brand">DIGIT.69</span></h2>
                        <p className="text-slate-400 text-lg">บริหารจัดการประวัติการเข้าร่วมกิจกรรม คณะเทคโนโลยีดิจิทัล</p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8">
                        {/* Menu 1: Check-in */}
                        <div 
                            onClick={() => systemOpen ? setView('checkin') : null}
                            className={`glass-card p-8 rounded-2xl transition-all duration-300 ${systemOpen ? 'cursor-pointer hover:-translate-y-2 hover:shadow-brand/20 hover:border-brand/50' : 'opacity-50 cursor-not-allowed grayscale'}`}
                        >
                            <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-6 ${systemOpen ? 'bg-brand/20 text-brand' : 'bg-gray-700 text-gray-400'}`}>
                                <Icons.CheckIn />
                            </div>
                            <h3 className="text-2xl font-bold text-white mb-2">1. ลงทะเบียนกิจกรรม</h3>
                            <p className="text-slate-400 mb-4">เช็คชื่อเข้าร่วมกิจกรรมที่กำลังเปิดรับลงทะเบียน พร้อมทำแบบประเมิน</p>
                            {!systemOpen && <span className="text-xs bg-red-500/20 text-red-400 px-3 py-1 rounded-full border border-red-500/20">ปิดระบบชั่วคราว</span>}
                        </div>

                        {/* Menu 2: History */}
                        <div 
                            onClick={() => setView('history')}
                            className="glass-card p-8 rounded-2xl cursor-pointer hover:-translate-y-2 transition-all duration-300 hover:shadow-brand/20 hover:border-brand/50"
                        >
                            <div className="w-16 h-16 bg-blue-500/20 text-blue-400 rounded-2xl flex items-center justify-center mb-6">
                                <Icons.History />
                            </div>
                            <h3 className="text-2xl font-bold text-white mb-2">2. ตรวจสอบประวัติ</h3>
                            <p className="text-slate-400">ตรวจสอบประวัติการเข้าร่วมกิจกรรมทั้งหมดของคุณที่ผ่านมา</p>
                        </div>
                    </div>
                </div>
            );

            // 2. Check-in View
            const CheckInView = () => {
                const [searchId, setSearchId] = useState('');
                const activeActs = activities.filter(a => a.Status === 'open');

                const handleSearch = () => {
                    const student = MOCK_STUDENTS.find(s => s.StudentID === searchId || s.IDCard === searchId);
                    if (student) {
                        setCurrentStudent(student);
                    } else {
                        showError('ไม่พบข้อมูล', 'กรุณาตรวจสอบรหัสนักศึกษาหรือเลขบัตรประชาชนอีกครั้ง');
                    }
                };

                const handleSubmit = () => {
                    if (!selectedActId) return showError('แจ้งเตือน', 'กรุณาเลือกกิจกรรม');
                    
                    showLoading('กำลังบันทึกข้อมูล...');
                    setTimeout(() => {
                        showSuccess('เช็คชื่อสำเร็จ!');
                        setView('survey'); // พรอมต์ระบุให้ไปหน้า Survey อัตโนมัติ
                    }, 1000);
                };

                return (
                    <div className="max-w-2xl mx-auto mt-10 p-6">
                        <button onClick={() => setView('home')} className="text-brand flex items-center gap-2 mb-6 hover:underline">
                            ← กลับหน้าหลัก
                        </button>
                        
                        <div className="glass-card p-8 rounded-2xl border-t-4 border-t-brand">
                            <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icons.CheckIn/> ลงทะเบียนเข้ากิจกรรม</h2>
                            
                            {!currentStudent ? (
                                <div className="space-y-4">
                                    <label className="block text-sm text-slate-400">รหัสนักศึกษา / เลขบัตรประชาชน</label>
                                    <div className="flex gap-4">
                                        <input 
                                            type="text" 
                                            className="w-full bg-dark-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-brand text-white"
                                            placeholder="กรอกรหัส..."
                                            value={searchId}
                                            onChange={(e) => setSearchId(e.target.value)}
                                            onKeyPress={(e) => e.key === 'Enter' && handleSearch()}
                                        />
                                        <button onClick={handleSearch} className="bg-brand hover:bg-brand-dark text-white px-6 py-3 rounded-lg font-semibold transition">ค้นหา</button>
                                    </div>
                                    <p className="text-xs text-slate-500">* ทดสอบใช้รหัส: 65123456</p>
                                </div>
                            ) : (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="bg-dark-800 p-4 rounded-xl border border-slate-700">
                                        <p className="text-sm text-slate-400">ข้อมูลนักศึกษา</p>
                                        <p className="text-lg font-bold text-white mt-1">{currentStudent.Name}</p>
                                        <p className="text-brand">{currentStudent.Major} ({currentStudent.StudentID})</p>
                                    </div>

                                    <div>
                                        <label className="block text-sm text-slate-400 mb-2">เลือกกิจกรรมที่เข้าร่วม</label>
                                        <select 
                                            className="w-full bg-dark-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-brand text-white appearance-none"
                                            onChange={(e) => setSelectedActId(e.target.value)}
                                            value={selectedActId || ''}
                                        >
                                            <option value="" disabled>-- กรุณาเลือกกิจกรรม --</option>
                                            {activeActs.map(act => (
                                                <option key={act.ActID} value={act.ActID}>{act.ActName}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <button 
                                        onClick={handleSubmit}
                                        className="w-full bg-brand hover:bg-brand-dark text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-brand/30 transition transform hover:scale-[1.02]"
                                    >
                                        ยืนยันลงทะเบียน
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // 3. Survey View
            const SurveyView = () => {
                const questions = Array.from({length: 13}, (_, i) => `คำถามข้อที่ ${i + 1}: ความพึงพอใจด้านการจัดกิจกรรมและการนำไปใช้ประโยชน์`);
                
                const submitSurvey = (e) => {
                    e.preventDefault();
                    showLoading('กำลังส่งแบบประเมิน...');
                    setTimeout(() => {
                        showSuccess('ขอบคุณสำหรับข้อเสนอแนะ!');
                        setCurrentStudent(null);
                        setSelectedActId(null);
                        setView('home');
                    }, 1200);
                };

                return (
                    <div className="max-w-3xl mx-auto mt-10 p-6">
                        <div className="glass-card p-8 rounded-2xl">
                            <div className="text-center mb-8">
                                <h2 className="text-2xl font-bold text-white">แบบประเมินความพึงพอใจ</h2>
                                <p className="text-brand">กรุณาประเมินเพื่อเสร็จสิ้นการลงทะเบียน</p>
                            </div>

                            <form onSubmit={submitSurvey} className="space-y-6">
                                {questions.map((q, idx) => (
                                    <div key={idx} className="bg-dark-800/50 p-4 rounded-lg border border-slate-700/50">
                                        <p className="mb-3 text-sm">{q}</p>
                                        <div className="flex justify-between md:justify-start md:gap-8">
                                            {[5, 4, 3, 2, 1].map(score => (
                                                <label key={score} className="flex flex-col items-center gap-1 cursor-pointer group">
                                                    <input type="radio" name={`q${idx}`} value={score} required className="text-brand focus:ring-brand accent-brand w-5 h-5" />
                                                    <span className="text-xs text-slate-400 group-hover:text-brand">{score}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                                
                                <div className="pt-4">
                                    <label className="block text-sm mb-2">ข้อเสนอแนะเพิ่มเติม (ถ้ามี)</label>
                                    <textarea className="w-full bg-dark-900 border border-slate-700 rounded-lg p-3 text-white focus:border-brand" rows="3"></textarea>
                                </div>

                                <button type="submit" className="w-full bg-brand hover:bg-brand-dark text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-brand/30 transition">
                                    ส่งแบบประเมิน
                                </button>
                            </form>
                        </div>
                    </div>
                );
            };

            // 4. History View
            const HistoryView = () => {
                const [searchId, setSearchId] = useState('');
                const [history, setHistory] = useState(null);

                const handleSearch = () => {
                    const student = MOCK_STUDENTS.find(s => s.StudentID === searchId || s.IDCard === searchId);
                    if (student) {
                        // Mock History Data
                        setHistory({
                            student: student,
                            records: [
                                { actName: 'ปฐมนิเทศนักศึกษาใหม่ คณะเทคโนโลยีดิจิทัล', date: '15 มิ.ย. 2026', time: '08:30 น.' },
                                { actName: 'กีฬาสานสัมพันธ์ 69', date: '10 พ.ค. 2026', time: '13:15 น.' }
                            ]
                        });
                    } else {
                        showError('ไม่พบข้อมูล', 'ไม่พบประวัติการเข้าร่วมกิจกรรม');
                        setHistory(null);
                    }
                };

                return (
                    <div className="max-w-4xl mx-auto mt-10 p-6">
                        <button onClick={() => setView('home')} className="text-brand flex items-center gap-2 mb-6 hover:underline">← กลับหน้าหลัก</button>
                        
                        <div className="glass-card p-8 rounded-2xl mb-8">
                            <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icons.History/> ตรวจสอบประวัติกิจกรรม</h2>
                            <div className="flex gap-4">
                                <input 
                                    type="text" 
                                    className="w-full bg-dark-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-brand text-white"
                                    placeholder="กรอกรหัสนักศึกษา หรือ เลขบัตร ปชช..."
                                    value={searchId}
                                    onChange={(e) => setSearchId(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleSearch()}
                                />
                                <button onClick={handleSearch} className="bg-brand hover:bg-brand-dark px-6 py-3 rounded-lg font-semibold transition">ตรวจสอบ</button>
                            </div>
                        </div>

                        {history && (
                            <div className="bg-dark-800 rounded-2xl border border-slate-700 overflow-hidden animate-fade-in">
                                <div className="p-6 border-b border-slate-700 bg-slate-800/50">
                                    <h3 className="text-xl font-bold text-white">{history.student.Name}</h3>
                                    <p className="text-brand">{history.student.Major} | รหัส: {history.student.StudentID}</p>
                                </div>
                                <div className="p-0">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-dark-900 text-slate-400 text-sm">
                                                <th className="p-4 font-medium">วันที่</th>
                                                <th className="p-4 font-medium">เวลา</th>
                                                <th className="p-4 font-medium">ชื่อกิจกรรม</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {history.records.map((rec, i) => (
                                                <tr key={i} className="border-b border-slate-800 hover:bg-slate-800/50 transition">
                                                    <td className="p-4 whitespace-nowrap">{rec.date}</td>
                                                    <td className="p-4 whitespace-nowrap text-brand">{rec.time}</td>
                                                    <td className="p-4">{rec.actName}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // ==========================================
            // 🛡️ ADMIN VIEWS (Dashboard)
            // ==========================================
            
            const AdminLogin = () => {
                const [user, setUser] = useState('');
                const [pass, setPass] = useState('');

                const handleLogin = (e) => {
                    e.preventDefault();
                    if(user === 'admin' && pass === '0000') {
                        setIsAdmin(true);
                        setView('admin');
                        showSuccess('เข้าสู่ระบบสำเร็จ');
                    } else {
                        showError('ผิดพลาด', 'Username หรือ Password ไม่ถูกต้อง');
                    }
                }

                return (
                    <div className="flex items-center justify-center min-h-[70vh]">
                        <div className="glass-card p-8 rounded-2xl w-full max-w-md">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-brand/20 text-brand rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icons.Login />
                                </div>
                                <h2 className="text-2xl font-bold">Staff Login</h2>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm text-slate-400 mb-1">Username</label>
                                    <input type="text" value={user} onChange={e=>setUser(e.target.value)} className="w-full bg-dark-900 border border-slate-700 rounded-lg p-3 text-white focus:border-brand" required />
                                </div>
                                <div>
                                    <label className="block text-sm text-slate-400 mb-1">Password</label>
                                    <input type="password" value={pass} onChange={e=>setPass(e.target.value)} className="w-full bg-dark-900 border border-slate-700 rounded-lg p-3 text-white focus:border-brand" required />
                                </div>
                                <button type="submit" className="w-full bg-brand hover:bg-brand-dark py-3 rounded-lg font-bold mt-4">Login</button>
                                <button type="button" onClick={()=>setView('home')} className="w-full text-slate-400 hover:text-white py-2 text-sm">กลับหน้าหลัก</button>
                            </form>
                        </div>
                    </div>
                )
            };

            const AdminDashboard = () => {
                const [adminTab, setAdminTab] = useState('overview');

                const menuItems = [
                    { id: 'overview', name: '1. ภาพรวม (Overview)', icon: <Icons.Dashboard /> },
                    { id: 'majors', name: '2. สัดส่วนสาขาวิชา', icon: <Icons.Dashboard /> },
                    { id: 'exec', name: '3. รายงานผู้บริหาร', icon: <Icons.Report /> },
                    { id: 'activities', name: '4. จัดการกิจกรรม', icon: <Icons.CheckIn /> },
                    { id: 'realtime', name: '5. ยอดเช็คชื่อ (Real-time)', icon: <Icons.History /> },
                    { id: 'spss', name: '6. รายงาน SPSS', icon: <Icons.Report /> },
                    { id: 'users', name: '7. จัดการสิทธิ์แอดมิน', icon: <Icons.Users /> },
                    { id: 'settings', name: '8. ตั้งค่าระบบ', icon: <Icons.Settings /> },
                ];

                // Sub-components for Dashboard Tabs
                const TabOverview = () => (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold">ภาพรวมระบบ (KPIs)</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="glass-card p-6 rounded-xl border-l-4 border-l-brand">
                                <p className="text-slate-400 text-sm">ยอดขึ้นทะเบียนรวม</p>
                                <p className="text-4xl font-bold mt-2">1,245 <span className="text-sm font-normal text-slate-500">คน</span></p>
                            </div>
                            <div className="glass-card p-6 rounded-xl border-l-4 border-l-blue-500">
                                <p className="text-slate-400 text-sm">กิจกรรมที่เปิดอยู่</p>
                                <p className="text-4xl font-bold mt-2">2 <span className="text-sm font-normal text-slate-500">กิจกรรม</span></p>
                            </div>
                            <div className="glass-card p-6 rounded-xl border-l-4 border-l-green-500">
                                <p className="text-slate-400 text-sm">ประเมินแล้ว</p>
                                <p className="text-4xl font-bold mt-2">1,180 <span className="text-sm font-normal text-slate-500">ครั้ง</span></p>
                            </div>
                        </div>
                    </div>
                );

                const TabMajors = () => (
                    <div>
                        <h2 className="text-2xl font-bold mb-6">สัดส่วนตามสาขาวิชา</h2>
                        <div className="glass-card p-8 rounded-xl flex flex-col items-center">
                            {/* CSS Only Pie Chart representation for standalone React without external heavy libs */}
                            <div className="relative w-64 h-64 rounded-full" style={{ background: 'conic-gradient(#FF6B00 0% 40%, #3b82f6 40% 75%, #22c55e 75% 100%)' }}>
                                <div className="absolute inset-4 bg-dark-900 rounded-full flex items-center justify-center">
                                    <div className="text-center">
                                        <p className="text-3xl font-bold text-white">100%</p>
                                        <p className="text-xs text-slate-400">Total Students</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-6 mt-8">
                                <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-brand"></span> วิศวกรรมซอฟต์แวร์ (40%)</div>
                                <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-blue-500"></span> วิทยาการคอมพิวเตอร์ (35%)</div>
                                <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-green-500"></span> เทคโนโลยีสารสนเทศ (25%)</div>
                            </div>
                        </div>
                    </div>
                );

                const TabActivities = () => {
                    const toggleStatus = (id) => {
                        setActivities(activities.map(a => a.ActID === id ? {...a, Status: a.Status === 'open' ? 'closed' : 'open'} : a));
                        showSuccess('อัปเดตสถานะแล้ว');
                    }
                    return (
                        <div>
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-bold">จัดการกิจกรรม</h2>
                                <button className="bg-brand hover:bg-brand-dark px-4 py-2 rounded-lg text-sm font-bold">+ สร้างกิจกรรมใหม่</button>
                            </div>
                            <div className="glass-card overflow-hidden rounded-xl">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-dark-900 border-b border-slate-700">
                                        <tr>
                                            <th className="p-4">ชื่อกิจกรรม</th>
                                            <th className="p-4">วันที่จัด</th>
                                            <th className="p-4">สถานที่</th>
                                            <th className="p-4">สถานะ (เปิด/ปิด)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {activities.map(act => (
                                            <tr key={act.ActID} className="border-b border-slate-800 hover:bg-slate-800/50">
                                                <td className="p-4">{act.ActName}</td>
                                                <td className="p-4">{act.Date}</td>
                                                <td className="p-4">{act.Location}</td>
                                                <td className="p-4">
                                                    <button 
                                                        onClick={() => toggleStatus(act.ActID)}
                                                        className={`px-3 py-1 rounded-full text-xs font-bold ${act.Status === 'open' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}
                                                    >
                                                        {act.Status === 'open' ? 'OPEN' : 'CLOSE'}
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )
                };

                const TabRealtime = () => (
                    <div>
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold">ยอดเช็คชื่อ (Real-time)</h2>
                            <button className="flex items-center gap-2 bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg text-sm font-bold">
                                <Icons.Download /> Export Excel
                            </button>
                        </div>
                        <div className="glass-card p-6 rounded-xl border border-slate-700 space-y-4">
                            <div className="flex justify-between items-center p-4 bg-dark-900 rounded-lg">
                                <div>
                                    <h4 className="font-bold text-lg text-brand">ปฐมนิเทศนักศึกษาใหม่</h4>
                                    <p className="text-sm text-slate-400">กำลังเปิดรับลงทะเบียน...</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-3xl font-bold">452</p>
                                    <p className="text-xs text-slate-400">คนลงทะเบียนแล้ว</p>
                                </div>
                            </div>
                            {/* Live Feed Mock */}
                            <div className="text-sm text-slate-400 space-y-2 mt-4">
                                <p className="animate-pulse flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-green-500"></span> 65123456 นายสมชาย ใจดี เช็คชื่อเมื่อ 10 วินาทีที่แล้ว</p>
                                <p className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-slate-500"></span> 66112233 นางสาวสมหญิง สวยงาม เช็คชื่อเมื่อ 1 นาทีที่แล้ว</p>
                            </div>
                        </div>
                    </div>
                );

                const TabSPSS = () => (
                    <div>
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold">รายงานสถิติ SPSS (ความพึงพอใจ)</h2>
                            <button className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-bold">
                                <Icons.Download /> Export Word (.doc)
                            </button>
                        </div>
                        <div className="glass-card overflow-hidden rounded-xl">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-dark-900 border-b border-slate-700">
                                    <tr>
                                        <th className="p-4">ประเด็นการประเมิน</th>
                                        <th className="p-4 text-center">N</th>
                                        <th className="p-4 text-center">x̄</th>
                                        <th className="p-4 text-center">S.D.</th>
                                        <th className="p-4 text-center">แปลผล</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {[1,2,3,4,5].map(i => (
                                        <tr key={i} className="border-b border-slate-800">
                                            <td className="p-4">คำถามข้อที่ {i}: ด้านการจัดกิจกรรม</td>
                                            <td className="p-4 text-center">452</td>
                                            <td className="p-4 text-center text-brand font-bold">4.6{i}</td>
                                            <td className="p-4 text-center">0.5{i}</td>
                                            <td className="p-4 text-center text-green-400">มากที่สุด</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );

                const TabSettings = () => {
                    const handleToggleSys = () => {
                        const newState = !systemOpen;
                        setSystemOpen(newState);
                        localStorage.setItem('digit69_systemOpen', newState);
                        showSuccess(newState ? 'เปิดระบบลงทะเบียนแล้ว' : 'ปิดระบบลงทะเบียนแล้ว');
                    };

                    return (
                        <div className="max-w-xl">
                            <h2 className="text-2xl font-bold mb-6">ตั้งค่าระบบ (Settings)</h2>
                            <div className="glass-card p-6 rounded-xl flex justify-between items-center">
                                <div>
                                    <h4 className="font-bold text-lg">1. ระบบลงทะเบียนนักศึกษา</h4>
                                    <p className="text-sm text-slate-400">เปิด/ปิด เมนูลงทะเบียนในหน้าหลัก (ใช้อำพรางเมื่อหมดเขต)</p>
                                </div>
                                <button 
                                    onClick={handleToggleSys}
                                    className={`relative inline-flex h-8 w-14 items-center rounded-full transition-colors ${systemOpen ? 'bg-brand' : 'bg-slate-600'}`}
                                >
                                    <span className={`inline-block h-6 w-6 transform rounded-full bg-white transition-transform ${systemOpen ? 'translate-x-7' : 'translate-x-1'}`}/>
                                </button>
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="flex h-[calc(100vh-80px)] overflow-hidden">
                        {/* Sidebar */}
                        <div className="w-64 glass border-r border-slate-700/50 flex flex-col">
                            <div className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Admin Menu</div>
                            <div className="flex-1 overflow-y-auto px-3 space-y-1">
                                {menuItems.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => setAdminTab(item.id)}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm transition-all ${adminTab === item.id ? 'bg-brand/10 text-brand border border-brand/20' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}
                                    >
                                        {item.icon} {item.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 overflow-y-auto p-8 bg-dark-900/50">
                            {adminTab === 'overview' && <TabOverview />}
                            {adminTab === 'majors' && <TabMajors />}
                            {adminTab === 'exec' && <TabOverview /> /* ใช้ร่วมกันไปก่อนสำหรับ Demo */}
                            {adminTab === 'activities' && <TabActivities />}
                            {adminTab === 'realtime' && <TabRealtime />}
                            {adminTab === 'spss' && <TabSPSS />}
                            {adminTab === 'users' && <div className="p-6">ระบบจัดการสิทธิ์ผู้ใช้งาน (สำหรับ Super Admin)</div>}
                            {adminTab === 'settings' && <TabSettings />}
                        </div>
                    </div>
                );
            };

            // View Renderer
            return (
                <div className="flex flex-col min-h-screen">
                    <Navbar />
                    <main className="flex-1 flex flex-col">
                        {view === 'home' && <HomeView />}
                        {view === 'checkin' && <CheckInView />}
                        {view === 'survey' && <SurveyView />}
                        {view === 'history' && <HistoryView />}
                        {view === 'adminLogin' && <AdminLogin />}
                        {view === 'admin' && isAdmin && <AdminDashboard />}
                    </main>
                </div>
            );
        }

        // ==========================================
        // Initialize App
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
