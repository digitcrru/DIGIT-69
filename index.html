<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนเข้าร่วมกิจกรรม</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c', 800: '#9a3412', 900: '#7c2d12' },
                        dark: { 800: '#1f2937', 900: '#111827' }
                    }
                }
            }
        }
    </script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Modern Animated Background Shapes */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }
        body::before {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: rgba(249, 115, 22, 0.15); /* Brand Orange */
        }
        body::after {
            bottom: -10%; right: -10%;
            width: 40vw; height: 40vw;
            background: rgba(236, 72, 153, 0.15); /* Pink/Rose */
            animation-delay: -10s;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 10%) scale(1.1); }
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0,0,0,0.05);
        }

        .glass-panel-dark {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.4);
        }

        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-brand-500 selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Utils: Promisify Google Apps Script calls ---
        const runGAS = (functionName, ...args) => {
            return new Promise((resolve, reject) => {
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        [functionName](...args);
                } else {
                    console.warn(`[Mock Mode] GAS environment not found. Mocking: ${functionName}`);
                    // Mock data responses for local preview / testing
                    setTimeout(() => {
                        switch(functionName) {
                            case 'getActiveActivities':
                                resolve([
                                    { ActivityID: 'MOCK_01', Name: '[ทดสอบ] กิจกรรมปฐมนิเทศนักศึกษาใหม่', Date: '2026-06-10', Location: 'หอประชุมใหญ่', Status: 'open' },
                                    { ActivityID: 'MOCK_02', Name: '[ทดสอบ] อบรมการใช้งานระบบ IT', Date: '2026-06-15', Location: 'ห้องคอมพิวเตอร์ 1', Status: 'open' }
                                ]);
                                break;
                            case 'verifyStudent':
                                resolve({ success: true, data: { StudentID: args[0], Name: 'นักศึกษา ทดสอบ (Mock)', Major: 'วิศวกรรมซอฟต์แวร์' } });
                                break;
                            case 'saveCheckInAndSurvey':
                                resolve({ success: true });
                                break;
                            case 'getStudentHistory':
                                resolve([
                                    { ActivityName: '[ทดสอบ] กิจกรรมวิชาการ', Name: 'นักศึกษา ทดสอบ', StudentID: args[0], Timestamp: new Date().toISOString() }
                                ]);
                                break;
                            case 'getAdminDashboardData':
                                resolve({
                                    activities: [
                                        { ActivityID: 'MOCK_01', Name: '[ทดสอบ] กิจกรรมปฐมนิเทศนักศึกษาใหม่', Date: '2026-06-10', Location: 'หอประชุมใหญ่', Status: 'open' }
                                    ],
                                    checkins: [
                                        { StudentID: '6600001', Name: 'นักศึกษา ทดสอบ', Major: 'วิศวกรรมซอฟต์แวร์', ActivityName: '[ทดสอบ] กิจกรรมปฐมนิเทศนักศึกษาใหม่', Timestamp: new Date().toISOString() }
                                    ],
                                    evaluations: [
                                        { ActivityID: 'MOCK_01', Q1_1: 5, Q1_2: 4, Q1_3: 5, Q1_4: 4, Q2_1: 5, Q2_2: 4, Q2_3: 5, Q2_4: 4, Q3_1: 5, Q3_2: 4, Q3_3: 5, Q3_4: 4, Q3_5: 5, Suggestion: 'เป็นกิจกรรมที่จัดได้ดีมากครับ' }
                                    ]
                                });
                                break;
                            case 'createActivity':
                            case 'toggleActivityStatus':
                                resolve({ success: true });
                                break;
                            default:
                                resolve(null);
                        }
                    }, 500);
                }
            });
        };

        // --- Data Models ---
        const surveyData = [
            {
                title: "1. กระบวนการ ขั้นตอนการให้บริการ",
                questions: [
                    { id: "q1", text: "1.1 การประชาสัมพันธ์โครงการ ฯ" },
                    { id: "q2", text: "1.2 ความเหมาะสมของสถานที่" },
                    { id: "q3", text: "1.3 ความเหมาะสมของระยะเวลา" },
                    { id: "q4", text: "1.4 การจัดลำดับขั้นตอนของกิจกรรม" },
                ]
            },
            {
                title: "2. การอำนวยความสะดวก",
                questions: [
                    { id: "q5", text: "2.1 เอกสาร" },
                    { id: "q6", text: "2.2 โสตทัศนูปกรณ์" },
                    { id: "q7", text: "2.3 เจ้าหน้าที่สนับสนุน" },
                    { id: "q8", text: "2.4 อาหาร,เครื่องดื่มและสถานที่" },
                ]
            },
            {
                title: "3. คุณภาพการให้บริการ",
                questions: [
                    { id: "q9", text: "3.1 ท่านได้รับความรู้ แนวคิด ทักษะและประสบการณ์ใหม่ ๆ จากโครงการ" },
                    { id: "q10", text: "3.2 ท่านสามารถนำสิ่งที่ได้รับจากโครงการ/กิจกรรมนี้ไปใช้ในการปฏิบัติงาน" },
                    { id: "q11", text: "3.3 สิ่งที่ท่านได้รับจากโครงการ/กิจกรรมครั้งนี้ตรงตามความคาดหวังของท่านหรือไม่" },
                    { id: "q12", text: "3.4 โครงการ/กิจกรรมนี้เอื้ออำนวยต่อการเรียนรู้และพัฒนาความสามารถของท่าน" },
                    { id: "q13", text: "3.5 ประโยชน์ที่ท่านได้รับจากโครงการ/กิจกรรม" },
                ]
            }
        ];

        // --- Main App Component ---
        function App() {
            const [view, setView] = useState('home'); // home, search, select, survey, success, history_search, history_result, admin_login, admin_dashboard
            const [student, setStudent] = useState(null);
            const [activities, setActivities] = useState([]);
            const [selectedActivity, setSelectedActivity] = useState(null);
            const [surveyAnswers, setSurveyAnswers] = useState({});
            const [suggestion, setSuggestion] = useState('');
            const [historyData, setHistoryData] = useState([]);

            // System State
            const [systemOpen, setSystemOpen] = useState(localStorage.getItem('system_status') !== 'maintenance');

            // Admin State
            const [adminData, setAdminData] = useState(null);

            // Effect: Load active activities on start
            useEffect(() => {
                const loadInitialData = async () => {
                    try {
                        const acts = await runGAS('getActiveActivities');
                        setActivities(acts || []);
                    } catch (e) {
                        console.error("Failed to load activities", e);
                    }
                };
                loadInitialData();

                // Check logged in admin
                if (localStorage.getItem('admin_logged_in') === 'true') {
                    // Pre-load dashboard if they were there
                }
            }, []);

            // --- Handlers: Student Flow ---
            const handleSearchStudent = async (studentId) => {
                if(!studentId) return Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสนักศึกษา', 'warning');
                
                Swal.fire({ title: 'กำลังค้นหาข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                
                try {
                    const res = await runGAS('verifyStudent', studentId);
                    Swal.close();
                    if(res.success) {
                        setStudent(res.data);
                        localStorage.setItem('last_student_id', studentId);
                        setView('select');
                    } else {
                        Swal.fire('ไม่พบข้อมูล', 'ไม่พบรหัสนักศึกษานี้ในระบบ', 'error');
                    }
                } catch(e) {
                    Swal.fire('เกิดข้อผิดพลาด', e.message, 'error');
                }
            };

            const handleSelectActivity = (act) => {
                setSelectedActivity(act);
                setView('survey');
            };

            const handleSubmitSurvey = async (e) => {
                e.preventDefault();
                // Validate if all questions answered
                const totalQuestions = surveyData.reduce((acc, cat) => acc + cat.questions.length, 0);
                if(Object.keys(surveyAnswers).length < totalQuestions) {
                    Swal.fire('กรุณาตอบให้ครบ', 'กรุณาประเมินความพึงพอใจให้ครบทุกข้อ', 'warning');
                    return;
                }

                Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                
                try {
                    const payload = {
                        student,
                        activity: selectedActivity,
                        answers: surveyAnswers,
                        suggestion
                    };
                    const res = await runGAS('saveCheckInAndSurvey', payload);
                    Swal.close();
                    if(res.success) {
                        Swal.fire({
                            title: 'บันทึกสำเร็จ!',
                            text: 'ขอบคุณที่เข้าร่วมกิจกรรมและทำแบบประเมิน',
                            icon: 'success',
                            confirmButtonColor: '#ea580c'
                        }).then(() => {
                            // Reset state
                            setStudent(null);
                            setSelectedActivity(null);
                            setSurveyAnswers({});
                            setSuggestion('');
                            setView('home');
                        });
                    } else {
                        Swal.fire('ข้อผิดพลาด', res.error, 'error');
                    }
                } catch(e) {
                    Swal.fire('เกิดข้อผิดพลาด', e.message, 'error');
                }
            };

            const handleSearchHistory = async (studentId) => {
                if(!studentId) return Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสนักศึกษา', 'warning');
                Swal.fire({ title: 'กำลังดึงประวัติ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                
                try {
                    const data = await runGAS('getStudentHistory', studentId);
                    Swal.close();
                    setHistoryData(data || []);
                    setView('history_result');
                } catch(e) {
                    Swal.fire('เกิดข้อผิดพลาด', e.message, 'error');
                }
            };

            // --- UI Rendering Helpers ---
            const Navbar = () => (
                <div className="pt-4 px-4 sm:px-8 w-full max-w-6xl mx-auto">
                    <nav className="glass-panel-dark text-white px-6 py-3.5 flex justify-between items-center rounded-full shadow-2xl transition-all duration-300">
                        <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setView('home')}>
                            <div className="w-10 h-10 bg-gradient-to-tr from-brand-500 to-rose-500 rounded-full flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
                                <i className="fa-solid fa-graduation-cap text-xl text-white"></i>
                            </div>
                            <h1 className="font-bold text-lg tracking-wide hidden sm:block group-hover:text-brand-300 transition-colors">Activity<span className="font-light">System</span></h1>
                        </div>
                        {view.startsWith('admin') ? (
                            <button onClick={() => {
                                localStorage.removeItem('admin_logged_in');
                                setView('home');
                            }} className="text-sm bg-red-500/20 hover:bg-red-500/40 text-red-100 px-5 py-2.5 rounded-full transition-all border border-red-500/30 flex items-center font-medium">
                                <i className="fa-solid fa-right-from-bracket mr-2"></i>ออกจากระบบ
                            </button>
                        ) : (
                            <button onClick={() => setView('admin_login')} className="text-sm bg-white/10 hover:bg-white/20 text-white px-5 py-2.5 rounded-full transition-all border border-white/10 flex items-center backdrop-blur-md font-medium">
                                <i className="fa-solid fa-shield-halved mr-2 text-brand-400"></i>Staff Login
                            </button>
                        )}
                    </nav>
                </div>
            );

            const Footer = () => (
                <div className="w-full text-center py-6 mt-auto relative z-10">
                    <p className="text-sm font-medium text-gray-500 drop-shadow-sm">
                        Developed by <span className="font-bold text-brand-600 tracking-wide">JENNAEONG</span>
                    </p>
                </div>
            );

            // ==========================================
            // VIEWS
            // ==========================================

            // 1. Home View
            if (view === 'home') {
                return (
                    <div className="min-h-screen flex flex-col relative z-10">
                        <Navbar />
                        <div className="flex-grow flex items-center justify-center p-4">
                            <div className="max-w-4xl w-full grid md:grid-cols-2 gap-8">
                                {/* Menu 1 */}
                                <div onClick={() => systemOpen ? setView('search') : Swal.fire('ปิดระบบ', 'ระบบปิดปรับปรุงชั่วคราว', 'info')} 
                                     className={`glass-panel p-10 rounded-[2rem] cursor-pointer transform hover:-translate-y-2 hover:shadow-2xl transition-all duration-300 group relative overflow-hidden ${!systemOpen ? 'opacity-70 grayscale' : ''}`}>
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-brand-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
                                    <div className="w-16 h-16 bg-gradient-to-br from-brand-100 to-rose-100 text-brand-600 rounded-2xl flex items-center justify-center text-3xl mb-6 shadow-sm group-hover:scale-110 group-hover:rotate-3 transition-transform duration-300">
                                        <i className="fa-solid fa-qrcode"></i>
                                    </div>
                                    <h2 className="text-3xl font-bold text-gray-800 mb-3 tracking-tight">ลงทะเบียนกิจกรรม</h2>
                                    <p className="text-gray-500 leading-relaxed font-medium">เช็คชื่อเข้าร่วมกิจกรรมและทำแบบประเมินความพึงพอใจอย่างรวดเร็ว</p>
                                    <div className="mt-8 flex items-center text-brand-600 font-semibold group-hover:translate-x-2 transition-transform">
                                        เริ่มใช้งาน <i className="fa-solid fa-arrow-right-long ml-2"></i>
                                    </div>
                                </div>
                                {/* Menu 2 */}
                                <div onClick={() => setView('history_search')} 
                                     className="glass-panel p-10 rounded-[2rem] cursor-pointer transform hover:-translate-y-2 hover:shadow-2xl transition-all duration-300 group relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
                                    <div className="w-16 h-16 bg-gradient-to-br from-blue-50 to-indigo-100 text-blue-600 rounded-2xl flex items-center justify-center text-3xl mb-6 shadow-sm group-hover:scale-110 group-hover:-rotate-3 transition-transform duration-300">
                                        <i className="fa-solid fa-clock-rotate-left"></i>
                                    </div>
                                    <h2 className="text-3xl font-bold text-gray-800 mb-3 tracking-tight">ตรวจสอบประวัติ</h2>
                                    <p className="text-gray-500 leading-relaxed font-medium">ดูประวัติการเข้าร่วมกิจกรรมย้อนหลังทั้งหมดของคุณแบบเรียลไทม์</p>
                                    <div className="mt-8 flex items-center text-blue-600 font-semibold group-hover:translate-x-2 transition-transform">
                                        ตรวจสอบเลย <i className="fa-solid fa-arrow-right-long ml-2"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <Footer />
                    </div>
                );
            }

            // 2. Search Student View
            if (view === 'search') {
                return (
                    <div className="min-h-screen flex flex-col relative z-10">
                        <Navbar />
                        <div className="flex-grow flex flex-col items-center justify-center p-4">
                            <div className="glass-panel w-full max-w-md p-10 rounded-[2rem] relative overflow-hidden">
                                <div className="absolute -top-20 -right-20 w-40 h-40 bg-brand-500/20 rounded-full blur-3xl"></div>
                                
                                <button onClick={() => setView('home')} className="absolute top-6 left-6 w-10 h-10 flex items-center justify-center bg-gray-100/50 hover:bg-gray-200 text-gray-600 rounded-full transition-colors border border-white">
                                    <i className="fa-solid fa-arrow-left"></i>
                                </button>
                                
                                <div className="text-center mt-6 mb-8">
                                    <div className="w-20 h-20 bg-gradient-to-br from-brand-100 to-rose-100 mx-auto rounded-full flex items-center justify-center mb-4 shadow-inner">
                                        <i className="fa-regular fa-id-card text-3xl text-brand-600"></i>
                                    </div>
                                    <h2 className="text-3xl font-bold text-gray-800 tracking-tight">ค้นหานักศึกษา</h2>
                                    <p className="text-gray-500 mt-2 font-medium">กรุณาระบุข้อมูลเพื่อเข้าสู่ระบบ</p>
                                </div>
                                
                                <form onSubmit={(e) => { e.preventDefault(); handleSearchStudent(e.target.studentId.value); }}>
                                    <div className="relative mb-6">
                                        <i className="fa-solid fa-magnifying-glass absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                        <input type="text" name="studentId" required placeholder="รหัสนักศึกษา หรือ เลขบัตร ปชช." defaultValue={localStorage.getItem('last_student_id')||''}
                                               className="w-full pl-12 pr-5 py-4 rounded-2xl border border-white/80 focus:border-brand-400 focus:ring-4 focus:ring-brand-500/20 outline-none transition-all text-lg bg-white/70 backdrop-blur-md shadow-inner placeholder-gray-400 font-medium text-gray-800" />
                                    </div>
                                    <button type="submit" className="w-full bg-gradient-to-r from-brand-500 to-rose-500 hover:from-brand-600 hover:to-rose-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-brand-500/30 transition-all transform hover:-translate-y-0.5 active:scale-95 text-lg">
                                        ค้นหาข้อมูล
                                    </button>
                                </form>
                            </div>
                        </div>
                        <Footer />
                    </div>
                );
            }

            // 3. Select Activity View
            if (view === 'select') {
                return (
                    <div className="min-h-screen flex flex-col relative z-10">
                        <Navbar />
                        <div className="flex-grow flex flex-col items-center pt-8 p-4">
                            <div className="glass-panel w-full max-w-2xl p-8 sm:p-10 rounded-[2rem]">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 bg-white/60 backdrop-blur-sm p-6 rounded-2xl border border-white shadow-sm">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 bg-gradient-to-tr from-brand-500 to-rose-400 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-md">
                                            {student.Name.charAt(0)}
                                        </div>
                                        <div>
                                            <p className="text-sm text-gray-500 font-medium">ยินดีต้อนรับ</p>
                                            <h2 className="text-xl font-bold text-gray-800">{student.Name}</h2>
                                            <p className="text-brand-600 font-semibold text-sm mt-0.5">{student.Major} <span className="text-gray-300 mx-1">|</span> {student.StudentID}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setView('search')} className="mt-4 sm:mt-0 text-sm bg-white hover:bg-gray-50 text-gray-700 px-4 py-2.5 rounded-full font-medium transition-colors border border-gray-200 shadow-sm flex items-center gap-2">
                                        <i className="fa-solid fa-user-pen"></i> เปลี่ยนผู้ใช้
                                    </button>
                                </div>
                                
                                <h3 className="font-bold text-xl text-gray-800 mb-5 flex items-center gap-3">
                                    <div className="w-10 h-10 bg-brand-100 rounded-xl flex items-center justify-center text-brand-600 shadow-inner"><i className="fa-solid fa-list-check"></i></div>
                                    เลือกกิจกรรมที่กำลังเปิดรับ
                                </h3>

                                <form onSubmit={handleSubmitSurvey}>
                                    
                                    {/* คำอธิบายความหมายของระดับคะแนน (Legend) */}

                                            <i className="fa-solid fa-check-circle text-xl"></i> ยืนยันการลงทะเบียน

            }

            // 5. History Flow
            if (view === 'history_search') {
                return (
                    <div className="min-h-screen flex flex-col relative z-10">
                        <Navbar />
                        <div className="flex-grow flex flex-col items-center justify-center p-4">
                            <div className="glass-panel w-full max-w-md p-10 rounded-[2rem] relative overflow-hidden">
                                <div className="absolute -top-20 -right-20 w-40 h-40 bg-blue-500/20 rounded-full blur-3xl"></div>
                                
                                <button onClick={() => setView('home')} className="absolute top-6 left-6 w-10 h-10 flex items-center justify-center bg-gray-100/50 hover:bg-gray-200 text-gray-600 rounded-full transition-colors border border-white">

                                    <div className="w-20 h-20 bg-gradient-to-br from-blue-100 to-indigo-100 mx-auto rounded-full flex items-center justify-center mb-4 shadow-inner">

                                        ตรวจสอบประวัติ

                                </form>
                            </div>
                        </div>
                        <Footer />
                    </div>
                );
            }

            if (view === 'history_result') {
                return (
                    <div className="min-h-screen flex flex-col relative z-10">
                        <Navbar />
                        <div className="flex-grow flex flex-col items-center pt-8 p-4 pb-20">
                            <div className="glass-panel w-full max-w-2xl p-6 sm:p-10 rounded-[2rem]">
                                <div className="flex items-center gap-4 mb-8 bg-white/40 p-4 rounded-2xl border border-white">
                                    <button onClick={() => setView('history_search')} className="w-12 h-12 flex items-center justify-center bg-white hover:bg-gray-50 text-gray-600 rounded-full transition-colors border border-gray-100 shadow-sm">
                                        <i className="fa-solid fa-arrow-left"></i>
                                    </button>
                                    <div>
                                        <h2 className="text-2xl font-bold text-gray-800 tracking-tight">ประวัติการเข้าร่วมกิจกรรม</h2>
                                        <p className="text-brand-600 font-medium">พบทั้งหมด {historyData.length} รายการ</p>
                                    </div>
                                </div>
                                
                                <div className="space-y-4">
                                    {historyData.length === 0 ? (
                                        <div className="text-center py-16 bg-white/40 rounded-3xl border-2 border-dashed border-gray-300">
                                            <div className="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fa-regular fa-folder-open text-3xl text-gray-400"></i></div>
                                            <p className="text-gray-500 font-medium text-lg">ไม่พบประวัติการเข้าร่วมกิจกรรม</p>
                                        </div>
                                    ) : (
                                        <div className="relative border-l-2 border-brand-200 ml-4 sm:ml-6 pl-6 sm:pl-8 space-y-8 py-4">
                                            {historyData.map((h, i) => (
                                                <div key={i} className="relative group">
                                                    <div className="absolute -left-[35px] sm:-left-[43px] top-1 w-5 h-5 sm:w-6 sm:h-6 bg-gradient-to-br from-brand-400 to-rose-400 rounded-full border-4 border-white shadow-sm group-hover:scale-125 transition-transform"></div>
                                                    <div className="bg-white/80 backdrop-blur-sm p-6 rounded-2xl border border-white shadow-sm hover:shadow-xl hover:shadow-brand-500/5 transition-all transform group-hover:-translate-y-1">
                                                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-4">
                                                            <div>
                                                                <span className="inline-block px-3 py-1 bg-brand-50 text-brand-600 rounded-full text-xs font-bold mb-3 border border-brand-100"><i className="fa-solid fa-check mr-1"></i> เข้าร่วมแล้ว</span>
                                                                <h4 className="font-bold text-gray-800 text-xl leading-tight mb-2">{h.ActivityName}</h4>
                                                                <p className="text-sm text-gray-500 font-medium flex items-center gap-2"><div className="w-6 h-6 bg-gray-100 rounded-full flex items-center justify-center"><i className="fa-regular fa-user text-xs"></i></div> {h.Name} ({h.StudentID})</p>
                                                            </div>
                                                            <div className="bg-gray-50 border border-gray-100 px-4 py-3 rounded-xl text-sm text-gray-700 font-semibold whitespace-nowrap text-center flex items-center justify-center gap-2 shadow-inner">
                                                                <i className="fa-regular fa-clock text-brand-500"></i>
                                                                {new Date(h.Timestamp).toLocaleString('th-TH')}
                                                            </div>
                                                        </div>
                                                    </div>

                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        <Footer />
                    </div>
                );
            }

            // ==========================================
            // ADMIN VIEWS
            // ==========================================
            
            // Admin Components & Logic nested here to keep State connected easily
            const handleAdminLogin = (e) => {
                e.preventDefault();
                const u = e.target.username.value;
                const p = e.target.password.value;
                if(u === 'admin' && p === '0000') {
                    localStorage.setItem('admin_logged_in', 'true');
                    loadAdminData();
                } else {
                    Swal.fire('ข้อผิดพลาด', 'รหัสผ่านไม่ถูกต้อง', 'error');
                }
            };

            const loadAdminData = async () => {
                Swal.fire({ title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try {
                    const data = await runGAS('getAdminDashboardData');
                    setAdminData(data);
                    Swal.close();
                    setView('admin_dashboard');
                } catch(e) {
                    Swal.fire('Error', e.message, 'error');
                }
            };

            if (view === 'admin_login') {
                return (
                    <div className="min-h-screen flex flex-col bg-gray-900 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
                            <div className="absolute -top-40 -right-40 w-96 h-96 bg-brand-500/20 rounded-full blur-3xl"></div>
                            <div className="absolute top-1/2 -left-20 w-72 h-72 bg-blue-500/20 rounded-full blur-3xl"></div>
                        </div>
                        
                        <div className="relative z-10 w-full"><Navbar /></div>
                        
                        <div className="flex-grow flex items-center justify-center p-4 relative z-10">
                            <div className="glass-panel-dark w-full max-w-md p-10 rounded-[2rem] border border-gray-700/50 shadow-2xl backdrop-blur-2xl">

                                    <h2 className="text-3xl font-bold text-white tracking-tight">Staff Login</h2>

                                </div>
                                <form onSubmit={handleAdminLogin} className="space-y-5">

                                        <i className="fa-solid fa-user absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                                        <input type="text" name="username" placeholder="Username" required
                                               className="w-full pl-12 pr-4 py-4 rounded-2xl bg-gray-900/60 text-white border border-gray-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 outline-none transition-all placeholder-gray-500 font-medium shadow-inner" />
                                    </div>
                                    <div className="relative">
                                        <i className="fa-solid fa-lock absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                                        <input type="password" name="password" placeholder="Password" required
                                               className="w-full pl-12 pr-4 py-4 rounded-2xl bg-gray-900/60 text-white border border-gray-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 outline-none transition-all placeholder-gray-500 font-medium shadow-inner" />
                                    </div>
                                    <button type="submit" className="w-full bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-400 hover:to-brand-500 text-white font-bold py-4 rounded-2xl transition-all transform hover:-translate-y-0.5 active:scale-95 shadow-lg shadow-brand-500/20 mt-2 text-lg">
                                        เข้าสู่ระบบ
                                    </button>

            if (view === 'admin_dashboard') {
