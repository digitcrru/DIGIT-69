                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="mb-5">
                                                <label className="block text-xs font-medium text-gray-400 uppercase tracking-widest mb-3">Size / ขนาด</label>
                                                <div className="grid grid-cols-3 sm:grid-cols-6 gap-2 sm:gap-3">
                                                    {['S', 'M', 'L', 'XL', '2XL', '3XL'].map(size => (
                                                        <label key={`p-${size}`} className={`relative flex flex-col items-center py-3 rounded-xl border cursor-pointer transition-all ${poloSize === size ? 'border-orange-500 bg-orange-50 text-orange-600 shadow-sm' : 'border-gray-200 text-gray-500 hover:border-orange-300'}`}>
                                                            <input type="radio" className="hidden" checked={poloSize === size} onChange={() => setPoloSize(size)} />
                                                            <span className="text-sm font-semibold">{size}</span><span className="text-[9px] opacity-70 mt-1">฿{getPrice(size)}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="flex justify-between items-center bg-orange-50/50 p-4 rounded-xl border border-orange-100">
                                                <label className="text-xs font-medium text-gray-500 uppercase tracking-widest">Quantity</label>
                                                <div className="flex items-center gap-3">
                                                    <button type="button" onClick={() => setPoloQty(Math.max(1, poloQty - 1))} className="w-8 h-8 rounded border border-orange-200 bg-white text-orange-500 hover:bg-orange-100"><i className="fa-solid fa-minus text-xs"></i></button>
                                                    <span className="font-semibold text-charcoal-900 w-6 text-center text-sm">{poloQty}</span>
                                                    <button type="button" onClick={() => setPoloQty(poloQty + 1)} className="w-8 h-8 rounded border border-orange-200 bg-white text-orange-500 hover:bg-orange-100"><i className="fa-solid fa-plus text-xs"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mb-10">
                                        <h3 className="font-semibold text-charcoal-900 mb-4 flex items-center"><span className="text-orange-500 mr-2">02.</span> เสื้อยืดกิจกรรม</h3>
                                        <div className="border border-orange-50/80 rounded-2xl p-5 sm:p-6 bg-white shadow-sm">
                                            <div className="mb-5">
                                                <label className="block text-xs font-medium text-gray-400 uppercase tracking-widest mb-3">Gender / ทรงเสื้อ</label>
                                                <div className="flex gap-4">
                                                    {['ชาย', 'หญิง'].map(g => (
                                                        <label key={`ts-${g}`} className={`flex-1 py-3 rounded-xl border text-center cursor-pointer text-sm font-medium transition-all ${tshirtGender === g ? 'border-orange-500 bg-orange-500 text-white shadow-md' : 'border-gray-200 text-gray-500 hover:border-orange-300'}`}>
                                                            <input type="radio" className="hidden" checked={tshirtGender === g} onChange={() => setTshirtGender(g)} /> ทรง{g}
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="mb-5">
                                                <label className="block text-xs font-medium text-gray-400 uppercase tracking-widest mb-3">Size / ขนาด</label>
                                                <div className="grid grid-cols-3 sm:grid-cols-6 gap-2 sm:gap-3">
                                                    {['S', 'M', 'L', 'XL', '2XL', '3XL'].map(size => (
                                                        <label key={`t-${size}`} className={`relative flex flex-col items-center py-3 rounded-xl border cursor-pointer transition-all ${tshirtSize === size ? 'border-orange-500 bg-orange-50 text-orange-600 shadow-sm' : 'border-gray-200 text-gray-500 hover:border-orange-300'}`}>
                                                            <input type="radio" className="hidden" checked={tshirtSize === size} onChange={() => setTshirtSize(size)} />
                                                            <span className="text-sm font-semibold">{size}</span><span className="text-[9px] opacity-70 mt-1">฿{getPrice(size)}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="flex justify-between items-center bg-orange-50/50 p-4 rounded-xl border border-orange-100">
                                                <label className="text-xs font-medium text-gray-500 uppercase tracking-widest">Quantity</label>
                                                <div className="flex items-center gap-3">
                                                    <button type="button" onClick={() => setTshirtQty(Math.max(1, tshirtQty - 1))} className="w-8 h-8 rounded border border-orange-200 bg-white text-orange-500 hover:bg-orange-100"><i className="fa-solid fa-minus text-xs"></i></button>
                                                    <span className="font-semibold text-charcoal-900 w-6 text-center text-sm">{tshirtQty}</span>
                                                    <button type="button" onClick={() => setTshirtQty(tshirtQty + 1)} className="w-8 h-8 rounded border border-orange-200 bg-white text-orange-500 hover:bg-orange-100"><i className="fa-solid fa-plus text-xs"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-gradient-to-r from-orange-50 to-orange-100 p-6 rounded-2xl mb-8 flex justify-between items-center border border-orange-200/50">
                                        <div><p className="text-xs font-medium text-orange-600/70 uppercase tracking-widest mb-1">Grand Total</p><p className="text-sm font-semibold text-charcoal-900">ยอดชำระสุทธิ</p></div>
                                        <div className="text-3xl font-bold text-orange-600">฿{grandTotal.toLocaleString()}</div>
                                    </div>

                                    <div className="flex gap-4">
                                        {isEditingOrder && <button type="button" onClick={() => setView('receipt')} className="w-1/3 py-4 rounded-xl border border-gray-200 text-gray-600 font-semibold text-sm hover:bg-gray-50 transition-colors">CANCEL</button>}
                                        <button type="submit" className={`${isEditingOrder ? 'w-2/3' : 'w-full'} btn-gradient py-4 rounded-xl font-semibold tracking-wider text-sm shadow-lg shadow-orange-500/20`}>CONFIRM ORDER</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <Footer />
                        <MobileTabBar />
                    </div>
                );
            }

            if (view === 'receipt') {
                const handleDownloadReceipt = () => {
                    const receiptElement = document.getElementById('receipt-card');
                    Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                    html2canvas(receiptElement, { scale: 2, backgroundColor: isDarkMode ? '#1e1e1e' : '#fffcf9' }).then(canvas => {
                        const link = document.createElement('a'); link.download = `Receipt_${receiptData.student.StudentID}.png`; link.href = canvas.toDataURL('image/png'); link.click(); Swal.close();
                    }).catch(() => Swal.fire('Error', 'ไม่สามารถสร้างรูปภาพได้', 'error'));
                };

                const ReceiptSlip = ({ title, data, config }) => (
                    <div className="bg-white p-10 relative flex flex-col w-[48%]" style={{ minHeight: '100%' }}>
                        <div className="border-b border-gray-800 pb-5 mb-6 flex justify-between items-start">
                            <div className="max-w-[75%]">
                                <h1 className="text-2xl font-bold text-charcoal-900 mb-1">ใบเสร็จรับเงิน</h1>
                                <p className="text-[10px] text-gray-500 font-semibold tracking-widest uppercase mb-4">RECEIPT</p>
                                <h2 className="text-sm font-semibold text-charcoal-900 leading-relaxed whitespace-pre-wrap">{config.header}</h2>
                            </div>
                            <div className="text-right">
                                <div className="inline-block bg-charcoal-900 text-white px-3 py-1 rounded text-[10px] font-bold tracking-widest uppercase mb-3">{title}</div>
                                <p className="text-[10px] text-gray-400 uppercase tracking-widest mb-1">เลขที่ / No.</p>
                                <p className="text-base font-bold text-charcoal-900">{data.orderId}</p>
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-6 mb-8 text-sm border-b border-gray-200 pb-6 p-4 bg-gray-50 rounded-lg">
                            <div>
                                <p className="text-[10px] text-gray-500 font-semibold tracking-widest mb-1">ได้รับเงินจาก / Received From</p>
                                <p className="font-bold text-charcoal-900 text-base mb-1 break-words">{data.student.Name}</p>
                                <p className="text-gray-600 font-medium leading-normal break-words">{data.student.Major}</p>
                                <p className="text-gray-500 font-light mt-1 break-words">รหัสนักศึกษา: {data.student.StudentID}</p>
                            </div>
                            <div>
                                <p className="text-[10px] text-gray-500 font-semibold tracking-widest mb-1">วันที่ / Date</p>
                                <p className="font-bold text-charcoal-900 text-base">{data.date.split(' ')[0]}</p>
                                <p className="text-gray-500 font-light mt-1">{data.date.split(' ')[1]}</p>
                            </div>
                        </div>
                        
                        <div className="flex-grow mb-6">
                            <table className="w-full text-sm text-left border-collapse">
                                <thead className="text-[10px] text-gray-500 font-semibold tracking-widest border-b-2 border-gray-800">
                                    <tr>
                                        <th className="pb-3 pt-2 px-2">รายการ<br/><span className="text-[8px] font-light">Description</span></th>
                                        <th className="pb-3 pt-2 px-2 text-center w-20">จำนวน<br/><span className="text-[8px] font-light">Qty</span></th>
                                        <th className="pb-3 pt-2 px-2 text-right w-28">จำนวนเงิน<br/><span className="text-[8px] font-light">Amount</span></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr className="border-b border-gray-100">
                                        <td className="py-4 px-2">
                                            <p className="font-bold text-charcoal-900">เสื้อคอปกโปโล (Polo Shirt)</p>
                                            <p className="text-xs text-gray-500 font-medium mt-1">ทรง: {data.poloGender} | ไซส์: <span className="font-bold text-charcoal-900">{data.poloSize}</span></p>
                                        </td>
                                        <td className="py-4 px-2 text-center font-bold text-charcoal-900">{data.poloQty}</td>
                                        <td className="py-4 px-2 text-right font-medium text-charcoal-900">฿{(['XL', '2XL', '3XL'].includes(data.poloSize) ? shirtPrice.oversize : shirtPrice.normal) * data.poloQty}</td>
                                    </tr>
                                    <tr className="border-b border-gray-100">
                                        <td className="py-4 px-2">
                                            <p className="font-bold text-charcoal-900">เสื้อยืดกิจกรรม (T-Shirt)</p>
                                            <p className="text-xs text-gray-500 font-medium mt-1">ทรง: {data.tshirtGender} | ไซส์: <span className="font-bold text-charcoal-900">{data.tshirtSize}</span></p>
                                        </td>
                                        <td className="py-4 px-2 text-center font-bold text-charcoal-900">{data.tshirtQty}</td>
                                        <td className="py-4 px-2 text-right font-medium text-charcoal-900">฿{(['XL', '2XL', '3XL'].includes(data.tshirtSize) ? shirtPrice.oversize : shirtPrice.normal) * data.tshirtQty}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div className="flex justify-between items-end border-t-2 border-gray-800 pt-4 mb-10 px-2">
                            <div>
                                <span className="text-sm font-bold text-charcoal-900">รวมเงินทั้งสิ้น</span><br/>
                                <span className="text-[10px] text-gray-500 font-medium uppercase tracking-widest">Grand Total</span>
                            </div>
                            <span className="text-2xl font-bold text-charcoal-900">฿ {data.grandTotal.toLocaleString()}</span>
                        </div>
                        
                        <div className="mt-auto flex justify-between items-end gap-4">
                            <div className="text-[10px] text-gray-500 font-medium w-[60%] bg-gray-50 p-3 rounded border border-gray-200">
                                <span className="font-bold text-charcoal-900">หมายเหตุ (Note):</span><br/>
                                <span className="whitespace-pre-wrap leading-relaxed">{config.note}</span>
                            </div>
                            <div className="text-center w-[40%] pb-2">
                                <div className="border-b border-charcoal-900 mb-2 h-8"></div>
                                <p className="text-xs font-bold text-charcoal-900 mb-0.5">เจ้าหน้าที่ผู้รับเงิน</p>
                                <p className="text-[9px] text-gray-500 font-medium uppercase tracking-widest">Authorized Receiver</p>
                            </div>
                        </div>
                    </div>
                );

                return (
                    <div className="min-h-screen flex flex-col relative z-10">
                        <Navbar />
                        <div className="flex-grow flex flex-col items-center pt-8 p-4 pb-20">
                            <div className="w-full max-w-[1200px]">
                                <div className="flex justify-between items-end mb-6 px-2">
                                    <div><h2 className="text-2xl font-semibold text-charcoal-900">Order Confirmation</h2><p className="text-gray-500 text-sm font-light mt-1">Please download this receipt for your reference.</p></div>
                                    <p className="text-xs text-orange-500 font-medium xl:hidden"><i className="fa-solid fa-arrows-left-right"></i> Scroll for full view</p>
                                </div>
                                <div className="w-full overflow-x-auto pb-6 custom-scrollbar">
                                    <div id="receipt-card" className="bg-white flex flex-row justify-between items-stretch shadow-sm border border-orange-100/50" style={{ width: '1123px', minHeight: '794px', margin: '0 auto' }}>
                                        <ReceiptSlip title="ORIGINAL" data={receiptData} config={receiptSettings} />
                                        <div className="flex flex-col items-center justify-center gap-4 text-gray-300 bg-orange-50/30 px-1 border-x border-dashed border-orange-200/50">
                                            <i className="fa-solid fa-scissors text-orange-300 text-xs transform -rotate-90"></i>
                                            <span className="text-[9px] font-medium uppercase tracking-[0.2em] whitespace-nowrap opacity-50 text-orange-400" style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)' }}>Cut Here</span>
                                            <i className="fa-solid fa-scissors text-orange-300 text-xs transform rotate-90"></i>
                                        </div>
                                        <ReceiptSlip title="COPY" data={receiptData} config={receiptSettings} />
                                    </div>
                                </div>
                                <div className="flex flex-col sm:flex-row justify-center gap-4 mt-4 max-w-[800px] w-full mx-auto">
                                    <button onClick={goHome} className="w-full sm:w-1/4 bg-white text-charcoal-900 font-semibold py-4 rounded-xl border border-gray-200 hover:bg-orange-50 transition-colors text-sm tracking-wider">HOME</button>
                                    {shirtSystemOpen && <button onClick={() => { setIsEditingOrder(true); setView('shirt_form'); }} className="w-full sm:w-1/4 btn-primary py-4 rounded-xl font-semibold text-sm tracking-wider hover:bg-gray-800">EDIT ORDER</button>}
                                    <button onClick={handleDownloadReceipt} className="w-full sm:w-2/4 btn-gradient py-4 rounded-xl font-semibold flex justify-center items-center gap-2 text-sm tracking-wider shadow-lg shadow-orange-500/20"><i className="fa-solid fa-download"></i> DOWNLOAD RECEIPT</button>
                                </div>
                            </div>
                        </div>
                        <Footer />
                        <MobileTabBar />
                    </div>
                );
            }

            if (view === 'history_search') {
                return (
                    <div className="min-h-screen flex flex-col relative z-10">
                        <Navbar />
                        <div className="flex-grow flex flex-col items-center justify-center p-6">
                            <div className="luxury-card w-full max-w-md p-10 relative">
                                <button onClick={goHome} className="absolute top-6 left-6 text-gray-400 hover:text-charcoal-900 transition-colors text-sm"><i className="fa-solid fa-arrow-left mr-1"></i> BACK</button>
                                <div className="text-center mt-10 mb-8">
                                    <h2 className="text-2xl font-semibold text-charcoal-900 tracking-tight">History</h2>
                                    <p className="text-gray-500 mt-2 text-sm font-light">ตรวจสอบประวัติการเข้าร่วม</p>
                                </div>
                                <form onSubmit={(e) => { e.preventDefault(); handleSearchHistory(e.target.studentId.value); }}>
                                    <div className="mb-8"><input type="text" name="studentId" required placeholder="Student ID / ID Card" defaultValue={localStorage.getItem('last_student_id')||''} className="w-full luxury-input text-center tracking-widest" /></div>
                                    <button type="submit" className="w-full btn-primary py-4 rounded-xl font-semibold tracking-wider text-sm">SEARCH <i className="fa-solid fa-search ml-2"></i></button>
                                </form>
                            </div>
                        </div>
                        <Footer />
                        <MobileTabBar />
                    </div>
                );
            }

            if (view === 'history_result') {
                return (
                    <div className="min-h-screen flex flex-col relative z-10">
                        <Navbar />
                        <div className="flex-grow flex flex-col items-center pt-8 p-6 pb-20">
                            <div className="luxury-card w-full max-w-2xl p-6 sm:p-10">
                                <div className="flex items-center justify-between mb-8 pb-4 border-b border-gray-100">
                                    <div><h2 className="text-xl font-semibold text-charcoal-900">Activity History</h2><p className="text-gray-500 text-sm font-light mt-1">Found {historyData.length} records</p></div>
                                    <button onClick={() => setView('history_search')} className="text-xs text-gray-400 hover:text-charcoal-900 border border-gray-200 px-3 py-1.5 rounded-lg transition-colors">NEW SEARCH</button>
                                </div>
                                <div className="space-y-4">
                                    {historyData.length === 0 ? (<div className="text-center py-16"><p className="text-gray-400 font-light">ไม่พบประวัติการเข้าร่วมกิจกรรม</p></div>) : (
                                        <div className="relative border-l border-gray-200 ml-4 sm:ml-6 pl-6 sm:pl-8 space-y-8 py-2">
                                            {historyData.map((h, i) => (
                                                <div key={i} className="relative group">
                                                    <div className="absolute -left-[30px] sm:-left-[38px] top-1.5 w-3 h-3 bg-white border-2 border-orange-500 rounded-full transition-transform group-hover:scale-125"></div>
                                                    <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-[0_2px_10px_rgba(0,0,0,0.02)] transition-all">
                                                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-4">
                                                            <div>
                                                                <p className="text-[10px] text-gray-400 font-medium uppercase tracking-widest mb-1">Attended</p>
                                                                <h4 className="font-semibold text-charcoal-900 text-lg mb-1">{h.ActivityName}</h4>
                                                                <p className="text-sm text-gray-500 font-light">{h.Name} ({h.StudentID})</p>
                                                            </div>
                                                            <div className="text-xs text-gray-500 font-light whitespace-nowrap bg-gray-50 px-3 py-1.5 rounded-md border border-gray-100">{new Date(h.Timestamp).toLocaleString('th-TH')}</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        <Footer />
                        <MobileTabBar />
                    </div>
                );
            }

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if(e.target.username.value === 'admin' && e.target.password.value === '9999') {
                    localStorage.setItem('admin_logged_in', 'true'); loadAdminData();
                } else { Swal.fire('ข้อผิดพลาด', 'Username หรือ Password ไม่ถูกต้อง (รหัสคือ 9999)', 'error'); }
            };

            if (view === 'admin_login') {
                return (
                    <div className="min-h-screen flex flex-col bg-charcoal-900 relative">
                        <Navbar />
                        <div className="flex-grow flex items-center justify-center p-6 relative z-10">
                            <div className="bg-[#1f1f1f] w-full max-w-md p-10 rounded-2xl border border-[#333]">
                                <div className="text-center mb-10"><h2 className="text-2xl font-light text-white tracking-widest uppercase">Workspace</h2><p className="text-gray-500 mt-2 text-sm font-light">Authorized Personnel Only</p></div>
                                <form onSubmit={handleAdminLogin} className="space-y-6">
                                    <input type="text" name="username" placeholder="Username" required className="w-full border-b border-gray-700 bg-transparent text-white px-0 py-3 focus:border-orange-500 outline-none transition-colors font-light text-sm" />
                                    <input type="password" name="password" placeholder="Password" required className="w-full border-b border-gray-700 bg-transparent text-white px-0 py-3 focus:border-orange-500 outline-none transition-colors font-light text-sm" />
                                    <button type="submit" className="w-full bg-white text-charcoal-900 font-semibold py-4 rounded-lg hover:bg-gray-100 transition-colors mt-8 text-sm tracking-wider">LOGIN</button>
                                </form>
                                <button onClick={goHome} className="w-full text-gray-500 hover:text-white mt-6 text-xs transition-colors font-light uppercase tracking-widest">Return Home</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'admin_dashboard') return <AdminDashboard data={adminData} reloadData={loadAdminData} goHome={goHome} setAdminData={setAdminData} />;

            return null;
        }

        function AdminDashboard({ data, reloadData, goHome, setAdminData }) {
            const [activeTab, setActiveTab] = useState('overview');
            const [selectedActivityForSummary, setSelectedActivityForSummary] = useState('');
            const [selectedActivityForSpss, setSelectedActivityForSpss] = useState('');
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 15;

            const systemOpen = data?.shirtPrice?.systemStatus !== 'maintenance';
            
            useEffect(() => { setCurrentPage(1); }, [selectedActivityForSummary]);

            const toggleSystem = async () => {
                const currentStatus = systemOpen ? 'open' : 'maintenance';
                Swal.fire({ title: 'Updating...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try { 
                    await runGAS('toggleMasterSystemStatus', currentStatus); 
                    Swal.close(); 
                    reloadData(); 
                } catch(err) { Swal.fire('Error', err.message, 'error'); }
            };

            const handleCreateActivity = async (e) => {
                e.preventDefault();
                Swal.fire({ title: 'Saving...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try {
                    await runGAS('createActivity', { name: e.target.name.value, date: e.target.date.value, location: e.target.location.value });
                    Swal.fire('Success', 'Activity Created', 'success'); e.target.reset(); reloadData();
                } catch(err) { Swal.fire('Error', err.message, 'error'); }
            };

            const toggleActivityStatus = async (id, currentStatus) => {
                Swal.fire({ title: 'Updating...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try { await runGAS('toggleActivityStatus', id, currentStatus); Swal.close(); reloadData(); } catch(err) { Swal.fire('Error', err.message, 'error'); }
            };

            const handleToggleShirtSystem = async (currentStatus) => {
                Swal.fire({ title: 'Updating...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try { await runGAS('toggleShirtStatus', currentStatus); Swal.close(); reloadData(); } catch(err) { Swal.fire('Error', err.message, 'error'); }
            };

            const handleUpdateShirtPrice = async () => {
                const { value: formValues } = await Swal.fire({
                    title: 'ตั้งราคาเสื้อ',
                    html: `<div class="text-left text-sm mb-1 font-medium">S, M, L (฿)</div><input id="swal-n" type="number" class="w-full border p-2 mb-3 rounded" value="${data.shirtPrice?.normal||250}"><div class="text-left text-sm mb-1 font-medium">XL, 2XL, 3XL (฿)</div><input id="swal-o" type="number" class="w-full border p-2 rounded" value="${data.shirtPrice?.oversize||380}">`,
                    showCancelButton: true, confirmButtonColor: '#ea580c', preConfirm: () => ({ normal: document.getElementById('swal-n').value, oversize: document.getElementById('swal-o').value })
                });
                if (formValues) { Swal.fire({ title: 'Saving...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } }); try { await runGAS('updateShirtPrice', formValues); reloadData(); } catch (err) { Swal.fire('Error', err.message, 'error'); } }
            };

            const handleUpdateReceiptConfig = async () => {
                const { value: formValues } = await Swal.fire({
                    title: 'ตั้งค่าใบเสร็จ',
                    html: `<div class="text-left text-sm mb-1 font-medium">หัวใบเสร็จ</div><textarea id="swal-h" rows="2" class="w-full border p-2 mb-3 rounded text-sm">${data.shirtPrice?.receiptHeader||''}</textarea><div class="text-left text-sm mb-1 font-medium">หมายเหตุ</div><textarea id="swal-n" rows="2" class="w-full border p-2 rounded text-sm">${data.shirtPrice?.receiptNote||''}</textarea>`,
                    showCancelButton: true, confirmButtonColor: '#ea580c', preConfirm: () => ({ header: document.getElementById('swal-h').value, note: document.getElementById('swal-n').value })
                });
                if (formValues) { Swal.fire({ title: 'Saving...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } }); try { await runGAS('updateReceiptConfig', formValues); reloadData(); } catch (err) { Swal.fire('Error', err.message, 'error'); } }
            };

            const handleImportCSV = (e) => {
                const file = e.target.files[0]; if(!file) return;
                Papa.parse(file, { header: true, skipEmptyLines: true, complete: async function(results) {
                    if(results.data.length === 0) return Swal.fire('Error', 'Empty CSV', 'error');
                    Swal.fire({ title: `Importing ${results.data.length} records...`, didOpen: () => { Swal.showLoading() } });
                    try { const res = await runGAS('importCheckins', results.data); if(res.success) { Swal.fire('Success', `Imported ${res.count} records`, 'success'); reloadData(); } else Swal.fire('Error', res.error, 'error'); } catch(err) { Swal.fire('Error', err.message, 'error'); } e.target.value = '';
                }});
            };

            const renderSpssContent = () => {
                if(!selectedActivityForSpss) return <div id="spss-ex" className="text-center py-10 text-gray-400 font-light border border-gray-100 rounded-xl">Please select an activity</div>;
                const evals = data.evaluations.filter(e => String(e.ActivityID) === String(selectedActivityForSpss));
                if(evals.length === 0) return <div id="spss-ex" className="text-center py-10 text-gray-400 font-light border border-gray-100 rounded-xl">No evaluations found</div>;

                const actCheckins = data.checkins.filter(c => String(c.ActivityID) === String(selectedActivityForSpss));
                let mCount = 0; let fCount = 0;
                actCheckins.forEach(c => {
                    if (c.Name && c.Name.trim().startsWith('นาย')) mCount++;
                    else if (c.Name) fCount++;
                });
                const totalDemo = mCount + fCount || 1;
                const mPct = ((mCount / totalDemo) * 100).toFixed(2);
                const fPct = ((fCount / totalDemo) * 100).toFixed(2);
                
                const majorityGender = mCount >= fCount ? 'ชาย' : 'หญิง';
                const majorityCount = mCount >= fCount ? mCount : fCount;
                const majorityPct = mCount >= fCount ? mPct : fPct;
                const minorityGender = mCount >= fCount ? 'หญิง' : 'ชาย';
                const minorityCount = mCount >= fCount ? fCount : mCount;
                const minorityPct = mCount >= fCount ? fPct : mPct;

                const getMeaning = (m) => m >= 4.5 ? 'มากที่สุด' : m >= 3.5 ? 'มาก' : m >= 2.5 ? 'ปานกลาง' : m >= 1.5 ? 'น้อย' : 'น้อยที่สุด';
                const qStats = []; let overallIdx = 1;
                let allScoresForGrand = [];
                
                surveyData.forEach(cat => {
                    cat.questions.forEach(q => {
                        const hKey = ['Q1_1','Q1_2','Q1_3','Q1_4','Q2_1','Q2_2','Q2_3','Q2_4','Q3_1','Q3_2','Q3_3','Q3_4','Q3_5'][overallIdx - 1];
                        const scores = evals.map(e => {
                            let val = e[hKey];
                            if (val === undefined || val === null || val === '') val = e[`q${overallIdx}`];
                            return Number(val) || 0;
                        }).filter(s => s > 0);
                        
                        allScoresForGrand.push(...scores);
                        const n = scores.length; let mean = 0, sd = 0;
                        if(n > 0) { 
                            mean = scores.reduce((a,b)=>a+b, 0) / n; 
                            if(n > 1) sd = Math.sqrt(scores.reduce((a,b)=>a+Math.pow(b-mean, 2), 0) / (n - 1)); 
                        }
                        qStats.push({ no: overallIdx, text: q.text.split(' ').slice(1).join(' '), n, mean, sd });
                        overallIdx++;
                    });
                });
                
                let grandMean = 0, grandSd = 0;
                if (allScoresForGrand.length > 0) {
                    grandMean = allScoresForGrand.reduce((a,b)=>a+b, 0) / allScoresForGrand.length;
                    if (allScoresForGrand.length > 1) {
                        grandSd = Math.sqrt(allScoresForGrand.reduce((a,b)=>a+Math.pow(b-grandMean, 2), 0) / (allScoresForGrand.length - 1));
                    }
                }

                const sortedQStats = [...qStats].sort((a,b) => b.mean - a.mean);
                const top1 = sortedQStats[0] || {text: '-', mean: 0};
                const top2 = sortedQStats[1] || {text: '-', mean: 0};
                const top3 = sortedQStats[2] || {text: '-', mean: 0};

                return (
                    <div id="spss-ex" className="overflow-x-auto border border-gray-100 rounded-xl p-6 transition-colors">
                        <div style={{ display: 'none' }} className="word-export-title">
                            <h3 style={{ textAlign: 'center', fontSize: '18pt', fontWeight: 'bold' }}>รายงานผลการประเมินความพึงพอใจ</h3>
                            <p style={{ textAlign: 'center', marginBottom: '20pt' }}>กิจกรรม: {data.activities.find(a=>String(a.ActivityID)===String(selectedActivityForSpss))?.Name}</p>
                        </div>
                        <div className="mb-10 min-w-[600px]">
                            <h4 className="font-semibold text-charcoal-900 mb-3 text-sm">ตารางที่ 1 ข้อมูลทั่วไปของผู้ตอบแบบสอบถาม (Demographic Data)</h4>
                            <table className="w-full text-sm text-left border-collapse mb-4 border border-gray-300">
                                <thead className="bg-gray-50 border-b border-gray-300 text-charcoal-900">
                                    <tr><th className="p-3 font-medium text-center border-r border-gray-300 w-1/3">ข้อมูลทั่วไป</th><th className="p-3 font-medium text-center border-r border-gray-300 w-1/3">จำนวน (คน)</th><th className="p-3 font-medium text-center w-1/3">ร้อยละ (%)</th></tr>
                                </thead>
                                <tbody className="text-charcoal-900">
                                    <tr className="border-b border-gray-300"><td className="p-3 font-semibold bg-gray-50" colSpan="3">เพศ</td></tr>
                                    <tr className="border-b border-gray-200"><td className="p-3 pl-8 border-r border-gray-300">ชาย</td><td className="p-3 text-center border-r border-gray-300">{mCount}</td><td className="p-3 text-center">{mPct}</td></tr>
                                    <tr className="border-b border-gray-200"><td className="p-3 pl-8 border-r border-gray-300">หญิง</td><td className="p-3 text-center border-r border-gray-300">{fCount}</td><td className="p-3 text-center">{fPct}</td></tr>
                                    <tr className="bg-gray-50 font-medium"><td className="p-3 text-right border-r border-gray-300">รวม</td><td className="p-3 text-center border-r border-gray-300">{mCount + fCount}</td><td className="p-3 text-center">100.00</td></tr>
                                </tbody>
                            </table>
                            <p className="text-gray-700 text-sm leading-relaxed indent-8"><span className="font-semibold">สรุปผล:</span> จากตารางที่ 1 พบว่า ผู้ตอบแบบสอบถามส่วนใหญ่เป็นเพศ{majorityGender} จำนวน {majorityCount} คน คิดเป็นร้อยละ {majorityPct} และเพศ{minorityGender} จำนวน {minorityCount} คน คิดเป็นร้อยละ {minorityPct}</p>
                        </div>
                        <div className="mb-4 min-w-[800px]">
                            <h4 className="font-semibold text-charcoal-900 mb-3 text-sm">ตารางที่ 2 ค่าสถิติเชิงพรรณนา (Descriptive Statistics)</h4>
                            <table className="w-full text-sm text-left border-collapse mb-4 border border-gray-300">
                                <thead className="bg-gray-50 border-b border-gray-300 text-charcoal-900">
                                    <tr><th className="p-3 text-center font-medium border-r border-gray-300 w-12">ข้อ</th><th className="p-3 font-medium border-r border-gray-300">รายการประเมิน</th><th className="p-3 text-center font-medium border-r border-gray-300 w-20">x̄</th><th className="p-3 text-center font-medium border-r border-gray-300 w-20">S.D.</th><th className="p-3 text-center font-medium w-24">ระดับ</th></tr>
                                </thead>
                                <tbody className="text-charcoal-900">
                                    {qStats.map(q => (
                                        <tr key={q.no} className="border-b border-gray-200 hover:bg-gray-50/50 transition-colors">
                                            <td className="p-3 text-center border-r border-gray-300">{q.no}</td><td className="p-3 border-r border-gray-300">{q.text}</td>
                                            <td className="p-3 text-center text-orange-600 font-medium border-r border-gray-300">{q.mean.toFixed(2)}</td><td className="p-3 text-center border-r border-gray-300">{q.sd.toFixed(2)}</td><td className="p-3 text-center">{getMeaning(q.mean)}</td>
                                        </tr>
                                    ))}
                                    <tr className="bg-gray-50 font-medium border-t border-gray-300">
                                        <td className="p-3 text-right border-r border-gray-300" colSpan="2">รวมเฉลี่ย</td>
                                        <td className="p-3 text-center text-charcoal-900 border-r border-gray-300">{grandMean.toFixed(2)}</td><td className="p-3 text-center border-r border-gray-300">{grandSd.toFixed(2)}</td><td className="p-3 text-center text-charcoal-900">{getMeaning(grandMean)}</td>
                                    </tr>
                                </tbody>
                            </table>
                            <p className="text-gray-700 text-sm leading-relaxed indent-8"><span className="font-semibold">สรุปผล:</span> ผลการสำรวจความพึงพอใจในการจัดกิจกรรม พบว่า ผู้ตอบแบบสอบถามส่วนใหญ่มีความพึงพอใจในระดับ{getMeaning(grandMean)} โดยมีค่าเฉลี่ยเท่ากับ {grandMean.toFixed(2)} ซึ่งเมื่อพิจารณาเป็นรายข้อ พบว่า {top1.text} (ค่าเฉลี่ย {top1.mean.toFixed(2)}) รองลงมาคือ {top2.text} (ค่าเฉลี่ย {top2.mean.toFixed(2)}) อันดับที่ 3 คือ {top3.text} (ค่าเฉลี่ย {top3.mean.toFixed(2)})</p>
                        </div>
                    </div>
                );
            };

            const filteredCheckins = selectedActivityForSummary ? data.checkins.filter(c => c.ActivityID === selectedActivityForSummary) : data.checkins;
            const sortedCheckins = [...filteredCheckins].reverse();
            const indexOfLastItem = currentPage * itemsPerPage;
            const indexOfFirstItem = indexOfLastItem - itemsPerPage;
            const currentCheckins = sortedCheckins.slice(indexOfFirstItem, indexOfLastItem);
            const totalPages = Math.ceil(sortedCheckins.length / itemsPerPage);

            return (
                <div className="min-h-screen bg-[#faf9f6] dark:bg-[#121212] flex flex-col md:flex-row transition-colors">
                    <aside className="w-full md:w-64 bg-charcoal-900 text-white flex-shrink-0 flex flex-col z-20 shadow-xl border-r border-charcoal-800">
                        <div className="p-8 border-b border-gray-800"><h2 className="text-xl font-semibold tracking-widest uppercase text-orange-500">Workspace</h2></div>
                        <nav className="flex-1 px-4 py-6 space-y-1">
                            {['overview', 'activities', 'summary', 'spss', 'shirt_summary'].map(tab => {
                                const labels = { overview: 'Overview', activities: 'Activities', summary: 'Check-ins', spss: 'SPSS Report', shirt_summary: 'Shirt Orders' };
                                const icons = { overview: 'fa-chart-pie', activities: 'fa-list', summary: 'fa-users', spss: 'fa-file-lines', shirt_summary: 'fa-shirt' };
                                return (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`w-full flex items-center gap-4 px-4 py-3 rounded-lg transition-all text-sm font-light tracking-wide ${activeTab === tab ? 'bg-gradient-to-r from-orange-500 to-orange-600 text-white shadow-md' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}><i className={`fa-solid ${icons[tab]} w-4 opacity-80`}></i> {labels[tab]}</button>
                                );
                            })}
                            <div className="mt-8 pt-6 border-t border-gray-800">
                                <p className="text-[9px] text-gray-500 font-medium mb-3 px-4 uppercase tracking-widest">System Control</p>
                                <button onClick={toggleSystem} className={`w-full flex items-center justify-between px-4 py-3 rounded-lg text-sm transition-all ${systemOpen ? 'text-white bg-green-900/30 hover:bg-green-900/50 border border-green-800' : 'text-gray-400 bg-black/30 border border-gray-800'}`}>
                                    <span className="font-light"><i className={`fa-solid ${systemOpen ? 'fa-toggle-on text-green-500' : 'fa-toggle-off'} mr-2`}></i> Platform</span><span className="text-[10px] uppercase tracking-widest">{systemOpen ? 'Online' : 'Offline'}</span>
                                </button>
                            </div>
                        </nav>
                        <div className="p-4 border-t border-gray-800"><button onClick={goHome} className="w-full py-3 text-xs text-gray-400 hover:text-white font-light tracking-widest uppercase transition-colors"><i className="fa-solid fa-arrow-left mr-2"></i> Exit</button></div>
                    </aside>

                    <main className="flex-1 p-6 md:p-12 overflow-y-auto bg-gradient-to-br from-[#fffcf9] to-[#ffedd5] dark:from-[#1c1512] dark:to-[#120c0a]">
                        <div className="flex justify-between items-end mb-12 border-b border-orange-200/50 dark:border-gray-800 pb-4">
                            <h2 className="text-3xl font-light text-charcoal-900 tracking-tight capitalize">{activeTab.replace('_', ' ')}</h2>
                            <button onClick={reloadData} className="text-xs font-medium text-orange-500 hover:text-orange-700 tracking-widest uppercase transition-colors bg-white/50 px-3 py-1.5 rounded-lg border border-orange-100"><i className="fa-solid fa-rotate-right mr-1"></i> Sync</button>
                        </div>

                        {activeTab === 'overview' && (
                            <div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                                    <div className="bg-white/80 backdrop-blur p-8 border border-orange-100/50 rounded-2xl shadow-sm transition-colors"><p className="text-xs text-orange-400 uppercase tracking-widest mb-1">Total Activities</p><p className="text-4xl font-light text-charcoal-900">{data.activities.length}</p></div>
                                    <div className="bg-white/80 backdrop-blur p-8 border border-orange-100/50 rounded-2xl shadow-sm transition-colors"><p className="text-xs text-orange-400 uppercase tracking-widest mb-1">Total Check-ins</p><p className="text-4xl font-light text-charcoal-900">{data.checkins.length}</p></div>
                                    <div className="bg-white/80 backdrop-blur p-8 border border-orange-100/50 rounded-2xl shadow-sm transition-colors"><p className="text-xs text-orange-400 uppercase tracking-widest mb-1">Evaluations</p><p className="text-4xl font-light text-charcoal-900">{data.evaluations.length}</p></div>
                                </div>
                                <h3 className="text-sm font-medium text-charcoal-900 mb-6 uppercase tracking-widest pl-1 border-l-2 border-orange-500">Activity Breakdown</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {data.activities.map(act => (
                                        <div key={act.ActivityID} className="bg-white/80 backdrop-blur p-6 border border-orange-100/50 rounded-xl flex justify-between items-center transition-colors hover:shadow-md hover:border-orange-200">
                                            <div><h4 className="font-medium text-charcoal-900 text-sm mb-1 truncate max-w-[200px]">{act.Name}</h4><span className={`text-[9px] uppercase tracking-widest ${act.Status==='open'?'text-green-500':'text-gray-400'}`}>{act.Status==='open'?'Active':'Closed'}</span></div>
                                            <div className="text-2xl font-light text-orange-500">{data.checkins.filter(c => c.ActivityID === act.ActivityID).length}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'activities' && (
                            <div className="grid lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-1 bg-white/90 backdrop-blur p-8 border border-orange-100/50 rounded-2xl h-fit transition-colors shadow-sm">
                                    <h3 className="text-sm font-medium text-charcoal-900 mb-6 uppercase tracking-widest border-l-2 border-orange-500 pl-2">Create Activity</h3>
                                    <form onSubmit={handleCreateActivity} className="space-y-5">
                                        <input name="name" placeholder="Title" required className="w-full luxury-input text-sm" />
                                        <input type="date" name="date" required className="w-full luxury-input text-sm text-gray-500" />
                                        <input name="location" placeholder="Location" required className="w-full luxury-input text-sm" />
                                        <button className="w-full btn-gradient py-3 rounded-xl text-sm font-semibold tracking-wider shadow-lg shadow-orange-500/20">SAVE</button>
                                    </form>
                                </div>
                                <div className="lg:col-span-2 bg-white/90 backdrop-blur border border-orange-100/50 rounded-2xl overflow-hidden transition-colors shadow-sm">
                                    <table className="w-full text-left text-sm whitespace-nowrap"><thead className="bg-orange-50/50 border-b border-orange-100/80 text-[10px] text-gray-500 uppercase tracking-widest transition-colors"><tr><th className="px-6 py-4 font-medium">Detail</th><th className="px-6 py-4 text-center font-medium">Status</th><th className="px-6 py-4 text-right font-medium">Action</th></tr></thead><tbody className="divide-y divide-orange-50">
                                        {data.activities.map(a=><tr key={a.ActivityID} className="transition-colors hover:bg-orange-50/30"><td className="px-6 py-4"><p className="font-medium text-charcoal-900">{a.Name}</p><p className="text-xs text-orange-400 font-light mt-0.5">{a.Date} • {a.Location}</p></td><td className="px-6 py-4 text-center text-xs"><span className={`${a.Status==='open'?'text-green-500 bg-green-50 px-2 py-1 rounded':'text-gray-400 bg-gray-50 px-2 py-1 rounded'}`}>{a.Status==='open'?'Open':'Closed'}</span></td><td className="px-6 py-4 text-right"><button onClick={()=>toggleActivityStatus(a.ActivityID,a.Status)} className={`text-4xl transition-transform hover:scale-110 drop-shadow-sm focus:outline-none ${a.Status==='open'?'text-green-500':'text-gray-300'}`}><i className={`fa-solid ${a.Status==='open'?'fa-toggle-on':'fa-toggle-off'}`}></i></button></td></tr>)}
                                    </tbody></table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'summary' && (
                            <div className="bg-white/90 backdrop-blur p-8 border border-orange-100/50 rounded-2xl transition-colors shadow-sm">
                                <div className="flex flex-col sm:flex-row gap-4 mb-8 justify-between">
                                    <select className="border border-orange-200 p-3 rounded-xl text-sm bg-white outline-none flex-grow max-w-sm focus:border-orange-500 focus:ring-2 focus:ring-orange-500/10 transition-all" value={selectedActivityForSummary} onChange={(e)=>setSelectedActivityForSummary(e.target.value)}>
                                        <option value="">All Activities</option>
                                        {data.activities.map(a=><option key={a.ActivityID} value={a.ActivityID}>{a.Name}</option>)}
                                    </select>
                                    <div className="flex gap-2">
                                        <label className="border border-orange-200 text-charcoal-900 px-4 py-2.5 rounded-xl cursor-pointer text-xs font-medium tracking-widest uppercase hover:bg-orange-50 transition-colors flex items-center bg-white"><i className="fa-solid fa-upload mr-2 text-orange-500"></i> Import<input type="file" accept=".csv" className="hidden" onChange={handleImportCSV} /></label>
                                        <button onClick={()=>{ const list = selectedActivityForSummary ? data.checkins.filter(c=>c.ActivityID===selectedActivityForSummary) : data.checkins; const csvData = Papa.unparse(list); const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob(['\ufeff' + csvData], { type: 'text/csv;charset=utf-8;' })); link.download = `CheckIns.csv`; link.click(); }} className="btn-gradient px-4 py-2.5 rounded-xl text-xs font-medium tracking-widest uppercase flex items-center shadow-lg shadow-orange-500/20"><i className="fa-solid fa-download mr-2"></i> Export</button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto border border-orange-100/50 rounded-xl mb-4 transition-colors">
                                    <table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-orange-50/50 border-b border-orange-100 text-[10px] text-gray-500 uppercase tracking-widest transition-colors"><tr><th className="px-6 py-4 font-medium">Time</th><th className="px-6 py-4 font-medium">Student</th><th className="px-6 py-4 font-medium">Major</th><th className="px-6 py-4 font-medium">ID Card</th><th className="px-6 py-4 font-medium">Activity</th></tr></thead><tbody className="divide-y divide-orange-50">
                                        {currentCheckins.map((c,i)=>(<tr key={i} className="transition-colors hover:bg-orange-50/30"><td className="px-6 py-4 text-xs font-light text-orange-500/80">{new Date(c.Timestamp).toLocaleString('th-TH')}</td><td className="px-6 py-4"><p className="font-medium text-charcoal-900">{c.StudentID}</p><p className="text-xs text-gray-500 font-light mt-0.5">{c.Name}</p></td><td className="px-6 py-4 font-light text-gray-600">{c.Major}</td><td className="px-6 py-4 text-xs font-light text-gray-400">{c.IDCard || '-'}</td><td className="px-6 py-4 text-xs font-light text-gray-500 truncate max-w-[200px]">{c.ActivityName}</td></tr>))}
                                    </tbody></table>
                                </div>
                                {totalPages > 1 && (
                                    <div className="flex justify-between items-center text-sm bg-white px-4 py-2 rounded-xl border border-orange-100">
                                        <button disabled={currentPage===1} onClick={()=>setCurrentPage(prev=>Math.max(1,prev-1))} className={`text-xs uppercase tracking-widest font-medium ${currentPage===1?'text-gray-300':'text-orange-500 hover:text-orange-600'}`}>Prev</button>
                                        <span className="text-gray-400 font-light text-xs">Page {currentPage} of {totalPages}</span>
                                        <button disabled={currentPage===totalPages} onClick={()=>setCurrentPage(prev=>Math.min(totalPages,prev+1))} className={`text-xs uppercase tracking-widest font-medium ${currentPage===totalPages?'text-gray-300':'text-orange-500 hover:text-orange-600'}`}>Next</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'spss' && (
                            <div className="bg-white/90 backdrop-blur p-8 border border-orange-100/50 rounded-2xl transition-colors shadow-sm">
                                <div className="flex gap-4 mb-8 justify-between items-end">
                                    <select className="border border-orange-200 p-3 rounded-xl text-sm bg-white outline-none w-full max-w-sm focus:border-orange-500 focus:ring-2 focus:ring-orange-500/10 transition-all" value={selectedActivityForSpss} onChange={(e)=>setSelectedActivityForSpss(e.target.value)}><option value="">Select Activity</option>{data.activities.map(a=><option key={a.ActivityID} value={a.ActivityID}>{a.Name}</option>)}</select>
                                    <button onClick={()=>{ const h = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><style>body{font-family:'TH Sarabun PSK',sans-serif;font-size:16pt;}table{width:100%;border-collapse:collapse;margin-bottom:15pt;}th,td{border:1px solid black;padding:5px;}th{background-color:#f2f2f2;}h4{font-weight:bold;margin-bottom:10pt;}p{text-indent:36pt;line-height:1.5;margin-bottom:20pt;}.word-export-title{display:block !important;}</style></head><body>${document.getElementById('spss-ex').innerHTML}</body></html>`; const a = document.createElement('a'); a.href=URL.createObjectURL(new Blob(['\ufeff', h],{type:'application/msword'})); a.download=`SPSS.doc`; a.click(); }} className="btn-gradient px-5 py-2.5 rounded-xl text-xs font-medium tracking-widest uppercase flex items-center whitespace-nowrap shadow-lg shadow-orange-500/20"><i className="fa-solid fa-file-word mr-2"></i> Export DOC</button>
                                </div>
                                {renderSpssContent()}
                            </div>
                        )}

                        {activeTab === 'shirt_summary' && (
                            <div className="bg-white/90 backdrop-blur p-8 border border-orange-100/50 rounded-2xl transition-colors shadow-sm">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                                    <div>
                                        <h3 className="text-sm font-medium text-charcoal-900 uppercase tracking-widest border-l-2 border-orange-500 pl-2">Orders Management</h3>
                                        <div className="flex items-center gap-3 mt-3 ml-2">
                                            <span className="text-[11px] font-semibold uppercase tracking-widest text-gray-500">System Status</span>
                                            <button onClick={() => handleToggleShirtSystem(data.shirtPrice?.status || 'open')} className={`text-4xl transition-transform hover:scale-110 drop-shadow-sm focus:outline-none ${data.shirtPrice?.status !== 'closed' ? 'text-green-500' : 'text-gray-300'}`}><i className={`fa-solid ${data.shirtPrice?.status !== 'closed' ? 'fa-toggle-on' : 'fa-toggle-off'}`}></i></button>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        <button onClick={handleUpdateReceiptConfig} className="border border-orange-200 text-charcoal-900 px-4 py-2.5 rounded-xl text-xs font-medium tracking-widest uppercase hover:bg-orange-50 transition-colors bg-white">Receipt Config</button>
                                        <button onClick={handleUpdateShirtPrice} className="border border-orange-200 text-charcoal-900 px-4 py-2.5 rounded-xl text-xs font-medium tracking-widest uppercase hover:bg-orange-50 transition-colors bg-white">Prices</button>
                                        <button onClick={() => { const csv = Papa.unparse(data.shirtOrders); const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'})); link.download = `ShirtOrders.csv`; link.click(); }} className="btn-gradient px-4 py-2.5 rounded-xl text-xs font-medium tracking-widest uppercase flex items-center shadow-lg shadow-orange-500/20"><i className="fa-solid fa-file-csv mr-2"></i> Export</button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto border border-orange-100/50 rounded-xl transition-colors">
                                    <table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-orange-50/50 border-b border-orange-100 text-[10px] text-gray-500 uppercase tracking-widest transition-colors"><tr><th className="px-6 py-4 font-medium">Time</th><th className="px-6 py-4 font-medium">Student</th><th className="px-6 py-4 text-center font-medium">Polo</th><th className="px-6 py-4 text-center font-medium">T-Shirt</th><th className="px-6 py-4 text-right font-medium">Total</th></tr></thead><tbody className="divide-y divide-orange-50">
                                        {(data.shirtOrders||[]).slice().reverse().map((o,i)=>(
                                            <tr key={i} className="transition-colors hover:bg-orange-50/30"><td className="px-6 py-4 text-xs font-light text-orange-500/80">{new Date(o.Timestamp).toLocaleString('th-TH')}</td><td className="px-6 py-4"><p className="font-medium text-charcoal-900">{o.StudentID}</p><p className="text-xs text-gray-500 font-light mt-0.5">{o.Name}</p></td><td className="px-6 py-4 text-center text-xs font-light text-gray-600">{o.PoloGender} / {o.PoloSize} ({o.PoloQty})</td><td className="px-6 py-4 text-center text-xs font-light text-gray-600">{o.TshirtGender} / {o.TshirtSize} ({o.TshirtQty})</td><td className="px-6 py-4 text-right font-medium text-orange-600">฿{o.TotalPrice}</td></tr>
                                        ))}
                                        {(data.shirtOrders||[]).length===0 && <tr><td colSpan="5" className="text-center py-10 text-gray-400 font-light">No orders found</td></tr>}
                                    </tbody></table>
                                </div>
                            </div>
                        )}
                        
                        <div className="mt-12 border-t border-orange-200/50 pt-6 text-center">
                            <p className="text-xs font-medium text-gray-400 tracking-wider mb-1">Copyright &copy; 2026 DIGIT Good Deed System PRO.</p>
                            <p className="text-[10px] text-gray-400 font-light">ฝ่ายกิจการนักศึกษา คณะเทคโนโลยีดิจิทัล มหาวิทยาลัยราชภัฏเชียงราย</p>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
