<body class="text-slate-800 antialiased min-h-screen flex flex-col">

                <!-- Desktop Menu -->

                        <button onclick="switchRole('admin')" id="btn-role-admin" class="px-4 py-2 text-sm font-bold rounded-xl text-slate-500 hover:text-slate-700 hover:bg-white border border-transparent transition-all">แอดมิน</button>

                    <button onclick="toggleMobileMenu()" class="md:hidden text-slate-500 hover:text-primary focus:outline-none p-2 rounded-lg bg-slate-50 border border-slate-200">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-[110] flex flex-col gap-2"></div>

    <script>
        // ==========================================
        // URL ของ GOOGLE APPS SCRIPT
        // ==========================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6wkWGyyWSJBMQ90nd6DFqh8JKOWlJ_aWsxzNNSbSstIwX8UDVL47Nn6jtm0P0l3ViWw/exec';
        
        // --- State Management ---
        let currentRole = 'student'; // 'student' or 'admin'
        let currentView = 'events';
        let currentModalOrderId = null;
        let globalActivities = [];
        let currentCheckoutOrder = null;
        let isShirtShopOpen = true; // เพิ่มตัวแปรสำหรับเปิด/ปิดระบบสั่งจองเสื้อ

        // --- Format Thai Date (ฟังก์ชันแปลงเวลาเป็นภาษาไทย) ---
        function formatThaiDate(dateString, includeTime = false) {
            if (!dateString || String(dateString).trim() === '-' || String(dateString).trim() === '') return dateString;
            
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return dateString; // คืนค่าเดิมหากไม่ใช่รูปแบบวันที่ที่ถูกต้อง หรือกรอกเป็นภาษาไทยมาแล้ว

            const thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            const d = date.getDate();
            const m = thaiMonths[date.getMonth()];
            const y = date.getFullYear() + 543; // แปลงเป็น พ.ศ.
            
            let formatted = `${d} ${m} ${y}`;
            if (includeTime) {
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                formatted += ` ${hours}:${minutes} น.`;
            }
            return formatted;
        }

        // --- Menu Definitions ---
        const NAV_STUDENT = [
            { id: 'events', label: 'กิจกรรมทั้งหมด', tabLabel: 'กิจกรรม', icon: 'ph-megaphone' },
            { id: 'history', label: 'ประวัติของฉัน', tabLabel: 'ประวัติ', icon: 'ph-clock-counter-clockwise' },
            { id: 'shirt', label: 'สั่งจองเสื้อ', tabLabel: 'สั่งจอง', icon: 'ph-t-shirt' },
            { id: 'tracking', label: 'ติดตามสถานะ', tabLabel: 'ติดตาม', icon: 'ph-truck' }
        ];

        const NAV_ADMIN = [
            { id: 'admin-dash', label: 'ภาพรวม (Dashboard)', tabLabel: 'ภาพรวม', icon: 'ph-chart-pie-slice' },
            { id: 'admin-orders', label: 'จัดการระบบสั่งจองเสื้อ', tabLabel: 'จองเสื้อ', icon: 'ph-t-shirt' },
            { id: 'admin-events', label: 'จัดการกิจกรรม', tabLabel: 'กิจกรรม', icon: 'ph-calendar-plus' }
        ];

        // --- Mock Data ---
        const MOCK_EVENTS = [
            { id: 1, timestamp: '10/06/2026 09:00', title: 'ปฐมนิเทศนักศึกษาใหม่ Dek69', date: '15-18 ตุลาคม 2026', location: 'หอประชุมใหญ่', status: 'open', spots: 500, joined: 320 },
            { id: 2, timestamp: '12/06/2026 14:30', title: 'กิจกรรมรับน้อง Dek68 และ Dek69', date: '5 พฤศจิกายน 2026', location: 'ลานกิจกรรม คณะเทคโนโลยีดิจิทัล', status: 'open', spots: 200, joined: 185 }
        ];

        const MOCK_ORDERS = [
            { id: 'ORD-26-001', studentId: '69010001', name: 'นายรักเรียน ขยันยิ่ง', type: 'แพ็คเกจคู่', size: 'โปโล L, กิจกรรม L', qty: 2, total: 560, date: '17/06/2026 10:30', status: 2, hasEdited: false },
            { id: 'ORD-26-002', studentId: '69010045', name: 'นางสาวเรียนดี สีสด', type: 'แพ็คเกจคู่', size: 'โปโล M, กิจกรรม S', qty: 2, total: 560, date: '17/06/2026 11:15', status: 1, hasEdited: false },
            { id: 'ORD-26-003', studentId: '68010112', name: 'นายสายเสมอ มาทัน', type: 'แพ็คเกจคู่', size: 'โปโล XL, กิจกรรม XL', qty: 2, total: 700, date: '16/06/2026 09:00', status: 3, hasEdited: true }
        ];

        const STATUS_MAP = {
            1: { text: 'รอตรวจสอบยอดเงิน', color: 'bg-amber-100 text-amber-700 border-amber-200', icon: 'ph-hourglass-high' },
            2: { text: 'ชำระเงินถูกต้อง', color: 'bg-blue-100 text-blue-700 border-blue-200', icon: 'ph-check-circle' },
            3: { text: 'กำลังผลิต', color: 'bg-purple-100 text-purple-700 border-purple-200', icon: 'ph-scissors' },
            4: { text: 'พร้อมรับสินค้า', color: 'bg-green-100 text-green-700 border-green-200', icon: 'ph-package' }
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            switchRole('student');
        });

        function switchRole(role) {
            currentRole = role;
            
            const btnStudent = document.getElementById('btn-role-student');
            const btnAdmin = document.getElementById('btn-role-admin');
            const btnStudentMob = document.getElementById('btn-role-student-mob');
            const btnAdminMob = document.getElementById('btn-role-admin-mob');
            const brandIcon = document.getElementById('brand-icon');
            const brandText = document.getElementById('brand-text');

            const activeClass = 'px-4 py-2 text-sm font-bold rounded-xl bg-indigo-100 text-indigo-700 shadow-sm transition-all border border-indigo-200';
            const inactiveClass = 'px-4 py-2 text-sm font-bold rounded-xl text-slate-500 hover:text-slate-700 hover:bg-white border border-transparent transition-all';
            
            const activeMobClass = 'flex-1 px-3 py-2.5 text-sm font-bold rounded-xl bg-indigo-100 text-indigo-700 shadow-sm border border-indigo-200 transition-all';
            const inactiveMobClass = 'flex-1 px-3 py-2.5 text-sm font-bold rounded-xl text-slate-500 hover:text-slate-700 hover:bg-white border border-transparent transition-all';

            if (role === 'student') {
                if(btnStudent) btnStudent.className = activeClass;
                if(btnAdmin) btnAdmin.className = inactiveClass;
                if(btnStudentMob) btnStudentMob.className = activeMobClass;
                if(btnAdminMob) btnAdminMob.className = inactiveMobClass;
                
                brandIcon.className = 'ph-fill ph-student text-primary text-3xl mr-2 transition-colors';
                brandText.innerHTML = 'DIGIT.<span class="text-primary">CRRU</span>';
                navigate('events');
            } else {
                if(btnAdmin) btnAdmin.className = activeClass;
                if(btnStudent) btnStudent.className = inactiveClass;
                if(btnAdminMob) btnAdminMob.className = activeMobClass;
                if(btnStudentMob) btnStudentMob.className = inactiveMobClass;
                
                brandIcon.className = 'ph-fill ph-shield-check text-admin text-3xl mr-2 transition-colors';
                brandText.innerHTML = 'Admin<span class="text-admin font-normal">Panel</span>';
                navigate('admin-dash');
            }
        }

        function renderNav() {
            const items = currentRole === 'student' ? NAV_STUDENT : NAV_ADMIN;
            const desktopContainer = document.getElementById('desktop-menu');
            const tabBarContainer = document.getElementById('mobile-tab-bar');
            
            let desktopHTML = '';
            let tabBarHTML = '';
            
            const primaryColor = currentRole === 'student' ? 'text-primary bg-primary/10' : 'text-admin bg-slate-200';
            const hoverColor = currentRole === 'student' ? 'hover:text-primary' : 'hover:text-admin';
            const tabActiveColor = currentRole === 'student' ? 'text-primary' : 'text-slate-800';

            items.forEach(item => {
                const isActive = item.id === currentView;
                const activeClassDesktop = isActive ? `${primaryColor} font-bold` : `text-slate-600 hover:bg-slate-50 ${hoverColor}`;

                desktopHTML += `
                    <button onclick="navigate('${item.id}')" class="px-4 py-2 rounded-full transition-colors flex items-center gap-2 ${activeClassDesktop}">
                        <i class="ph ${item.icon} text-xl"></i> ${item.label}
                    </button>
                `;

                const activeTabClass = isActive ? `${tabActiveColor} font-bold` : 'text-slate-400 font-medium hover:text-slate-600';
                const iconVariant = isActive ? 'ph-fill' : 'ph';
                
                tabBarHTML += `
                    <button onclick="navigate('${item.id}')" class="flex-1 flex flex-col items-center justify-center py-2 gap-1 transition-colors ${activeTabClass}">
                        <i class="${iconVariant} ${item.icon} text-2xl transition-transform ${isActive ? 'scale-110' : ''}"></i>
                        <span class="text-[10px] whitespace-nowrap tracking-wide">${item.tabLabel}</span>
                    </button>
                `;
            });

            if(desktopContainer) desktopContainer.innerHTML = desktopHTML;
            if(tabBarContainer) tabBarContainer.innerHTML = tabBarHTML;
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        function navigate(viewId, param = null) {
            currentView = viewId;
            renderNav();
            
            const content = document.getElementById('app-content');
            content.innerHTML = ''; 

            if (currentRole === 'student') {
                if(viewId === 'events') renderEvents(content);
                else if(viewId === 'register') renderRegistration(content, param);
                else if(viewId === 'history') renderHistory(content);
                else if(viewId === 'shirt') renderShirtShop(content);
                else if(viewId === 'checkout') renderCheckout(content, param);
                else if(viewId === 'tracking') renderTracking(content);
                else if(viewId === 'edit-order') renderEditOrder(content, param);
            } else {
                if(viewId === 'admin-dash') renderAdminDashboard(content);
                else if(viewId === 'admin-orders') renderAdminOrders(content);
                else if(viewId === 'admin-events') renderAdminEvents(content);
            }
        }

        // ==========================================
        // API FETCHERS
        // ==========================================
        async function fetchActivitiesData() {
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getActivities`);
                const result = await response.json();
                if (result.success && result.data && result.data.length > 0) {
                    // แปลงรูปแบบวันที่เป็นภาษาไทยก่อนนำไปแสดงผล
                    result.data.forEach(item => {
                        item.date = formatThaiDate(item.date);
                        item.timestamp = formatThaiDate(item.timestamp, true);
                    });
                    globalActivities = result.data;
                    return globalActivities;
                }
            } catch (error) {
                console.warn('เชื่อมต่อล้มเหลว โหลดข้อมูลจำลอง');
            }
            globalActivities = MOCK_EVENTS;
            return globalActivities; 
        }

        async function fetchAllCheckInsData() {
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCheckIns`);
                const result = await response.json();
                if (result.success && result.data) {
                    return result.data;
                }
            } catch (error) {
                console.warn('เชื่อมต่อล้มเหลว โหลดข้อมูลจำลอง (CheckIns)');
            }
            return new Array(45); // จำลองยอดเช็คชื่อชั่วคราว
        }

        // ==========================================
        // STUDENT VIEWS
        // ==========================================
        function renderEvents(container) {
            container.innerHTML = `
                <div class="fade-in flex flex-col items-center justify-center py-20">
                    <i class="ph ph-spinner animate-spin text-4xl text-primary mb-4"></i>
                    <p class="text-slate-500 font-medium">กำลังโหลดข้อมูลกิจกรรม...</p>
                </div>
            `;

            fetchActivitiesData().then(activities => {
                let html = `
                    <div class="fade-in">
                        <div class="mb-8 text-center sm:text-left">
                            <h1 class="text-3xl font-bold text-slate-800">ลงทะเบียนเข้าร่วมกิจกรรม</h1>
                            <p class="text-slate-500 mt-2">เลือกกิจกรรมที่คุณสนใจเพื่อลงทะเบียนเข้าร่วมและสะสมชั่วโมง</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="events-grid">
                `;

                activities.forEach(event => {
                    const isOpen = event.status === 'open';
                    const statusBadge = isOpen 
                        ? `<span class="bg-green-100 text-green-700 text-xs font-semibold px-3 py-1 rounded-full border border-green-200 shadow-sm whitespace-nowrap">เปิดรับสมัคร</span>`
                        : `<span class="bg-red-100 text-red-700 text-xs font-semibold px-3 py-1 rounded-full border border-red-200 shadow-sm whitespace-nowrap">ปิดรับสมัคร</span>`;
                    
                    const percentFull = Math.round((event.joined / event.spots) * 100) || 0;

                    html += `
                        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow flex flex-col p-6 sm:p-8">
                            <div class="flex justify-between items-start mb-4 gap-4">
                                <h3 class="text-xl font-bold text-slate-800 line-clamp-2 leading-snug">${event.title}</h3>
                                <div>${statusBadge}</div>
                            </div>
                            <div class="space-y-3 mt-auto mb-6 text-sm text-slate-600">
                                <div class="flex items-center gap-2"><i class="ph-fill ph-calendar-blank text-primary text-lg"></i> ${event.date}</div>
                                <div class="flex items-center gap-2"><i class="ph-fill ph-map-pin text-primary text-lg"></i> ${event.location}</div>
                                <div class="mt-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                    <div class="flex justify-between text-xs mb-2 font-bold text-slate-600 uppercase tracking-wide">
                                        <span>ผู้สมัครแล้ว ${event.joined}/${event.spots} คน</span>
                                        <span class="text-primary">${percentFull}%</span>
                                    </div>
                                    <div class="w-full bg-slate-200 rounded-full h-2.5">
                                        <div class="bg-primary h-2.5 rounded-full" style="width: ${percentFull}%"></div>
                                    </div>
                                </div>
                            </div>
                            <button 
                                onclick="navigate('register', '${event.id}')" 
                                ${!isOpen ? 'disabled' : ''} 
                                class="w-full py-3.5 rounded-xl font-bold transition-colors flex justify-center items-center gap-2 ${isOpen ? 'bg-slate-800 text-white hover:bg-black shadow-md' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}">
                                ${isOpen ? 'ลงทะเบียนเข้าร่วม <i class="ph ph-arrow-right"></i>' : 'เต็มแล้ว / ปิดรับสมัคร'}
                            </button>
                        </div>
                    `;
                });

                html += `</div></div>`;
                container.innerHTML = html;
            });
        }

        function renderRegistration(container, eventId) {
            const event = globalActivities.find(e => String(e.id) === String(eventId));
            if(!event) return navigate('events');

            container.innerHTML = `
                <div class="fade-in max-w-2xl mx-auto">
                    <button onclick="navigate('events')" class="flex items-center gap-2 text-slate-500 hover:text-primary mb-6 transition-colors font-medium">
                        <i class="ph ph-arrow-left text-xl"></i> กลับไปหน้ากิจกรรม
                    </button>
                    
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="bg-primary/5 p-6 sm:p-8 border-b border-slate-100">
                            <h2 class="text-2xl font-bold text-slate-800">ลงทะเบียนเข้าร่วมกิจกรรม</h2>
                            <p class="text-primary font-medium mt-1">${event.title}</p>
                        </div>
                        
                        <div class="p-6 sm:p-8">
                            <div id="step-search" class="mb-2">

        async function fetchStudentData() {
            const input = document.getElementById('search-student-id');
            const searchId = input.value.trim();
            const feedback = document.getElementById('search-feedback');
            
            if(!searchId) {
                feedback.textContent = 'กรุณากรอกรหัสก่อนค้นหา';
                feedback.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('btn-fetch-student');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> ค้นหา...';
            btn.disabled = true;
            feedback.classList.add('hidden');

            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=search&id=${encodeURIComponent(searchId)}`);
                const result = await response.json();

                if (result.success && result.data) {
                    document.getElementById('reg-student-id').value = result.data.studentId || searchId;
                    document.getElementById('reg-citizen-id').value = result.data.citizenId || result.data.year || '';
                    
                    document.getElementById('reg-hidden-student-id').value = result.data.studentId || '';
                    document.getElementById('reg-hidden-citizen-id').value = result.data.citizenId || result.data.year || '';
                    
                    const nameField = document.getElementById('reg-name');
                    const facultyField = document.getElementById('reg-faculty');

                    nameField.value = result.data.name || '';
                    facultyField.value = result.data.faculty || '';
                    
                    [nameField, facultyField, document.getElementById('reg-student-id'), document.getElementById('reg-citizen-id')].forEach(field => {
                        if (field.value) {
                            field.readOnly = true;
                            field.classList.replace('bg-white', 'bg-slate-100');
                        }
                    });
                    
                    document.getElementById('step-search').classList.add('hidden');
                    document.getElementById('step-form').classList.remove('hidden');
                    showToast('ดึงข้อมูลสำเร็จ', 'success');
                } else {
                    feedback.textContent = 'ไม่พบข้อมูล กรุณาลองใหม่ หรือกรอกข้อมูลเองด้านล่าง';
                    feedback.classList.remove('hidden');
                }
            } catch (error) {
                feedback.textContent = 'เชื่อมต่อล้มเหลว กรุณากรอกแบบแมนนวล';
                feedback.classList.remove('hidden');
                showManualForm(searchId);
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
            }
        }

        function showManualForm(prefillId = '') {
            const searchInput = document.getElementById('search-student-id').value.trim() || prefillId;
            
            // Check if input looks like a citizen ID (13 digits)
            if (searchInput.length === 13 && !isNaN(searchInput)) {
                document.getElementById('reg-citizen-id').value = searchInput;
            } else {
                document.getElementById('reg-student-id').value = searchInput;
            }
            
            document.getElementById('step-search').classList.add('hidden');
            const form = document.getElementById('step-form');
            form.classList.remove('hidden');
            form.firstElementChild.classList.add('hidden'); // Hide the "Data Found" alert
        }

        function resetSearchForm() {
            document.getElementById('step-form').classList.add('hidden');
            document.getElementById('step-search').classList.remove('hidden');
            document.getElementById('search-feedback').classList.add('hidden');
            document.getElementById('step-form').reset();
            
            document.getElementById('reg-hidden-student-id').value = '';
            document.getElementById('reg-hidden-citizen-id').value = '';
            document.getElementById('step-form').firstElementChild.classList.remove('hidden');
            
            ['reg-name', 'reg-faculty', 'reg-student-id', 'reg-citizen-id'].forEach(id => {
                const field = document.getElementById(id);
                if (field) {
                    field.readOnly = false;
                    field.classList.replace('bg-slate-100', 'bg-white');
                }
            });
        }

        async function handleRegistrationSubmit(e, eventId) {
            e.preventDefault();
            
            const studentIdInput = document.getElementById('reg-student-id').value.trim();
            const citizenIdInput = document.getElementById('reg-citizen-id').value.trim();
            const nameInput = document.getElementById('reg-name').value;
            const facultyInput = document.getElementById('reg-faculty').value;

            // Ensure we use the latest inputs in case they typed manually
            let finalStudentId = document.getElementById('reg-hidden-student-id').value || studentIdInput;
            let finalCitizenId = document.getElementById('reg-hidden-citizen-id').value || citizenIdInput;

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-lg"></i> กำลังบันทึก...';
            submitBtn.disabled = true;

            const event = globalActivities.find(e => String(e.id) === String(eventId));
            const eventName = event ? event.title : 'กิจกรรมทั่วไป';

            const payload = {
                action: 'checkIn',
                eventId: eventId,
                eventName: eventName,
                studentId: finalStudentId,
                citizenId: finalCitizenId,
                name: nameInput,
                faculty: facultyInput,
                timestamp: new Date().toLocaleString('th-TH')
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                showToast('ลงทะเบียนสำเร็จ! ข้อมูลถูกบันทึกแล้ว', 'success');
            } catch (error) {
                showToast('จำลองการลงทะเบียน (เชื่อมต่อล้มเหลว)', 'warning');
            } finally {
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
                setTimeout(()=> navigate('events'), 1500);
            }
        }

        async function fetchHistoryData() {
            const input = document.getElementById('search-history-id');
            const searchId = input.value.trim();
            
            if(!searchId) {
                showToast('กรุณากรอกรหัสนักศึกษา หรือ บัตรประชาชน', 'error');
                return;
            }
            
            const btn = document.getElementById('btn-fetch-history');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> ค้นหา...';
            btn.disabled = true;

            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&id=${encodeURIComponent(searchId)}`);
                const result = await response.json();

                if (result.success && result.data && result.data.length > 0) {
                    // แปลงรูปแบบวันที่เป็นภาษาไทย
                    result.data.forEach(item => {
                        item.date = formatThaiDate(item.date);
                    });
                    sessionStorage.setItem('historySearchTerm', searchId);
                    sessionStorage.setItem('historyData', JSON.stringify({ history: result.data }));
                    showToast('ค้นหาประวัติสำเร็จ', 'success');
                } else {
                    sessionStorage.setItem('historySearchTerm', searchId);
                    sessionStorage.setItem('historyData', JSON.stringify({ history: [] }));
                    showToast('ไม่พบประวัติสำหรับรหัสนี้', 'warning');
                }
            } catch (error) {
                showToast('จำลองข้อมูลประวัติ (เชื่อมต่อ API ล้มเหลว)', 'warning');
                sessionStorage.setItem('historySearchTerm', searchId);
                sessionStorage.setItem('historyData', JSON.stringify({ history: MOCK_HISTORY }));
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
                renderHistory(document.getElementById('app-content'));
            }
        }

            sessionStorage.removeItem('historySearchTerm');

        async function fetchStudentForOrder() {
            const input = document.getElementById('search-order-id');
            const searchId = input.value.trim();
            const feedback = document.getElementById('search-order-feedback');
            
            if(!searchId) {
                feedback.textContent = 'กรุณากรอกรหัสนักศึกษา หรือ บัตรประชาชน';
                feedback.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('btn-fetch-order');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> ค้นหา...';
            btn.disabled = true;
            feedback.classList.add('hidden');

            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=searchStudentOrder&id=${encodeURIComponent(searchId)}`);
                const result = await response.json();

                if (result.success && result.data) {
                    const idField = document.getElementById('order-student-id');
                    const nameField = document.getElementById('order-student-name');
                    
                    idField.value = searchId;
                    nameField.value = result.data.name || '';
                    
                    idField.readOnly = true;
                    nameField.readOnly = true;
                    idField.classList.replace('bg-white', 'bg-blue-100/50');
                    nameField.classList.replace('bg-white', 'bg-blue-100/50');

                    document.getElementById('order-step-search').classList.add('hidden');
                    document.getElementById('order-step-form').classList.remove('hidden');
                    showToast('ดึงข้อมูลสำเร็จ', 'success');
                    setTimeout(recalculatePrice, 50);
                } else {
                    feedback.textContent = 'ไม่พบข้อมูล กรุณาลองใหม่ หรือข้ามไปกรอกข้อมูลเอง';
                    feedback.classList.remove('hidden');
                }
            } catch (error) {
                feedback.textContent = 'เชื่อมต่อล้มเหลว กรุณากรอกแบบแมนนวล';
                feedback.classList.remove('hidden');
                skipOrderSearch(searchId);
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
            }
        }

        function skipOrderSearch(prefillId = '') {
            const searchInput = document.getElementById('search-order-id').value.trim() || prefillId;
            const idField = document.getElementById('order-student-id');
            const nameField = document.getElementById('order-student-name');
            
            idField.value = searchInput;
            nameField.value = '';
            
            idField.readOnly = false;
            nameField.readOnly = false;
            idField.classList.replace('bg-blue-100/50', 'bg-white');
            nameField.classList.replace('bg-blue-100/50', 'bg-white');

            document.getElementById('order-step-search').classList.add('hidden');
            document.getElementById('order-step-form').classList.remove('hidden');
            setTimeout(recalculatePrice, 50);
        }

        function resetOrderSearch() {
            document.getElementById('order-step-form').classList.add('hidden');
            document.getElementById('order-step-search').classList.remove('hidden');
            document.getElementById('search-order-feedback').classList.add('hidden');
            document.getElementById('orderForm').reset();
        }

        function recalculatePrice() {
            const form = document.getElementById('orderForm');
            if(!form) return;

            let poloSize = form.elements['poloSize'] ? form.elements['poloSize'].value : 'S';
            let poloUnitPrice = (poloSize === 'XL' || poloSize === '2XL') ? 350 : 280;
            const poloQtyInput = document.getElementById('poloQty');
            let poloQty = poloQtyInput ? (parseInt(poloQtyInput.value) || 1) : 1;
            
            let actSize = form.elements['actSize'] ? form.elements['actSize'].value : 'S';
            let actUnitPrice = (actSize === 'XL' || actSize === '2XL') ? 350 : 280;
            const actQtyInput = document.getElementById('actQty');
            let actQty = actQtyInput ? (parseInt(actQtyInput.value) || 1) : 1;

            const totalPrice = (poloUnitPrice * poloQty) + (actUnitPrice * actQty);
            document.getElementById('priceDisplay').innerText = `฿ ${totalPrice.toLocaleString()}`;
        }

        function updateQty(type, change) {
            const input = document.getElementById(type + 'Qty');
            if(!input) return;
            let val = parseInt(input.value) + change;
            if(val < 1) val = 1; 
            if(val > 10) val = 10;
            input.value = val;
            
            recalculatePrice(); 
        }

                size: `โปโล ${poloSize}, กิจกรรม ${actSize}`,
                qty: poloQty + actQty,
                items: [
                    { name: '1. เสื้อโปโลคณะ', size: poloSize, qty: poloQty, price: poloPrice, subtotal: poloPrice * poloQty },

        let countdownInterval;
        function startCountdown() {
            clearInterval(countdownInterval);
            let time = 15 * 60; 
            const display = document.getElementById('countdown');
            if(!display) return;

            countdownInterval = setInterval(() => {
                let minutes = parseInt(time / 60, 10);
                let seconds = parseInt(time % 60, 10);
                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;
                display.textContent = minutes + ":" + seconds;
                if (--time < 0) {
                    clearInterval(countdownInterval);
                    showToast('หมดเวลาทำรายการ กรุณาทำรายการใหม่', 'error');
                    setTimeout(() => navigate('shirt'), 2000);
                }
            }, 1000);
        }

        function togglePayment(method) {
            const btnQr = document.getElementById('btn-pay-qr');
            const btnCash = document.getElementById('btn-pay-cash');
            const viewQr = document.getElementById('view-pay-qr');
            const viewCash = document.getElementById('view-pay-cash');

            if(method === 'qr') {
                btnQr.className = 'flex-1 py-3 text-sm font-bold rounded-xl bg-primary text-white shadow-md transition-all flex items-center justify-center gap-2';
                btnCash.className = 'flex-1 py-3 text-sm font-bold rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 transition-all flex items-center justify-center gap-2';
                viewQr.classList.remove('hidden');
                viewCash.classList.add('hidden');
            } else {
                btnCash.className = 'flex-1 py-3 text-sm font-bold rounded-xl bg-primary text-white shadow-md transition-all flex items-center justify-center gap-2';
                btnQr.className = 'flex-1 py-3 text-sm font-bold rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 transition-all flex items-center justify-center gap-2';
                viewCash.classList.remove('hidden');
                viewQr.classList.add('hidden');
            }
        }

        function previewSlip(input) {
            const placeholder = document.getElementById('slip-placeholder');
            const preview = document.getElementById('slip-preview');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('opacity-0'); 
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function submitPayment(e, method) {
            if(e) e.preventDefault();
            clearInterval(countdownInterval); 
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> กำลังบันทึก...';
            submitBtn.disabled = true;

            const payload = {
                action: 'createOrder',
                orderId: currentCheckoutOrder.id,
                studentId: currentCheckoutOrder.studentId,
                name: currentCheckoutOrder.name,
                type: currentCheckoutOrder.type,
                size: currentCheckoutOrder.size,
                qty: currentCheckoutOrder.qty,
                total: currentCheckoutOrder.total,
                paymentMethod: method,
                timestamp: new Date().toLocaleString('th-TH')
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                if(method === 'qr') {
                    showToast('ส่งหลักฐานสำเร็จ! ระบบกำลังตรวจสอบ (ใช้เวลา 1-2 วัน)', 'success');
                } else {
                    showToast('บันทึกใบแจ้งชำระสำเร็จ! โปรดนำไปชำระที่ห้องสโมสรฯ', 'success');
                }
            } catch(error) {
                showToast('จำลองการสั่งจอง (เชื่อมต่อฐานข้อมูลล้มเหลว)', 'warning');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                setTimeout(() => navigate('tracking'), 2000);
            }
        }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-lg"></i> กำลังบันทึก...';
            submitBtn.disabled = true;

            const now = new Date();
            const timestamp = now.toLocaleDateString('th-TH') + ' ' + now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            const newId = 'ACT-' + Date.now().toString();

            const payload = {
                action: 'createActivity',
                id: newId,
                timestamp: timestamp,
                title: title,
                date: date,
                location: location,
                status: 'open',
                spots: 100, 
                joined: 0
            };
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                showToast('สร้างกิจกรรมใหม่สำเร็จ', 'success');
            } catch (error) {
                globalActivities.unshift(payload); 
                showToast('สร้างข้อมูลจำลอง (เชื่อมต่อฐานข้อมูลล้มเหลว)', 'warning');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                renderAdminEvents(document.getElementById('app-content'));
            }
        }

        async function toggleEventStatus(id, currentStatus) {
            const newStatus = currentStatus === 'open' ? 'closed' : 'open';
            const payload = {
                action: 'toggleActivity',
                id: String(id),
                status: newStatus
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                showToast(`อัปเดตสถานะเป็น ${newStatus === 'open' ? 'เปิด' : 'ปิด'} รับสมัครเรียบร้อย`, 'success');
            } catch (error) {
                const event = globalActivities.find(e => String(e.id) === String(id));
                if (event) event.status = newStatus;
                showToast('อัปเดตสถานะจำลอง (เชื่อมต่อฐานข้อมูลล้มเหลว)', 'warning');
            }
            renderAdminEvents(document.getElementById('app-content'));
        }

        // --- Utils: Toast Notification ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-white border-l-4 border-green-500' : 
                            type === 'error' ? 'bg-white border-l-4 border-red-500' : 'bg-white border-l-4 border-amber-500';
            const icon = type === 'success' ? '<i class="ph-fill ph-check-circle text-green-500 text-2xl"></i>' : 
                         type === 'error' ? '<i class="ph-fill ph-x-circle text-red-500 text-2xl"></i>' : '<i class="ph-fill ph-warning-circle text-amber-500 text-2xl"></i>';

            toast.className = `${bgColor} text-slate-700 p-4 rounded-xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] flex items-center gap-3 transform transition-all duration-300 translate-x-full border border-slate-100`;
            toast.innerHTML = `${icon} <span class="font-bold text-sm leading-tight">${message}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-x-full'));
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

    </script>
</body>
