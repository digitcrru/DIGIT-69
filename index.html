<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGIT.69 - Activity Management System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Recharts (for Dashboard Charts) -->
    <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body class="bg-[url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2029&auto=format&fit=crop')] bg-cover bg-center bg-fixed min-h-screen overflow-x-hidden text-slate-800">
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[-1]"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { PieChart, Pie, Cell, Tooltip, Legend, ResponsiveContainer, BarChart, Bar, XAxis, YAxis, CartesianGrid } = window.Recharts || {};

        // ==========================================
        // 🔴 นำ URL ของ Web App จาก Google Script มาใส่ที่นี่
        // ==========================================
        const GAS_API_URL = ""; 
        
        // Mock Data for demonstration when URL is empty
        const mockStudent = { studentId: "64010101", idCard: "1103900000000", name: "สมชาย ใจดี", major: "เทคโนโลยีสารสนเทศ" };
        const mockActivities = [{ id: "A01", name: "สัมมนาเทคโนโลยี AI", date: "2026-06-15", location: "ห้องประชุม 1" }];

        const surveyQuestions = [
            "1. เนื้อหาของกิจกรรมมีความน่าสนใจ", "2. วิทยากรมีความรู้ความสามารถ", "3. ระยะเวลาการจัดกิจกรรมเหมาะสม",
            "4. สถานที่จัดกิจกรรมมีความเหมาะสม", "5. การประชาสัมพันธ์ทั่วถึง", "6. เจ้าหน้าที่ให้บริการด้วยความสุภาพ",
            "7. อุปกรณ์และสื่อที่ใช้มีความพร้อม", "8. อาหารและเครื่องดื่มเหมาะสม", "9. สามารถนำความรู้ไปประยุกต์ใช้ได้",
            "10. รูปแบบการจัดกิจกรรมมีความน่าสนใจ", "11. การลำดับขั้นตอนของกิจกรรมเหมาะสม", "12. ภาพรวมความพึงพอใจต่อกิจกรรม", "13. ท่านจะเข้าร่วมกิจกรรมลักษณะนี้อีกในอนาคต"
        ];

        // API Helper
        const apiCall = async (action, data = {}) => {
            if(!GAS_API_URL) {
                // Mock responses if no API URL is provided
                return new Promise(resolve => {
                    setTimeout(() => {
                        if(action === 'getStudent') resolve({ status: 'success', data: mockStudent });
                        if(action === 'getActiveActivities') resolve({ status: 'success', data: mockActivities });
                        if(action === 'checkIn' || action === 'submitSurvey') resolve({ status: 'success' });
                        if(action === 'adminLogin') resolve(data.username === 'admin' ? { status: 'success', role: 'SuperAdmin' } : { status: 'error', message: 'รหัสผิด' });
                        if(action === 'getHistory') resolve({ status: 'success', profile: mockStudent, history: [{ timestamp: '01/06/2026 09:00', activityName: 'ปฐมนิเทศนักศึกษา' }] });
                    }, 800);
                });
            }

            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, data })
                });
                return await response.json();
            } catch (error) {
                console.error("API Error:", error);
                return { status: 'error', message: 'เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์' };
            }
        };

        // --- COMPONENTS ---

        // 1. Home / Menu Selection
        const Home = ({ setView, adminLogout, adminRole }) => {
            const isRegOpen = localStorage.getItem('regOpen') !== 'false'; // Default true

            return (
                <div class="min-h-screen flex flex-col items-center justify-center p-4">
                    <div class="absolute top-4 right-4">
                        {adminRole ? 
                            <button onClick={() => setView('admin')} class="glass px-4 py-2 rounded-lg text-white hover:bg-white/20 transition flex items-center gap-2">
                                <i data-lucide="layout-dashboard"></i> Dashboard
                            </button>
                            :
                            <button onClick={() => setView('login')} class="glass px-4 py-2 rounded-lg text-white hover:bg-white/20 transition flex items-center gap-2">
                                <i data-lucide="lock"></i> Staff Login
                            </button>
                        }
                    </div>
                    
                    <div class="text-center mb-10 text-white animate-fade-in">
                        <div class="inline-block p-4 rounded-full glass mb-4">
                            <i data-lucide="fingerprint" class="w-16 h-16 text-blue-400"></i>
                        </div>
                        <h1 class="text-5xl font-bold mb-2 tracking-wider">DIGIT<span class="text-blue-400">.69</span></h1>
                        <p class="text-xl text-gray-300">ระบบจัดการกิจกรรมและลงทะเบียนนักศึกษา</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl">
                        <button 
                            onClick={() => isRegOpen ? setView('checkin') : null} 
                            class={`glass-card p-8 rounded-2xl flex flex-col items-center justify-center gap-4 transition-all duration-300 ${isRegOpen ? 'hover:scale-105 hover:bg-white/20 cursor-pointer text-white' : 'opacity-50 cursor-not-allowed text-gray-400 grayscale'}`}
                        >
                            <div class={`p-4 rounded-full ${isRegOpen ? 'bg-blue-500/20 text-blue-400' : 'bg-gray-500/20'}`}>
                                <i data-lucide="scan-line" class="w-12 h-12"></i>
                            </div>
                            <h2 class="text-2xl font-semibold">1. เช็คชื่อเข้ากิจกรรม</h2>
                            <p class="text-sm text-center">สแกน/กรอกรหัส เพื่อลงทะเบียนและประเมินผลกิจกรรม</p>
                            {!isRegOpen && <span class="bg-red-500/80 text-white text-xs px-2 py-1 rounded">ปิดรับลงทะเบียน</span>}
                        </button>

                        <button onClick={() => setView('history')} class="glass-card p-8 rounded-2xl flex flex-col items-center justify-center gap-4 text-white hover:scale-105 hover:bg-white/20 transition-all duration-300 cursor-pointer">
                            <div class="p-4 rounded-full bg-purple-500/20 text-purple-400">
                                <i data-lucide="history" class="w-12 h-12"></i>
                            </div>
                            <h2 class="text-2xl font-semibold">2. ตรวจสอบประวัติ</h2>
                            <p class="text-sm text-center">ดูประวัติการเข้าร่วมกิจกรรมย้อนหลังทั้งหมด</p>
                        </button>
                    </div>
                </div>
            );
        };

        // 2. Check-in Flow
        const CheckInFlow = ({ setView }) => {
            const [step, setStep] = useState(1);
            const [query, setQuery] = useState('');
            const [student, setStudent] = useState(null);
            const [activities, setActivities] = useState([]);
            const [selectedAct, setSelectedAct] = useState(null);

            const handleSearch = async (e) => {
                e.preventDefault();
                if(!query) return;
                
                Swal.fire({ title: 'กำลังค้นหา...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const res = await apiCall('getStudent', { query });
                
                if(res.status === 'success') {
                    setStudent(res.data);
                    const actRes = await apiCall('getActiveActivities');
                    setActivities(actRes.data || []);
                    Swal.close();
                    setStep(2);
                } else {
                    Swal.fire('ไม่พบข้อมูล', 'กรุณาตรวจสอบรหัสนักศึกษา หรือ เลขบัตร ปชช. อีกครั้ง', 'error');
                }
            };

            const handleConfirm = async () => {
                if(!selectedAct) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกกิจกรรม', 'warning');
                
                Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const res = await apiCall('checkIn', { studentId: student.studentId, activityId: selectedAct.id, activityName: selectedAct.name });
                
                if(res.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'ลงทะเบียนสำเร็จ!', timer: 1500, showConfirmButton: false });
                    setTimeout(() => setStep(3), 1500); // Go to survey
                } else {
                    Swal.fire('ข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้', 'error');
                }
            };

            return (
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="glass-card w-full max-w-2xl rounded-2xl p-8 relative text-white">
                        <button onClick={() => setView('home')} class="absolute top-4 left-4 p-2 hover:bg-white/10 rounded-full transition"><i data-lucide="arrow-left"></i></button>
                        
                        {step === 1 && (
                            <div class="text-center mt-6">
                                <h2 class="text-3xl font-bold mb-6">เช็คชื่อเข้ากิจกรรม</h2>
                                <form onSubmit={handleSearch} class="flex flex-col gap-4">
                                    <input type="text" value={query} onChange={e=>setQuery(e.target.value)} placeholder="กรอกรหัสนักศึกษา หรือ เลขบัตร ปชช." class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 text-center text-lg" required autoFocus />
                                    <button type="submit" class="w-full py-3 bg-blue-500 hover:bg-blue-600 rounded-xl font-semibold transition shadow-lg">ค้นหาข้อมูล</button>
                                </form>
                            </div>
                        )}

                        {step === 2 && (
                            <div class="mt-6">
                                <div class="bg-white/10 p-4 rounded-xl border border-white/20 mb-6 flex items-center gap-4">
                                    <div class="w-16 h-16 bg-blue-500/30 rounded-full flex items-center justify-center"><i data-lucide="user" class="w-8 h-8"></i></div>
                                    <div>
                                        <h3 class="text-xl font-bold">{student.name}</h3>
                                        <p class="text-gray-300 text-sm">รหัส: {student.studentId} | สาขา: {student.major}</p>
                                    </div>
                                </div>
                                
                                <h4 class="font-semibold mb-3">เลือกกิจกรรมที่เปิดรับลงทะเบียน:</h4>
                                <div class="space-y-3 mb-6 max-h-60 overflow-y-auto pr-2">
                                    {activities.length === 0 ? <p class="text-center text-red-300 py-4">ไม่มีกิจกรรมที่เปิดรับลงทะเบียนขณะนี้</p> : null}
                                    {activities.map(act => (
                                        <div key={act.id} onClick={() => setSelectedAct(act)} class={`p-4 rounded-xl border cursor-pointer transition ${selectedAct?.id === act.id ? 'bg-blue-500/40 border-blue-400' : 'bg-white/5 border-white/10 hover:bg-white/10'}`}>
                                            <div class="font-semibold">{act.name}</div>
                                            <div class="text-xs text-gray-400 mt-1"><i data-lucide="calendar" class="inline w-3 h-3 mr-1"></i>{act.date} | <i data-lucide="map-pin" class="inline w-3 h-3 mx-1"></i>{act.location}</div>
                                        </div>
                                    ))}
                                </div>

                                <button onClick={handleConfirm} disabled={!selectedAct} class="w-full py-3 bg-green-500 hover:bg-green-600 disabled:opacity-50 disabled:cursor-not-allowed rounded-xl font-semibold transition shadow-lg">ยืนยันลงทะเบียน</button>
                            </div>
                        )}

                        {step === 3 && <SurveyForm student={student} activity={selectedAct} onFinish={() => setView('home')} />}
                    </div>
                </div>
            );
        };

        // 2.1 Survey Form
        const SurveyForm = ({ student, activity, onFinish }) => {
            const [answers, setAnswers] = useState(Array(13).fill(0));
            const [comment, setComment] = useState('');

            const handleSubmit = async () => {
                if(answers.includes(0)) return Swal.fire('แจ้งเตือน', 'กรุณาประเมินให้ครบทุกข้อ', 'warning');

                Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const res = await apiCall('submitSurvey', { studentId: student.studentId, activityId: activity.id, answers, comment });
                
                if(res.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'ขอบคุณสำหรับการประเมิน!', text: 'ระบบได้บันทึกข้อมูลเรียบร้อยแล้ว', confirmButtonText: 'กลับหน้าหลัก' }).then(() => onFinish());
                }
            };

            return (
                <div class="mt-4 animate-fade-in text-white">
                    <h2 class="text-2xl font-bold mb-2 text-center text-blue-300">แบบประเมินความพึงพอใจ</h2>
                    <p class="text-center text-sm text-gray-300 mb-6">กิจกรรม: {activity.name}</p>
                    
                    <div class="space-y-4 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                        {surveyQuestions.map((q, idx) => (
                            <div key={idx} class="bg-white/5 p-4 rounded-lg border border-white/10">
                                <p class="mb-3 text-sm">{q}</p>
                                <div class="flex justify-between max-w-sm mx-auto">
                                    {[1,2,3,4,5].map(score => (
                                        <button key={score} onClick={() => { const newAns = [...answers]; newAns[idx] = score; setAnswers(newAns); }} 
                                            class={`w-10 h-10 rounded-full flex items-center justify-center transition border ${answers[idx] === score ? 'bg-blue-500 border-blue-400 text-white scale-110' : 'bg-white/10 border-white/20 hover:bg-white/20'}`}>
                                            {score}
                                        </button>
                                    ))}
                                </div>
                                <div class="flex justify-between text-xs text-gray-400 mt-1 max-w-sm mx-auto px-1"><span>น้อยที่สุด</span><span>มากที่สุด</span></div>
                            </div>
                        ))}
                        <div class="bg-white/5 p-4 rounded-lg border border-white/10">
                            <p class="mb-3 text-sm">ข้อเสนอแนะเพิ่มเติม (ถ้ามี)</p>
                            <textarea value={comment} onChange={e=>setComment(e.target.value)} class="w-full bg-black/20 border border-white/20 rounded p-3 text-white focus:outline-none focus:ring-1 focus:ring-blue-400" rows="3"></textarea>
                        </div>
                    </div>

                    <button onClick={handleSubmit} class="w-full py-3 bg-gradient-to-r from-blue-500 to-purple-600 hover:opacity-90 mt-6 rounded-xl font-semibold transition shadow-lg">ส่งแบบประเมิน</button>
                </div>
            );
        }

        // 3. History
        const HistoryFlow = ({ setView }) => {
            const [query, setQuery] = useState('');
            const [data, setData] = useState(null);

            const handleSearch = async (e) => {
                e.preventDefault();
                Swal.fire({ title: 'กำลังค้นหา...', didOpen: () => Swal.showLoading() });
                const res = await apiCall('getHistory', { query });
                if(res.status === 'success') setData(res);
                else Swal.fire('ไม่พบข้อมูล', '', 'error');
                if(res.status === 'success') Swal.close();
            };

            return (
                <div class="min-h-screen flex flex-col items-center p-4 pt-10 text-white">
                    <div class="w-full max-w-3xl">
                        <button onClick={() => setView('home')} class="glass px-4 py-2 rounded-lg mb-6 hover:bg-white/20 transition flex items-center gap-2"><i data-lucide="arrow-left"></i> กลับหน้าหลัก</button>
                        
                        <div class="glass-card rounded-2xl p-8">
                            <h2 class="text-3xl font-bold mb-6 flex items-center gap-3"><i data-lucide="history" class="text-purple-400"></i> ตรวจสอบประวัติกิจกรรม</h2>
                            <form onSubmit={handleSearch} class="flex gap-4 mb-8">
                                <input type="text" value={query} onChange={e=>setQuery(e.target.value)} placeholder="รหัสนักศึกษา / เลขบัตร ปชช." class="flex-1 px-4 py-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-purple-400" required />
                                <button type="submit" class="px-6 py-3 bg-purple-500 hover:bg-purple-600 rounded-xl font-semibold transition">ค้นหา</button>
                            </form>

                            {data && (
                                <div class="animate-fade-in">
                                    <div class="bg-gradient-to-r from-blue-900/40 to-purple-900/40 p-6 rounded-xl border border-white/20 mb-6 flex gap-6 items-center">
                                        <div class="w-20 h-20 rounded-full bg-white/10 flex items-center justify-center shrink-0"><i data-lucide="user" class="w-10 h-10"></i></div>
                                        <div>
                                            <h3 class="text-2xl font-bold text-blue-200">{data.profile.name}</h3>
                                            <p class="text-gray-300 mt-1">รหัส: {data.profile.studentId} | สาขา: {data.profile.major}</p>
                                            <p class="text-sm text-gray-400 mt-1">จำนวนกิจกรรมที่เข้าร่วม: <span class="text-white font-bold text-lg">{data.history.length}</span> ครั้ง</p>
                                        </div>
                                    </div>

                                    <h4 class="text-lg font-semibold mb-4 border-b border-white/10 pb-2">รายการกิจกรรมที่เข้าร่วม</h4>
                                    <div class="space-y-4 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                                        {data.history.length === 0 ? <p class="text-center text-gray-400 py-4">ยังไม่มีประวัติการเข้าร่วมกิจกรรม</p> : null}
                                        {data.history.map((h, i) => (
                                            <div key={i} class="bg-white/5 p-4 rounded-lg border border-white/10 flex items-center justify-between hover:bg-white/10 transition">
                                                <div class="flex items-center gap-3">
                                                    <div class="p-2 bg-green-500/20 rounded-full text-green-400"><i data-lucide="check-circle-2" class="w-5 h-5"></i></div>
                                                    <span class="font-medium text-lg">{h.activityName}</span>
                                                </div>
                                                <div class="text-sm text-gray-400 flex items-center gap-1"><i data-lucide="clock" class="w-4 h-4"></i> {h.timestamp}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // 4. Admin Login
        const AdminLogin = ({ setView, setAdminRole }) => {
            const [user, setUser] = useState('');
            const [pass, setPass] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                Swal.fire({ title: 'กำลังตรวจสอบ...', didOpen: () => Swal.showLoading() });
                
                // Fallback for demo if no API
                if(!GAS_API_URL && user === 'admin' && pass === '0000') {
                    setAdminRole('SuperAdmin');
                    Swal.close();
                    setView('admin');
                    return;
                }

                const res = await apiCall('adminLogin', { username: user, password: pass });
                if(res.status === 'success') {
                    setAdminRole(res.role);
                    Swal.close();
                    setView('admin');
                } else {
                    Swal.fire('เข้าสู่ระบบล้มเหลว', res.message, 'error');
                }
            };

            return (
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="glass-card w-full max-w-md rounded-2xl p-8 text-white relative">
                        <button onClick={() => setView('home')} class="absolute top-4 left-4 p-2 hover:bg-white/10 rounded-full transition"><i data-lucide="x"></i></button>
                        <div class="text-center mb-8 mt-4">
                            <div class="inline-flex p-4 rounded-full bg-blue-500/20 text-blue-400 mb-4"><i data-lucide="shield-check" class="w-10 h-10"></i></div>
                            <h2 class="text-2xl font-bold">Staff Login</h2>
                            <p class="text-gray-400 text-sm mt-1">DIGIT.69 Admin Panel</p>
                        </div>
                        <form onSubmit={handleLogin} class="space-y-4">
                            <div><input type="text" value={user} onChange={e=>setUser(e.target.value)} placeholder="Username" class="w-full px-4 py-3 rounded-lg bg-black/20 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400" required /></div>
                            <div><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password" class="w-full px-4 py-3 rounded-lg bg-black/20 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400" required /></div>

                    if(filter === 'All') return true;

                                        <Bar dataKey="ผู้เข้าร่วม" fill="#8b5cf6" radius={[4,4,0,0]} />

                                </thead>

            const RealTimeRecord = () => {

                // Realtime simulation

                    return () => clearInterval(timer);
                }, []);

                const attendees = dbData.checkins.filter(c => selectedAct ? c[2] === selectedAct : c[2] === (activeActs[0]?.[0] || ''));
                
                const exportExcel = () => {

                    let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                    csvContent += "รหัสนักศึกษา,เลขบัตรประชาชน,ชื่อ-สกุล,สาขาวิชา,กิจกรรม,เวลาที่ลงทะเบียน\n";
                    
                    attendees.forEach(row => {
                        const std = dbData.students.find(s => s[0] == row[1]) || ['','','ไม่พบข้อมูล',''];
                        const actName = row[3];
                        csvContent += `="${std[0]}",="${std[1]}","${std[2]}","${std[3]}","${actName}","${row[0]}"\n`;
                    });

                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    link.setAttribute("download", "รายชื่อเข้าร่วมกิจกรรม.csv");
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                };

                return (

                                </thead>
                                <tbody>

                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            const SpssReport = () => {
                const [selectedAct, setSelectedAct] = useState('');
                const acts = dbData.activities;
                
                // Calculate SPSS Logic
                const actSurveys = dbData.surveys.filter(s => selectedAct ? s[2] === selectedAct : s[2] === (acts[0]?.[0] || ''));
                const N = actSurveys.length;
                
                let stats = [];
                if(N > 0) {
                    for(let q=0; q<13; q++) {
                        let sum = 0;
                        let scores = [];
                        actSurveys.forEach(row => {
                            const score = Number(row[3 + q]);
                            if(!isNaN(score)) { sum += score; scores.push(score); }
                        });
                        const mean = sum / N;
                        let varianceSum = 0;
                        scores.forEach(s => { varianceSum += Math.pow(s - mean, 2); });
                        // Using Sample SD (N-1), fallback to 0 if N<=1
                        const sd = N > 1 ? Math.sqrt(varianceSum / (N - 1)) : 0; 
                        
                        stats.push({ qText: surveyQuestions[q], mean: mean.toFixed(2), sd: sd.toFixed(2) });
                    }
                }

                const exportWord = () => {
                    const actName = acts.find(a => a[0] === (selectedAct || acts[0]?.[0]))?.[1] || 'รายงาน';
                    let html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head><meta charset='utf-8'><title>Report</title><style>table {border-collapse: collapse; width: 100%;} th, td {border: 1px solid black; padding: 8px; text-align: left;} th {background-color: #f2f2f2;}</style></head><body>
                    <h2 style="text-align:center;">รายงานผลการประเมินความพึงพอใจ</h2>
                    <h3 style="text-align:center;">กิจกรรม: ${actName} (N = ${N})</h3>
                    <table><tr><th>ข้อที่</th><th>ประเด็นการประเมิน</th><th style="text-align:center;">x̄</th><th style="text-align:center;">S.D.</th><th style="text-align:center;">ระดับ</th></tr>`;
                    
                    stats.forEach((s, idx) => {
                        let level = s.mean >= 4.5 ? 'มากที่สุด' : s.mean >= 3.5 ? 'มาก' : s.mean >= 2.5 ? 'ปานกลาง' : s.mean >= 1.5 ? 'น้อย' : 'น้อยที่สุด';
                        html += `<tr><td style="text-align:center;">${idx+1}</td><td>${s.qText.substring(3)}</td><td style="text-align:center;">${s.mean}</td><td style="text-align:center;">${s.sd}</td><td style="text-align:center;">${level}</td></tr>`;
                    });
                    
                    html += `</table><br><h4>ข้อเสนอแนะเพิ่มเติม:</h4><ul>`;
                    actSurveys.forEach(row => { if(row[16]) html += `<li>${row[16]}</li>`; });
                    html += `</ul></body></html>`;

                    const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.href = url;
                    link.download = `Survey_Report_${actName}.doc`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                };

                        <div class="flex justify-between items-center mb-6">

                        </div>

                        <div class="glass-card rounded-xl p-6">
                            <div class="text-right text-gray-300 mb-4 font-mono text-lg">กลุ่มตัวอย่าง (N) = {N}</div>
                            {N === 0 ? <p class="text-center text-gray-400 py-10">ยังไม่มีข้อมูลแบบประเมินสำหรับกิจกรรมนี้</p> : (
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left text-sm border-collapse">
                                        <thead class="bg-white/10 text-gray-300 border-b border-white/20">
                                            <tr><th class="p-3 w-12 text-center">ข้อ</th><th class="p-3">ประเด็นการประเมิน</th><th class="p-3 text-center w-24">x̄</th><th class="p-3 text-center w-24">S.D.</th></tr>
                                        </thead>
                                        <tbody>
                                            {stats.map((s, i) => (
                                                <tr key={i} class="border-b border-white/5 hover:bg-white/5">
                                                    <td class="p-3 text-center text-gray-400">{i+1}</td>
                                                    <td class="p-3">{s.qText.substring(3)}</td>
                                                    <td class="p-3 text-center font-bold text-blue-300">{s.mean}</td>
                                                    <td class="p-3 text-center font-mono text-purple-300">{s.sd}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>

            const Settings = () => {

                        icon: 'success',
                        title: newVal ? 'เปิดระบบลงทะเบียนแล้ว' : 'ปิดระบบลงทะเบียนแล้ว',
                        showConfirmButton: false, timer: 1000
                    });
                };

                return (
                    <div class="animate-fade-in text-white">
                        <h2 class="text-2xl font-bold mb-6">ตั้งค่าระบบ (Settings)</h2>
                        <div class="glass-card p-6 rounded-xl flex items-center justify-between max-w-lg border border-white/20">
                            <div>
                                <h3 class="font-semibold text-lg">เปิด/ปิด เมนูเช็คชื่อเข้ากิจกรรม</h3>
                                <p class="text-sm text-gray-400">ควบคุมการแสดงผลปุ่มที่หน้าแรก</p>
                            </div>
                            <button onClick={toggleReg} class={`relative inline-flex h-8 w-14 items-center rounded-full transition-colors ${isOpen ? 'bg-green-500' : 'bg-gray-500'}`}>
                                <span class={`inline-block h-6 w-6 transform rounded-full bg-white transition-transform ${isOpen ? 'translate-x-7' : 'translate-x-1'}`} />
                            </button>
                        </div>
                    </div>
                );
            };

            // Sidebar Menu Mapping
            const menus = [
                { id: 'overview', icon: 'pie-chart', label: '1. ภาพรวม (Overview)' },
                { id: 'majors', icon: 'users', label: '2. สัดส่วนสาขา (Majors)' },
                { id: 'report', icon: 'bar-chart-3', label: '3. สรุปผู้บริหาร' },
                { id: 'activity', icon: 'calendar-plus', label: '4. จัดการกิจกรรม' },
                { id: 'realtime', icon: 'activity', label: '5. ยอดเช็คชื่อ (Real-time)' },
                { id: 'spss', icon: 'calculator', label: '6. รายงาน SPSS' },
                ...(adminRole === 'SuperAdmin' ? [{ id: 'users', icon: 'shield', label: '7. จัดการสิทธิ์แอดมิน' }] : []),
                { id: 'settings', icon: 'settings', label: '8. ตั้งค่าระบบ' }
            ];

            return (
                <div class="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div class="w-64 glass-card border-r border-white/10 flex flex-col text-white z-10 shrink-0">
                        <div class="p-6 border-b border-white/10 flex items-center justify-between">
                            <div>
                                <h1 class="text-2xl font-bold tracking-wider">DIGIT<span class="text-blue-400">.69</span></h1>
                                <p class="text-xs text-gray-400">Admin Dashboard ({adminRole})</p>
                            </div>
                            <button onClick={() => { setView('home'); }} class="text-gray-400 hover:text-white" title="ออกจากระบบ"><i data-lucide="log-out"></i></button>
                        </div>
                        <div class="flex-1 overflow-y-auto py-4 custom-scrollbar">
                            {menus.map(m => (
                                <button key={m.id} onClick={() => setActiveMenu(m.id)} class={`w-full flex items-center gap-3 px-6 py-3 text-left transition ${activeMenu === m.id ? 'bg-blue-500/20 text-blue-300 border-r-4 border-blue-400' : 'text-gray-300 hover:bg-white/5'}`}>
                                    <i data-lucide={m.icon} class="w-5 h-5"></i> {m.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div class="flex-1 overflow-y-auto p-8 relative">
                        {loading && (
                            <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                                <div class="w-12 h-12 border-4 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
                                <p class="text-white mt-4 font-mono animate-pulse">Loading Data...</p>
                            </div>
                        )}
                        {!loading && (
                            <>
                                {activeMenu === 'overview' && <Overview />}
                                {activeMenu === 'majors' && <Majors />}
                                {activeMenu === 'report' && <ExecReport />}
                                {activeMenu === 'activity' && <ManageActivity />}
                                {activeMenu === 'realtime' && <RealTimeRecord />}
                                {activeMenu === 'spss' && <SpssReport />}
                                {activeMenu === 'users' && <div class="text-white"><h1>7. จัดการสิทธิ์แอดมิน (อยู่ระหว่างการพัฒนา)</h1></div>}
                                {activeMenu === 'settings' && <Settings />}
                            </>
                        )}
                    </div>
                </div>
            );
        };


        // --- MAIN APP ---
        const App = () => {
            const [view, setView] = useState('home'); // home, checkin, history, login, admin
            const [adminRole, setAdminRole] = useState(null);

            // Re-initialize icons when view changes
            useEffect(() => {
                if(window.lucide) window.lucide.createIcons();
            }, [view]);

            return (
                <div>
                    {view === 'home' && <Home setView={setView} adminRole={adminRole} />}
                    {view === 'checkin' && <CheckInFlow setView={setView} />}
                    {view === 'history' && <HistoryFlow setView={setView} />}
                    {view === 'login' && <AdminLogin setView={setView} setAdminRole={setAdminRole} />}
                    {view === 'admin' && <AdminDashboard setView={setView} adminRole={adminRole} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
