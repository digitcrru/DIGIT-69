<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGIT.69 - Activity Management</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#FF6B00', dark: '#E65C00', light: '#FF8A33', glow: 'rgba(255, 107, 0, 0.5)' },
                        dark: { 900: '#0B1121', 800: '#131C31', 700: '#1E293B', 600: '#334155' }
                    },
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (For JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: #0B1121; 
            color: #f8fafc; 
            overflow-x: hidden;
        }
        
        /* Premium Glassmorphism */
        .glass {
            background: rgba(19, 28, 49, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-card {
            background: linear-gradient(160deg, rgba(30,41,59,0.7) 0%, rgba(11,17,33,0.8) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }
        
        /* Custom Input Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #FF6B00; }
        
        /* Animated Background Gradients */
        .bg-animated {
            background-color: #0B1121;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 107, 0, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 107, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Gradient Text Utility */
        .text-gradient {
            background: linear-gradient(135deg, #FFB073 0%, #FF6B00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Custom Input Fields */
        .input-premium {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-premium:focus {
            background: rgba(15, 23, 42, 0.9);
            border-color: #FF6B00;
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="bg-animated min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 📊 Mock Data ---
        const MOCK_ACTIVITIES = [
            { ActID: 'A1', ActName: 'ปฐมนิเทศนักศึกษาใหม่ คณะเทคโนโลยีดิจิทัล', Date: '2026-06-15', Location: 'หอประชุมใหญ่', Status: 'open' },
            { ActID: 'A2', ActName: 'อบรมสัมมนา AI & Data Science', Date: '2026-06-20', Location: 'ห้องประชุม 1', Status: 'open' },
            { ActID: 'A3', ActName: 'กีฬาสานสัมพันธ์ 69', Date: '2026-05-10', Location: 'สนามกีฬากลาง', Status: 'closed' }
        ];

        const MOCK_STUDENTS = [
            { StudentID: '65123456', Name: 'นายสมชาย ใจดี', Major: 'วิศวกรรมซอฟต์แวร์', IDCard: '1122334455667' },
            { StudentID: '66112233', Name: 'นางสาวสมหญิง สวยงาม', Major: 'วิทยาการคอมพิวเตอร์', IDCard: '9988776655443' }
        ];

        // --- 🎨 Icons (SVG) ---
        const Icons = {
            Home: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>,
            CheckIn: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            History: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Login: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>,
            Dashboard: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>,
            Users: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>,
            Report: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>,
            Settings: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>,
            Download: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>,
            ChevronRight: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        };

        // ==========================================
        // 🚀 MAIN APP COMPONENT
        // ==========================================
        function App() {
            const [view, setView] = useState('home'); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [systemOpen, setSystemOpen] = useState(true);
            
            const [activities, setActivities] = useState(MOCK_ACTIVITIES);
            const [students, setStudents] = useState(MOCK_STUDENTS); // เปลี่ยนเป็น State เพื่อรองรับข้อมูลจริง
            const [currentStudent, setCurrentStudent] = useState(null);
            const [selectedActId, setSelectedActId] = useState(null);

            useEffect(() => {
                const isSysOpen = localStorage.getItem('digit69_systemOpen');
                if (isSysOpen !== null) setSystemOpen(isSysOpen === 'true');

                // --- 📥 ดึงข้อมูลจริงจาก Google Sheets ---
                const SHEET_ID = '1XJKJCp_XY_DUtU_z0PK3B-n3mB5BOkSHtS-7XPtCnHA';
                const actsUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Activities`;
                const studentsUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Students`;

                // 1. ดึงข้อมูลกิจกรรม
                Papa.parse(actsUrl, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        if(results.data && results.data.length > 0 && results.data[0].ActID) {
                            setActivities(results.data.filter(row => row.ActID !== "")); // กรองแถวว่างทิ้ง
                        }
                    }
                });

                // 2. ดึงข้อมูลนักศึกษา
                Papa.parse(studentsUrl, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        if(results.data && results.data.length > 0 && results.data[0].StudentID) {
                            setStudents(results.data.filter(row => row.StudentID !== "")); // กรองแถวว่างทิ้ง
                        }
                    }
                });
            }, []);

            // UI Helpers
            const customSwal = Swal.mixin({
                background: '#131C31',
                color: '#f8fafc',
                customClass: {
                    popup: 'border border-slate-700/50 rounded-2xl shadow-2xl',
                    confirmButton: 'bg-brand hover:bg-brand-dark px-6 py-2 rounded-lg font-bold transition-all',
                }
            });

            const showLoading = (title) => customSwal.fire({ title, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const showSuccess = (title) => customSwal.fire({ icon: 'success', title, timer: 1500, showConfirmButton: false });
            const showError = (title, text) => customSwal.fire({ icon: 'error', title, text });

            // --- Navigation Bar ---
            const Navbar = () => (
                <nav className="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center transition-all">
                    <div className="flex items-center gap-4 cursor-pointer group" onClick={() => setView('home')}>
                        <div className="bg-gradient-to-br from-brand-light to-brand text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-lg shadow-lg shadow-brand/30 group-hover:scale-105 transition-transform">D.</div>
                        <div>
                            <h1 className="text-xl font-bold tracking-wider text-white group-hover:text-brand-light transition-colors">DIGIT<span className="text-brand">.69</span></h1>
                            <p className="text-[10px] text-slate-400 uppercase tracking-widest">Activity System</p>
                        </div>
                    </div>
                    <div>
                        {!isAdmin ? (
                            <button onClick={() => setView('adminLogin')} className="flex items-center gap-2 text-sm text-slate-300 hover:text-white transition-all bg-white/5 hover:bg-brand/10 px-5 py-2.5 rounded-xl border border-white/10 hover:border-brand/40 shadow-sm">
                                <Icons.Login /> Staff Login
                            </button>
                        ) : (
                            <div className="flex items-center gap-4">
                                <button onClick={() => setView('admin')} className="text-brand font-semibold hover:text-brand-light transition-colors">เข้าสู่ Dashboard</button>
                                <div className="w-px h-5 bg-slate-700"></div>
                                <button onClick={() => { setIsAdmin(false); setView('home'); }} className="text-slate-400 hover:text-red-400 transition-colors text-sm">ออกจากระบบ</button>
                            </div>
                        )}
                    </div>
                </nav>
            );

            // ==========================================
            // 👩‍🎓 STUDENT VIEWS
            // ==========================================

            const HomeView = () => (
                <div className="max-w-5xl mx-auto mt-16 p-6 animate-fade-in-up flex-1 flex flex-col justify-center pb-20">
                    <div className="text-center mb-16 relative">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 bg-brand/20 blur-[100px] rounded-full pointer-events-none"></div>
                        <span className="inline-block px-4 py-1.5 rounded-full bg-brand/10 border border-brand/20 text-brand text-xs font-bold tracking-widest mb-6">FACULTY OF DIGITAL TECHNOLOGY</span>
                        <h2 className="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight text-white">
                            Welcome to <br className="md:hidden" /><span className="text-gradient drop-shadow-sm">DIGIT.69</span>
                        </h2>
                        <p className="text-slate-400 text-lg max-w-2xl mx-auto font-light leading-relaxed">
                            ระบบบริหารจัดการประวัติการเข้าร่วมกิจกรรม สำหรับนักศึกษาคณะเทคโนโลยีดิจิทัล สะดวก รวดเร็ว และตรวจสอบประวัติได้แบบเรียลไทม์
                        </p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto w-full relative z-10">
                        {/* Menu 1 */}
                        <div 
                            onClick={() => systemOpen ? setView('checkin') : null}
                            className={`group relative glass-card p-10 rounded-3xl transition-all duration-500 ${systemOpen ? 'cursor-pointer hover:-translate-y-2 hover:shadow-2xl hover:shadow-brand/20 hover:border-brand/40' : 'opacity-50 cursor-not-allowed grayscale'}`}
                        >
                            <div className="absolute inset-0 bg-gradient-to-br from-brand/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-3xl"></div>
                            <div className="relative z-10">
                                <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-6 shadow-inner transition-transform duration-500 group-hover:scale-110 group-hover:rotate-3 ${systemOpen ? 'bg-gradient-to-br from-brand/20 to-brand/5 text-brand border border-brand/20' : 'bg-slate-800 text-slate-500 border border-slate-700'}`}>
                                    <Icons.CheckIn />
                                </div>
                                <h3 className="text-2xl font-bold text-white mb-3 group-hover:text-brand transition-colors">ลงทะเบียนกิจกรรม</h3>
                                <p className="text-slate-400 text-sm leading-relaxed mb-6">เช็คชื่อเข้าร่วมกิจกรรมที่กำลังเปิดรับลงทะเบียน พร้อมทำแบบประเมินความพึงพอใจอย่างรวดเร็ว</p>
                                
                                <div className="flex items-center justify-between">
                                    {!systemOpen ? (
                                        <span className="text-xs bg-red-500/10 text-red-400 px-3 py-1 rounded-full border border-red-500/20 flex items-center gap-2">
                                            <span className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span> ปิดระบบชั่วคราว
                                        </span>
                                    ) : (
                                        <span className="text-brand text-sm font-semibold flex items-center gap-1 group-hover:gap-2 transition-all">คลิกเพื่อเริ่มต้น <Icons.ChevronRight/></span>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Menu 2 */}
                        <div 
                            onClick={() => setView('history')}
                            className="group relative glass-card p-10 rounded-3xl cursor-pointer hover:-translate-y-2 hover:shadow-2xl hover:shadow-blue-500/20 hover:border-blue-500/40 transition-all duration-500"
                        >
                            <div className="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-3xl"></div>
                            <div className="relative z-10">
                                <div className="w-16 h-16 bg-gradient-to-br from-blue-500/20 to-blue-500/5 text-blue-400 border border-blue-500/20 rounded-2xl flex items-center justify-center mb-6 shadow-inner transition-transform duration-500 group-hover:scale-110 group-hover:-rotate-3">
                                    <Icons.History />
                                </div>
                                <h3 className="text-2xl font-bold text-white mb-3 group-hover:text-blue-400 transition-colors">ตรวจสอบประวัติ</h3>
                                <p className="text-slate-400 text-sm leading-relaxed mb-6">เช็คประวัติการเข้าร่วมกิจกรรมทั้งหมดของคุณที่ผ่านมา รวมถึงจำนวนชั่วโมงกิจกรรมที่สะสมไว้</p>
                                <span className="text-blue-400 text-sm font-semibold flex items-center gap-1 group-hover:gap-2 transition-all">ตรวจสอบเลย <Icons.ChevronRight/></span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const CheckInView = () => {
                const [searchId, setSearchId] = useState('');
                const activeActs = activities.filter(a => a.Status === 'open' || a.Status === 'OPEN');

                const handleSearch = (e) => {
                    e?.preventDefault();
                    if(!searchId) return;
                    // ค้นหาจาก State ข้อมูลจริงที่ดึงมา
                    const student = students.find(s => s.StudentID === searchId || s.IDCard === searchId);
                    if (student) {
                        setCurrentStudent(student);
                    } else {
                        showError('ไม่พบข้อมูล', 'กรุณาตรวจสอบรหัสนักศึกษาหรือเลขบัตรประชาชนอีกครั้ง');
                    }
                };

                const handleSubmit = () => {
                    if (!selectedActId) return showError('แจ้งเตือน', 'กรุณาเลือกกิจกรรมที่ต้องการลงทะเบียน');
                    
                    showLoading('กำลังบันทึกข้อมูล...');
                    setTimeout(() => {
                        showSuccess('เช็คชื่อเบื้องต้นสำเร็จ!');
                        setView('survey');
                    }, 1000);
                };

                return (
                    <div className="max-w-2xl mx-auto mt-10 p-6 animate-fade-in-up w-full">
                        <button onClick={() => setView('home')} className="text-slate-400 hover:text-brand flex items-center gap-2 mb-8 transition-colors text-sm font-medium">
                            ← กลับหน้าหลัก
                        </button>
                        
                        <div className="glass-card p-8 md:p-10 rounded-3xl relative overflow-visible">
                            {/* Decorative element */}
                            <div className="absolute top-0 right-10 w-20 h-1 bg-brand rounded-b-lg shadow-[0_0_20px_rgba(255,107,0,0.5)]"></div>
                            
                            <h2 className="text-2xl font-bold mb-8 flex items-center gap-3 text-white">
                                <div className="p-2 bg-brand/20 rounded-lg text-brand"><Icons.CheckIn/></div>
                                ลงทะเบียนเข้ากิจกรรม
                            </h2>
                            
                            {!currentStudent ? (
                                <form onSubmit={handleSearch} className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-300 mb-2">รหัสนักศึกษา หรือ เลขบัตรประชาชน</label>
                                        <div className="relative">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                                                <Icons.Search />
                                            </div>
                                            <input 
                                                type="text" 
                                                className="w-full input-premium rounded-xl pl-11 pr-4 py-4 text-white text-lg"
                                                placeholder="กรอกข้อมูลเพื่อค้นหา..."
                                                value={searchId}
                                                onChange={(e) => setSearchId(e.target.value)}
                                            />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-gradient-to-r from-brand to-brand-dark hover:from-brand-light hover:to-brand text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-brand/30 transition-all transform hover:scale-[1.01] flex justify-center items-center gap-2">
                                        ค้นหาข้อมูล
                                    </button>
                                    <p className="text-center text-xs text-slate-500 mt-4 bg-dark-800/50 py-2 rounded-lg border border-slate-700/30">* ลองใช้รหัสนักศึกษาทดสอบ: <span className="text-slate-300 font-mono bg-dark-900 px-2 py-1 rounded">65123456</span></p>
                                </form>

                                    onClick={handleToggleSys}
                                    className={`relative inline-flex h-8 w-14 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-brand/50 focus:ring-offset-2 focus:ring-offset-dark-900 ${systemOpen ? 'bg-brand' : 'bg-slate-600'}`}
                                >
                                    <span className={`inline-block h-6 w-6 transform rounded-full bg-white shadow-md transition-transform duration-300 ${systemOpen ? 'translate-x-7' : 'translate-x-1'}`}/>
                                </button>
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="flex h-[calc(100vh-76px)] overflow-hidden">
                        {/* Sidebar */}
                        <div className="w-64 glass border-r border-slate-700/50 flex flex-col z-20 shadow-[10px_0_30px_rgba(0,0,0,0.2)]">
                            <div className="p-6">
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Admin Menu</p>
                            </div>
                            <div className="flex-1 overflow-y-auto px-4 space-y-2">
                                {menuItems.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => setAdminTab(item.id)}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-medium transition-all ${adminTab === item.id ? 'bg-gradient-to-r from-brand/20 to-transparent text-brand border-l-2 border-brand shadow-inner' : 'text-slate-400 hover:bg-white/5 hover:text-white border-l-2 border-transparent'}`}
                                    >
                                        <span className={adminTab === item.id ? 'opacity-100' : 'opacity-70'}>{item.icon}</span> 
                                        {item.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 overflow-y-auto p-6 md:p-10 bg-dark-900/60 relative">
                            {/* Ambient background glow inside content area */}
                            <div className="absolute top-0 left-1/4 w-96 h-96 bg-brand/5 blur-[120px] rounded-full pointer-events-none"></div>
                            
                            <div className="relative z-10 max-w-6xl mx-auto">
                                {adminTab === 'overview' && <TabOverview />}
                                {adminTab === 'majors' && <div className="text-slate-400 animate-fade-in-up">อยู่ระหว่างการพัฒนา UI กราฟสัดส่วนสาขาวิชา...</div>}
                                {adminTab === 'activities' && <TabActivities />}
                                {adminTab === 'realtime' && <div className="text-slate-400 animate-fade-in-up">อยู่ระหว่างการพัฒนา UI รายงานแบบ Real-time...</div>}
                                {adminTab === 'spss' && <div className="text-slate-400 animate-fade-in-up">อยู่ระหว่างการพัฒนา UI รายงานสถิติ SPSS...</div>}
                                {adminTab === 'settings' && <TabSettings />}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <Navbar />
                    <main className="flex-1 flex flex-col">
                        {view === 'home' && <HomeView />}
                        {view === 'checkin' && <CheckInView />}
                        {view === 'survey' && <SurveyView />}
                        {view === 'history' && <HistoryView />}
                        {view === 'adminLogin' && <AdminLogin />}
                        {view === 'admin' && isAdmin && <AdminDashboard />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
